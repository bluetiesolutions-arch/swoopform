<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poll — SwoopForm</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="/email_notify.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--white:#fff;--border:#e2ddd6;--accent:#4f46e5;--accent-light:#eef2ff;--success:#12a872;--danger:#e5484d;--text:#1c1c2e;--muted:#7a7a8c;--muted2:#c5c0b8;--font:'Sora',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
header{height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50;}
.brand{display:none;}
.main{max-width:560px;margin:0 auto;padding:40px 20px;}
.poll-card{background:var(--white);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.poll-hero{padding:28px 28px 20px;border-bottom:1px solid var(--border);}
.poll-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
.poll-question{font-size:20px;font-weight:700;line-height:1.4;margin-bottom:8px;}
.poll-meta{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:12px;}
.poll-body{padding:24px 28px;}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.opt-btn{position:relative;display:flex;align-items:center;gap:12px;padding:14px 16px;border:2px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;background:var(--white);font-family:var(--font);font-size:14px;font-weight:500;text-align:left;width:100%;overflow:hidden;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:var(--accent-light);}
.opt-btn.selected{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.opt-btn.voted{cursor:default;border-color:var(--border);}
.opt-btn.voted.winner{border-color:var(--accent);}
.opt-bar{position:absolute;left:0;top:0;height:100%;background:var(--accent-light);border-radius:10px;transition:width .6s ease;z-index:0;}
.opt-btn.winner .opt-bar{background:rgba(79,70,229,0.12);}
.opt-content{position:relative;z-index:1;display:flex;align-items:center;gap:12px;width:100%;}
.opt-circle{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:10px;}
.opt-btn.selected .opt-circle{border-color:var(--accent);background:var(--accent);color:#fff;}
.opt-text{flex:1;font-size:14px;}
.opt-pct{font-size:13px;font-weight:700;color:var(--accent);min-width:36px;text-align:right;}
.opt-count{font-size:11px;color:var(--muted);min-width:40px;text-align:right;}
.submit-btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;}
.submit-btn:hover{background:#4338ca;transform:translateY(-1px);}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.total-votes{text-align:center;font-size:13px;color:var(--muted);margin-top:14px;}
.voted-msg{text-align:center;padding:12px;background:var(--accent-light);border-radius:10px;font-size:13px;color:var(--accent);font-weight:600;margin-bottom:16px;}
.share-row{display:flex;gap:8px;margin-top:16px;}
.share-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--white);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.share-btn:hover{border-color:var(--accent);color:var(--accent);}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.poll-hero,.poll-body{padding:20px;}.main{padding:20px 16px;}}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted);">Loading poll...</div>
</div>

<div id="app" style="display:none;">
  <header>
    <a href="/dashboard/" style="display:flex;align-items:center;gap:8px;text-decoration:none;"><svg width="30" height="30" viewBox="0 0 40 40" fill="none"><defs><linearGradient id="sgnav" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#2d1b69"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#sgnav)"/><rect x="10" y="9" width="20" height="6" rx="3" fill="white"/><rect x="10" y="17" width="20" height="6" rx="3" fill="rgba(255,255,255,0.9)"/><rect x="10" y="25" width="20" height="6" rx="3" fill="white"/><circle cx="31" cy="12" r="3" fill="#d97706"/></svg><span style="font-family:'Sora',sans-serif;font-weight:800;font-size:16px;color:#0f0e1a;">SwoopForm</span></a>
    <span style="font-size:12px;color:var(--muted);">Live Poll</span>
  </header>
  <div class="main">
    <div class="poll-card">
      <div class="poll-hero">
        <div class="poll-tag" id="poll-tag">Poll</div>
        <div class="poll-question" id="poll-question">Loading...</div>
        <div class="poll-meta">
          <span id="poll-votes">0 votes</span>
          <span id="poll-deadline"></span>
        </div>
      </div>
      <div class="poll-body">
        <div class="voted-msg" id="voted-msg" style="display:none;">✅ Your vote has been recorded!</div>
        <div class="options" id="options-wrap"></div>
        <button class="submit-btn" id="submit-btn" onclick="submitVote()">Cast My Vote →</button>
        <div class="total-votes" id="total-wrap"></div>
        <div class="share-row">
          <button class="share-btn" onclick="copyLink()">🔗 Copy Link</button>
          <button class="share-btn" onclick="shareNative()">📤 Share</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,doc,getDoc,addDoc,updateDoc,collection,increment,onSnapshot,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);
const db=getFirestore(app);

const params=new URLSearchParams(window.location.search);
const PID=params.get('id');
let pData=null;
let selectedIdx=null;
let hasVoted=false;
let totalVotes=0;

async function init(){
  if(!PID){showError('No poll ID in URL.');return;}
  try{
    const snap=await getDoc(doc(db,'polls',PID));
    if(!snap.exists()){showError('Poll not found.');return;}
    pData=snap.data();
    if(pData.status==='closed'){showError('This poll is closed.');return;}
    // Check if already voted
    hasVoted=localStorage.getItem('voted_poll_'+PID)==='1';
    render();
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('app').style.display='block';
    // Real-time updates
    onSnapshot(doc(db,'polls',PID),function(snap){
      if(snap.exists()){
        pData=snap.data();
        renderOptions();
      }
    });
  }catch(e){console.error(e);showError('Failed to load.');}
}

function render(){
  document.title=(pData.question||'Poll')+' — SwoopForm';
  document.getElementById('poll-tag').textContent=pData.category||'Poll';
  document.getElementById('poll-question').textContent=pData.question||'';
  if(pData.deadline)document.getElementById('poll-deadline').textContent='Closes '+pData.deadline;
  if(hasVoted){
    document.getElementById('voted-msg').style.display='block';
    document.getElementById('submit-btn').style.display='none';
  }
  renderOptions();
}

function renderOptions(){
  const options=pData.options||[];
  const votes=pData.votes||{};
  totalVotes=Object.values(votes).reduce(function(s,v){return s+(v||0);},0);
  const maxVotes=Math.max(...Object.values(votes),1);
  const wrap=document.getElementById('options-wrap');

  wrap.innerHTML=options.map(function(opt,i){
    const v=votes['opt_'+i]||0;
    const pct=totalVotes?Math.round(v/totalVotes*100):0;
    const barW=totalVotes?Math.round(v/maxVotes*100):0;
    const isSel=selectedIdx===i;
    const isWinner=hasVoted&&v===maxVotes&&totalVotes>0;
    return '<button class="opt-btn'+(isSel?' selected':'')+(hasVoted?' voted':'')+(isWinner?' winner':'')+'" onclick="selectOpt('+i+')" '+(hasVoted?'disabled':'')+' id="opt_'+i+'">'
      +(hasVoted?'<div class="opt-bar" style="width:'+barW+'%"></div>':'')
      +'<div class="opt-content">'
      +'<div class="opt-circle">'+(isSel?'●':'')+(hasVoted&&isWinner?'🏆':'')+'</div>'
      +'<span class="opt-text">'+opt+'</span>'
      +(hasVoted?'<span class="opt-pct">'+pct+'%</span><span class="opt-count">'+v+'</span>':'')
      +'</div></button>';
  }).join('');

  document.getElementById('total-wrap').textContent=totalVotes+' vote'+(totalVotes!==1?'s':'')+(hasVoted?' · Results live':' · Be the first to vote!');
}

window.selectOpt=function(idx){
  if(hasVoted)return;
  selectedIdx=idx;
  renderOptions();
  document.getElementById('submit-btn').disabled=false;
};

window.submitVote=async function(){
  if(selectedIdx===null){alert('Please select an option.');return;}
  if(hasVoted)return;
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='Submitting...';
  try{
    const updates={[`votes.opt_${selectedIdx}`]:increment(1),totalVotes:increment(1),updatedAt:serverTimestamp()};
    await updateDoc(doc(db,'polls',PID),updates);
    const ownerId=pollData.userId;
    if(ownerId){
      const rl=await checkResponseLimit(db,ownerId);
      if(!rl.allowed){showResponseLimitError(rl.count,rl.limit);return;}
    }
    await addDoc(collection(db,'pollResponses'),{ownerId:typeof ownerId!=='undefined'?ownerId:(formData?.userId||pollData?.userId||votingData?.userId||pledgeData?.userId||riddleData?.userId||surveyData?.userId||''),
      pollId:PID,pollTitle:pData.question,selectedOption:selectedIdx,
      selectedText:(pData.options||[])[selectedIdx]||'',
      submittedAt:serverTimestamp()
    });

    // Email notification to host
    try{
      if(typeof SF_EMAIL!=='undefined'){
        const od=pollData;
        if(od&&od.ownerEmail){
          SF_EMAIL.notifyNewResponse(
            od.ownerEmail,
            od.ownerName||od.hostName||'',
            od.title||'Poll',
            'Poll',
            (od.responseCount||od.totalVotes||od.totalPledges||0)+1,
            'https://swoopform.com/poll/responses/?id='+PID
          );
        }
      }
    }catch(ne){console.warn('Email notify:',ne);}

    hasVoted=true;
    localStorage.setItem('voted_poll_'+PID,'1');
    document.getElementById('voted-msg').style.display='block';
    document.getElementById('submit-btn').style.display='none';
    renderOptions();
  }catch(e){
    console.error(e);
    btn.disabled=false;btn.textContent='Cast My Vote →';
    alert('Error: '+e.message);
  }
};

window.copyLink=function(){navigator.clipboard.writeText(window.location.href).then(function(){alert('Link copied!');});};
window.shareNative=function(){
  if(navigator.share)navigator.share({title:pData.question,url:window.location.href});
  else window.copyLink();
};

function showError(msg){document.getElementById('loading-screen').innerHTML='<div style="text-align:center;padding:40px;"><div style="font-size:48px;margin-bottom:16px;">😕</div><div style="font-size:18px;font-weight:700;margin-bottom:8px;">Oops!</div><div style="font-size:14px;color:#7a7a8c;">'+msg+'</div><a href="/dashboard/" style="display:inline-block;margin-top:20px;padding:10px 20px;background:#4f46e5;color:#fff;border-radius:8px;text-decoration:none;font-size:13px;">Go to Dashboard</a></div>';}
init();

async function checkResponseLimit(db, ownerId){
  try{
    const {collection,query,where,getDocs,Timestamp}=await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    // Get start of current month
    const now=new Date();
    const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
    const monthTs={seconds:Math.floor(monthStart.getTime()/1000),nanoseconds:0};
    // Get owner's plan
    const {doc,getDoc}=await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    const userSnap=await getDoc(doc(db,'users',ownerId));
    const userData=userSnap.exists()?userSnap.data():{plan:'free'};
    const plan=userData.plan||'free';
    const LIMITS={free:100,starter:1000,pro:-1,business:-1,student:-1,educator:-1,ngo:-1};
    const limit=LIMITS[plan]??100;
    if(limit===-1)return{allowed:true,count:0,limit:-1};
    // Count responses this month across all response collections
    const RESP_COLS=['surveyResponses','pollResponses','votingResponses','pledgeResponses','riddleResponses'];
    let total=0;
    for(const col of RESP_COLS){
      try{
        const snap=await getDocs(query(collection(db,col),where('ownerId','==',ownerId)));
        // Filter by this month client-side (simpler than composite index)
        snap.forEach(function(d){
          const ts=d.data().createdAt?.seconds||0;
          if(ts>=monthTs.seconds)total++;
        });
      }catch(e){}
    }
    // Also check subcollection responses (assessment, feedback, lead, registration, employee, product, award, jobapp)
    const SUB_COLS=['assessments','feedbacks','leads','registrations','employees','products','awards','jobapps'];
    for(const col of SUB_COLS){
      try{
        const formsSnap=await getDocs(query(collection(db,col),where('userId','==',ownerId)));
        for(const formDoc of formsSnap.docs){
          const rSnap=await getDocs(collection(db,col,formDoc.id,'responses'));
          rSnap.forEach(function(d){
            const ts=d.data().createdAt?.seconds||0;
            if(ts>=monthTs.seconds)total++;
          });
        }
      }catch(e){}
    }
    return{allowed:total<limit,count:total,limit};
  }catch(e){return{allowed:true,count:0,limit:-1};}
}

function showResponseLimitError(count, limit){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;font-family:Sora,sans-serif;';
  overlay.innerHTML=`<div style="background:#fff;border-radius:20px;padding:32px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);">
    <div style="font-size:48px;margin-bottom:16px;">📊</div>
    <div style="font-size:20px;font-weight:800;color:#0f0e1a;margin-bottom:8px;">Form temporarily unavailable</div>
    <div style="font-size:14px;color:#64748b;margin-bottom:20px;line-height:1.6;">This form has reached its monthly response limit. The owner needs to upgrade their plan to continue collecting responses.</div>
    <div style="background:#f5f0e8;border-radius:10px;padding:14px;margin-bottom:20px;">
      <div style="font-size:13px;color:#64748b;">Monthly responses used</div>
      <div style="font-size:22px;font-weight:800;color:#e5484d;margin-top:4px;">${count} / ${limit}</div>
    </div>
    <a href="/" style="display:block;padding:12px;border-radius:10px;background:linear-gradient(135deg,#2d1b69,#7c3aed);color:#fff;font-size:14px;font-weight:700;text-decoration:none;">← Back to SwoopForm</a>
  </div>`;
  document.body.appendChild(overlay);
}
</script>
</body>
</html>
