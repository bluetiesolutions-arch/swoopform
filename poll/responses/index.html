<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poll Results — SwoopForm</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#F8F9FF;color:#0F0E1A;min-height:100vh}
    nav{background:#fff;border-bottom:1.5px solid #E0E7FF;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
    .logo-mk{width:28px;height:28px;background:linear-gradient(135deg,#2D1B69,#D97706);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.8rem;color:#fff}
    .logo-nm{font-family:'Syne',sans-serif;font-weight:800;font-size:0.95rem;color:#0F0E1A}
    .nav-right{display:flex;gap:8px}
    .nav-btn{padding:7px 14px;border-radius:8px;border:1.5px solid #E0E7FF;background:transparent;color:#64748B;font-size:0.82rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .nav-btn:hover{border-color:#5B5EA6;color:#5B5EA6}
    .main{max-width:800px;margin:0 auto;padding:32px 20px}
    .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
    .page-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-0.03em;margin-bottom:4px}
    .page-sub{font-size:0.82rem;color:#64748B}
    .export-btn{padding:9px 18px;border-radius:9px;border:1.5px solid #E0E7FF;background:#fff;color:#5B5EA6;font-size:0.8rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;white-space:nowrap;flex-shrink:0}
    .export-btn:hover{background:#EEF2FF;border-color:#5B5EA6}
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
    .stat-card{background:#fff;border-radius:14px;border:1.5px solid #E0E7FF;padding:18px;text-align:center}
    .stat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;color:#5B5EA6;margin-bottom:3px;letter-spacing:-0.03em}
    .stat-lbl{font-size:0.72rem;color:#64748B;font-weight:600}
    .card{background:#fff;border-radius:16px;border:1.5px solid #E0E7FF;padding:24px;margin-bottom:16px}
    .card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
    .bar-wrap{margin-bottom:14px}
    .bar-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
    .bar-label{font-size:0.85rem;font-weight:600;width:160px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .bar-track{flex:1;height:36px;background:#EEF2FF;border-radius:9px;overflow:hidden;position:relative}
    .bar-fill{height:100%;background:linear-gradient(90deg,#5B5EA6,#7C3AED);border-radius:9px;transition:width 0.8s ease;display:flex;align-items:center;padding-left:12px;min-width:0}
    .bar-fill-text{color:#fff;font-size:0.75rem;font-weight:700;white-space:nowrap}
    .bar-count{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:#5B5EA6;width:50px;text-align:right;flex-shrink:0}
    .bar-pct{font-size:0.75rem;color:#94A3B8;width:40px;text-align:right;flex-shrink:0}
    .winner-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:100px;background:#FEF3C7;color:#D97706;font-size:0.65rem;font-weight:700;margin-left:8px}
    .empty-state{text-align:center;padding:40px 20px}
    .empty-icon{font-size:2.5rem;margin-bottom:10px}
    .empty-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;margin-bottom:6px}
    .empty-sub{font-size:0.82rem;color:#64748B;line-height:1.6}
    .spinner{width:28px;height:28px;border:3px solid rgba(91,94,166,0.15);border-top-color:#5B5EA6;border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto;display:block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .share-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;padding-top:16px;border-top:1px solid #E0E7FF}
    .share-btn{padding:7px 14px;border-radius:8px;border:1.5px solid #E0E7FF;background:#fff;font-size:0.78rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;color:#64748B;transition:all 0.2s}
    .share-btn:hover{border-color:#5B5EA6;color:#5B5EA6}
    @media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr)}.bar-label{width:90px}nav{padding:0 14px}.logo-nm{display:none}.main{padding:20px 14px}}
  </style>
</head>
<body>
<nav>
  <a href="/dashboard" class="nav-logo"><div class="logo-mk">S</div><div class="logo-nm">SwoopForm</div></a>
  <div class="nav-right">
    <a href="/dashboard" class="nav-btn">← Dashboard</a>
  </div>
</nav>
<div class="main">
  <div id="content"><div class="spinner"></div></div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getAuth,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import{getFirestore,doc,getDoc,collection,query,where,getDocs,orderBy}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);const auth=getAuth(app);const db=getFirestore(app);
const id=new URLSearchParams(window.location.search).get('id');
let poll=null,responses=[];

onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='/login';return}
  if(!id){showError('No poll ID provided.');return}
  try{
    const snap=await getDoc(doc(db,'polls',id));
    if(!snap.exists()||snap.data().userId!==u.uid){showError('Poll not found or access denied.');return}
    poll={id:snap.id,...snap.data()};
    try{
      const rSnap=await getDocs(query(collection(db,'pollResponses'),where('pollId','==',id)));
      responses=rSnap.docs.map(d=>d.data());
    }catch(e){}
    render();
  }catch(e){showError('Error loading poll results.')}
});

function render(){
  const total=poll.totalVotes||responses.length||0;
  const opts=poll.options||[];
  const maxVotes=Math.max(...opts.map(o=>o.votes||0),1);
  const winner=opts.reduce((a,b)=>(a.votes||0)>=(b.votes||0)?a:b,opts[0]);
  const shareUrl='https://swoopform.com'+(poll.slug?'/engage/'+poll.slug:'#');
  document.getElementById('content').innerHTML=`
    <div class="page-header">
      <div>
        <div class="page-title">📊 Poll Results</div>
        <div class="page-sub">${eh(poll.question||'Untitled Poll')}</div>
      </div>
      <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-lbl">Total votes</div></div>
      <div class="stat-card"><div class="stat-val">${opts.length}</div><div class="stat-lbl">Options</div></div>
      <div class="stat-card"><div class="stat-val">${poll.type==='multiple'?'Multi':'Single'}</div><div class="stat-lbl">Poll type</div></div>
    </div>
    <div class="card">
      <div class="card-title">
        <span>Results breakdown</span>
        <span style="font-size:0.72rem;color:#94A3B8;font-family:'DM Sans',sans-serif;font-weight:500">${fmtDate(poll.updatedAt)} · ${poll.status||'active'}</span>
      </div>
      ${total===0?`<div class="empty-state"><div class="empty-icon">🗳️</div><div class="empty-title">No votes yet</div><div class="empty-sub">Share your poll to start collecting votes.</div></div>`:
      `<div class="bar-wrap">${opts.map((o,i)=>{
        const text=o.text||o||'Option '+(i+1);
        const votes=o.votes||0;
        const pct=total>0?Math.round((votes/total)*100):0;
        const isWinner=votes===(winner?.votes||0)&&votes>0;
        return`<div class="bar-wrap">
          <div class="bar-row">
            <div class="bar-label" title="${text}">${eh(text)}${isWinner?'<span class="winner-chip">👑 Leading</span>':''}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${(votes/maxVotes)*100}%"><span class="bar-fill-text">${pct>12?pct+'%':''}</span></div></div>
            <div class="bar-count">${votes}</div>
            <div class="bar-pct">${pct}%</div>
          </div>
        </div>`;
      }).join('')}</div>`}
      <div class="share-row">
        <button class="share-btn" onclick="navigator.clipboard.writeText('${shareUrl}').then(()=>alert('Link copied!'))">🔗 Copy poll link</button>
        <a class="share-btn" href="https://wa.me/?text=${encodeURIComponent('Vote on this poll: '+shareUrl)}" target="_blank" style="text-decoration:none;display:inline-flex;align-items:center">💬 Share on WhatsApp</a>
        <a class="share-btn" href="/poll/edit/?id=${id}" style="text-decoration:none;display:inline-flex;align-items:center">✏️ Edit poll</a>
      </div>
    </div>`;
}

window.exportCSV=function(){
  if(!poll)return;
  const opts=poll.options||[];
  const total=poll.totalVotes||0;
  const rows=[
    ['Poll','Votes','Percentage'],
    ...opts.map(o=>{
      const text=o.text||o||'';
      const votes=o.votes||0;
      const pct=total>0?Math.round((votes/total)*100):0;
      return[text,votes,pct+'%'];
    }),
    ['','',''],
    ['Total votes',total,'']
  ];
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='poll-results-'+id+'.csv';a.click();
}

function showError(msg){
  document.getElementById('content').innerHTML=`<div class="empty-state"><div class="empty-icon">😕</div><div class="empty-title">Error</div><div class="empty-sub">${msg}</div><br><a href="/dashboard" style="color:#5B5EA6;font-weight:600;text-decoration:none">← Back to Dashboard</a></div>`;
}
function fmtDate(ts){if(!ts?.seconds)return'';return new Date(ts.seconds*1000).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}
function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}
</script>
</body>
</html>
