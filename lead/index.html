<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Form — SwoopForm</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="/email_notify.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--white:#fff;--border:#e2ddd6;--accent:#e85d26;--accent-light:#fff4ef;--success:#12a872;--danger:#e5484d;--text:#1c1c2e;--muted:#7a7a8c;--muted2:#c5c0b8;--font:'Sora',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
header{height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50;}
.brand{display:none;}
.brand span{color:var(--text);}
.main{max-width:600px;margin:0 auto;padding:40px 20px;}
.form-card{background:var(--white);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.form-hero{padding:36px 36px 28px;}
.form-category{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.form-title{font-size:26px;font-weight:700;line-height:1.3;margin-bottom:10px;}
.form-desc{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:0;}
.offer-box{margin:20px 36px 0;padding:16px 20px;border-radius:14px;border:1.5px solid var(--border);display:flex;align-items:flex-start;gap:14px;}
.offer-icon{font-size:32px;flex-shrink:0;line-height:1;}
.offer-headline{font-size:14px;font-weight:700;margin-bottom:4px;}
.offer-desc{font-size:13px;color:var(--muted);line-height:1.6;}
.form-body{padding:28px 36px;}
.field-group{margin-bottom:18px;}
.field-group:last-of-type{margin-bottom:0;}
.field-label{font-size:13px;font-weight:500;margin-bottom:7px;display:flex;align-items:center;gap:4px;}
.req{color:var(--danger);}
.opt{font-size:10px;color:var(--muted2);font-weight:400;}
.field-input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;background:var(--white);color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s;}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,93,38,0.08);}
.field-input::placeholder{color:var(--muted2);}
.field-input.error{border-color:var(--danger);}
.field-error{font-size:11px;color:var(--danger);margin-top:4px;display:none;}
textarea.field-input{resize:vertical;min-height:100px;line-height:1.6;}
.url-wrap{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s;}
.url-wrap:focus-within{border-color:var(--accent);}
.url-prefix{padding:12px 14px;background:var(--accent-light);color:var(--accent);font-size:13px;border-right:1px solid var(--border);white-space:nowrap;font-weight:500;}
.url-input{flex:1;padding:12px 14px;border:none;background:transparent;font-family:var(--font);font-size:14px;outline:none;color:var(--text);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.phone-wrap{display:flex;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s;}
.phone-wrap:focus-within{border-color:var(--accent);}
.phone-code{padding:12px 10px;border:none;background:var(--accent-light);color:var(--accent);font-family:var(--font);font-size:13px;font-weight:600;outline:none;cursor:pointer;border-right:1.5px solid var(--border);}
.phone-input{flex:1;padding:12px 14px;border:none;background:transparent;font-family:var(--font);font-size:14px;outline:none;color:var(--text);}
.checkbox-wrap{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;}
.checkbox-wrap:hover{border-color:var(--accent);background:var(--accent-light);}
.checkbox-wrap.checked{border-color:var(--accent);background:var(--accent-light);}
.checkbox-wrap input{accent-color:var(--accent);width:16px;height:16px;flex-shrink:0;margin-top:2px;}
.checkbox-label{font-size:13px;line-height:1.5;}
.submit-btn{width:100%;padding:15px;border:none;border-radius:12px;color:#fff;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px;}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.2);}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.submit-note{text-align:center;font-size:12px;color:var(--muted2);margin-top:10px;}
.thankyou{display:none;text-align:center;padding:52px 36px;}
.ty-icon{font-size:64px;margin-bottom:20px;animation:pop .5s ease;}
@keyframes pop{0%{transform:scale(0.5);opacity:0}80%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.ty-title{font-size:26px;font-weight:700;margin-bottom:12px;}
.ty-msg{font-size:14px;color:var(--muted);line-height:1.7;max-width:380px;margin:0 auto 24px;}
.ty-btn{display:inline-block;padding:12px 24px;border-radius:10px;color:#fff;font-family:var(--font);font-size:14px;font-weight:700;text-decoration:none;transition:all .2s;}
.ty-btn:hover{transform:translateY(-1px);}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.form-hero,.form-body{padding:24px 20px;}.offer-box{margin:16px 20px 0;}.two-col{grid-template-columns:1fr;}}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted);">Loading form...</div>
</div>

<div id="app" style="display:none;">
  <header>
    <a href="/dashboard/" style="display:flex;align-items:center;gap:8px;text-decoration:none;"><svg width="30" height="30" viewBox="0 0 40 40" fill="none"><defs><linearGradient id="sgnav" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#2d1b69"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#sgnav)"/><rect x="10" y="9" width="20" height="6" rx="3" fill="white"/><rect x="10" y="17" width="20" height="6" rx="3" fill="rgba(255,255,255,0.9)"/><rect x="10" y="25" width="20" height="6" rx="3" fill="white"/><circle cx="31" cy="12" r="3" fill="#d97706"/></svg><span style="font-family:'Sora',sans-serif;font-weight:800;font-size:16px;color:#0f0e1a;">SwoopForm</span></a>
    <span style="font-size:12px;color:var(--muted);">Powered by SwoopForm</span>
  </header>
  <div class="main">
    <div class="form-card">
      <div class="form-hero">
        <div class="form-category" id="f-category"></div>
        <div class="form-title" id="f-title">Loading...</div>
        <div class="form-desc" id="f-desc"></div>
      </div>
      <div id="offer-section" style="display:none;">
        <div class="offer-box" id="offer-box">
          <div class="offer-icon" id="offer-icon">🎁</div>
          <div>
            <div class="offer-headline" id="offer-headline"></div>
            <div class="offer-desc" id="offer-desc"></div>
          </div>
        </div>
      </div>
      <div class="form-body" id="form-body">
        <div id="fields-wrap"></div>
        <button class="submit-btn" id="submit-btn" onclick="submitForm()">Get Started →</button>
        <div class="submit-note">🔒 Your information is safe and will never be shared.</div>
      </div>
      <div class="thankyou" id="thankyou">
        <div class="ty-icon">🎉</div>
        <div class="ty-title" id="ty-title">Thank you!</div>
        <div class="ty-msg" id="ty-msg">We've received your details and will get back to you soon.</div>
        <a class="ty-btn" id="ty-btn" href="#" style="display:none;"></a>
      </div>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,doc,getDoc,addDoc,updateDoc,collection,increment,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);
const db=getFirestore(app);

const params=new URLSearchParams(window.location.search);
const LID=params.get('id');
let lData=null;

async function init(){
  if(!LID){showError('No form ID in URL.');return;}
  try{
    const snap=await getDoc(doc(db,'leads',LID));
    if(!snap.exists()){showError('Form not found.');return;}
    lData=snap.data();
    if(lData.accepting===false){showError('This form is closed.');return;}
    render();
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('app').style.display='block';
  }catch(e){console.error(e);showError('Failed to load.');}
}

function render(){
  const d=lData;
  const color=d.color||'#e85d26';
  document.documentElement.style.setProperty('--accent',color);
  document.documentElement.style.setProperty('--accent-light',color+'15');
  document.title=(d.title||'Form')+' — SwoopForm';
  document.getElementById('f-category').textContent=d.category||'';
  document.getElementById('f-category').style.color=color;
  document.getElementById('f-title').textContent=d.title||'';
  document.getElementById('f-desc').textContent=d.description||'';

  // Offer
  if(d.offer&&d.offer.enabled){
    document.getElementById('offer-section').style.display='block';
    document.getElementById('offer-icon').textContent=d.offer.icon||'🎁';
    document.getElementById('offer-headline').textContent=d.offer.headline||'';
    document.getElementById('offer-desc').textContent=d.offer.description||'';
    document.getElementById('offer-box').style.borderColor=color;
    document.getElementById('offer-box').style.background=color+'08';
  }

  // Submit button
  const btn=document.getElementById('submit-btn');
  btn.textContent=d.buttonText||'Get Started →';
  btn.style.background=color;

  // Thank you
  document.getElementById('ty-title').textContent=d.thankYouHeading||'Thank you!';
  document.getElementById('ty-msg').textContent=d.thankYouMessage||'We\'ll be in touch soon.';
  if(d.thankYouBtnText&&d.thankYouUrl){
    const tyBtn=document.getElementById('ty-btn');
    tyBtn.textContent=d.thankYouBtnText;
    tyBtn.href='https://'+(d.thankYouUrl||'').replace(/^https?:\/\//,'');
    tyBtn.style.background=color;
    tyBtn.style.display='inline-block';
  }

  // Render fields
  renderFields(d.fields||[]);
}

function renderFields(fields){
  const wrap=document.getElementById('fields-wrap');
  wrap.innerHTML='';

  // Group phone fields
  fields.forEach(function(f,i){
    const fg=document.createElement('div');
    fg.className='field-group';
    const fid='field_'+i;
    const req=f.required;
    const label='<div class="field-label">'+f.label+(req?' <span class="req">*</span>':' <span class="opt">(optional)</span>')+'</div>';
    let input='';

    if(f.fieldType==='message'||f.type==='textarea'){
      input='<textarea class="field-input" id="'+fid+'" placeholder="'+(f.placeholder||'Tell us more...')+'" rows="4"></textarea>';
    }else if(f.fieldType==='phone'){
      input='<div class="phone-wrap"><select class="phone-code"><option>🇮🇳 +91</option><option>🇺🇸 +1</option><option>🇬🇧 +44</option><option>🇦🇺 +61</option><option>🇦🇪 +971</option><option>🇸🇬 +65</option></select><input class="phone-input" id="'+fid+'" type="tel" placeholder="'+(f.placeholder||'98765 43210')+'"></div>';
    }else if(f.fieldType==='website'){
      input='<div class="url-wrap"><span class="url-prefix">https://</span><input class="url-input" id="'+fid+'" type="text" placeholder="'+(f.placeholder||'yourwebsite.com')+'"></div>';
    }else if(f.fieldType==='checkbox'){
      input='<div class="checkbox-wrap" id="cbwrap_'+i+'" onclick="toggleCb('+i+')"><input type="checkbox" id="'+fid+'" onclick="event.stopPropagation()"><label class="checkbox-label" for="'+fid+'">'+f.label+'</label></div>';
      fg.innerHTML=input+'<div class="field-error" id="err_'+i+'">This field is required</div>';
      wrap.appendChild(fg);
      return;
    }else if(f.fieldType==='dropdown'){
      const opts=(f.options||'').split('\n').filter(function(o){return o.trim();}).map(function(o){return '<option value="'+o.trim()+'">'+o.trim()+'</option>';}).join('');
      input='<select class="field-input" id="'+fid+'"><option value="">— Select an option —</option>'+opts+'</select>';
    }else if(f.fieldType==='date'){
      input='<input class="field-input" id="'+fid+'" type="date">';
    }else if(f.fieldType==='number'){
      input='<input class="field-input" id="'+fid+'" type="number" placeholder="'+(f.placeholder||'')+'">';
    }else{
      input='<input class="field-input" id="'+fid+'" type="'+(f.fieldType==='email'?'email':f.fieldType==='phone'?'tel':'text')+'" placeholder="'+(f.placeholder||'')+'">';
    }

    fg.innerHTML=label+input+'<div class="field-error" id="err_'+i+'">This field is required</div>';
    wrap.appendChild(fg);
  });
}

window.toggleCb=function(i){
  const cb=document.getElementById('field_'+i);
  const wrap=document.getElementById('cbwrap_'+i);
  if(cb){cb.checked=!cb.checked;wrap.classList.toggle('checked',cb.checked);}
};

window.submitForm=async function(){
  const fields=lData.fields||[];
  let valid=true;
  const data={};

  fields.forEach(function(f,i){
    const fid='field_'+i;
    const errEl=document.getElementById('err_'+i);
    let val='';

    if(f.fieldType==='phone'){
      const code=document.querySelector('.phone-code');
      const inp=document.getElementById(fid);
      val=(code?code.value:'+91')+' '+(inp?inp.value.trim():'');
      if(f.required&&!(inp&&inp.value.trim())){
        if(inp)inp.closest('.phone-wrap').style.border='1.5px solid var(--danger)';
        if(errEl)errEl.style.display='block';
        valid=false;return;
      }
    }else if(f.fieldType==='website'){
      const inp=document.querySelector('#field_'+i+' ~ * .url-input, .url-input');
      const urlInp=document.getElementById(fid);
      val=urlInp?'https://'+(urlInp.value||'').trim().replace(/^https?:\/\//,''):'';
      if(f.required&&!urlInp?.value.trim()){if(errEl)errEl.style.display='block';valid=false;return;}
    }else if(f.fieldType==='checkbox'){
      const cb=document.getElementById(fid);
      val=cb?cb.checked:false;
      if(f.required&&!val){if(errEl)errEl.style.display='block';valid=false;return;}
    }else{
      const el=document.getElementById(fid);
      val=el?el.value.trim():'';
      if(f.required&&!val){
        if(el)el.classList.add('error');
        if(errEl)errEl.style.display='block';
        valid=false;return;
      }
      if(el)el.classList.remove('error');
    }

    if(errEl)errEl.style.display='none';
    data[f.label||f.fieldType]=val;
  });

  if(!valid){return;}

  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='Submitting...';

  try{
    const ownerId=formData.userId;
    if(ownerId){
      const rl=await checkResponseLimit(db,ownerId);
      if(!rl.allowed){showResponseLimitError(rl.count,rl.limit);return;}
    }
    await addDoc(collection(db,'leads',LID,'responses'),{
      formId:LID,formTitle:lData.title,
      data,submittedAt:serverTimestamp()
    });

    // Email notification to host
    try{
      if(typeof SF_EMAIL!=='undefined'){
        const od=formData;
        if(od&&od.ownerEmail){
          SF_EMAIL.notifyNewResponse(
            od.ownerEmail,
            od.ownerName||od.hostName||'',
            od.title||'Lead Form',
            'Lead Form',
            (od.responseCount||od.totalVotes||od.totalPledges||0)+1,
            'https://swoopform.com/lead/responses/?id='+LID
          );
        }
      }
    }catch(ne){console.warn('Email notify:',ne);}

    try{await updateDoc(doc(db,'leads',LID),{responseCount:increment(1)});}catch(e){}
    document.getElementById('form-body').style.display='none';
    document.getElementById('offer-section').style.display='none';
    document.getElementById('thankyou').style.display='block';
    const redirectUrl=lData.redirectUrl;
    if(redirectUrl){
      const url=redirectUrl.startsWith('http')?redirectUrl:'https://'+redirectUrl;
      setTimeout(function(){window.location.href=url;},3000);
    }
  }catch(e){
    console.error(e);
    btn.disabled=false;
    btn.textContent=lData.buttonText||'Get Started →';
    alert('Error: '+e.message);
  }
};

function showError(msg){
  document.getElementById('loading-screen').innerHTML='<div style="text-align:center;padding:40px;"><div style="font-size:48px;margin-bottom:16px;">😕</div><div style="font-size:18px;font-weight:700;margin-bottom:8px;">Oops!</div><div style="font-size:14px;color:#7a7a8c;">'+msg+'</div><a href="/dashboard/" style="display:inline-block;margin-top:20px;padding:10px 20px;background:#e85d26;color:#fff;border-radius:8px;text-decoration:none;font-size:13px;">Go to Dashboard</a></div>';
}

init();

async function checkResponseLimit(db, ownerId){
  try{
    const {collection,query,where,getDocs,Timestamp}=await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    // Get start of current month
    const now=new Date();
    const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
    const monthTs={seconds:Math.floor(monthStart.getTime()/1000),nanoseconds:0};
    // Get owner's plan
    const {doc,getDoc}=await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    const userSnap=await getDoc(doc(db,'users',ownerId));
    const userData=userSnap.exists()?userSnap.data():{plan:'free'};
    const plan=userData.plan||'free';
    const LIMITS={free:100,starter:1000,pro:-1,business:-1,student:-1,educator:-1,ngo:-1};
    const limit=LIMITS[plan]??100;
    if(limit===-1)return{allowed:true,count:0,limit:-1};
    // Count responses this month across all response collections
    const RESP_COLS=['surveyResponses','pollResponses','votingResponses','pledgeResponses','riddleResponses'];
    let total=0;
    for(const col of RESP_COLS){
      try{
        const snap=await getDocs(query(collection(db,col),where('ownerId','==',ownerId)));
        // Filter by this month client-side (simpler than composite index)
        snap.forEach(function(d){
          const ts=d.data().createdAt?.seconds||0;
          if(ts>=monthTs.seconds)total++;
        });
      }catch(e){}
    }
    // Also check subcollection responses (assessment, feedback, lead, registration, employee, product, award, jobapp)
    const SUB_COLS=['assessments','feedbacks','leads','registrations','employees','products','awards','jobapps'];
    for(const col of SUB_COLS){
      try{
        const formsSnap=await getDocs(query(collection(db,col),where('userId','==',ownerId)));
        for(const formDoc of formsSnap.docs){
          const rSnap=await getDocs(collection(db,col,formDoc.id,'responses'));
          rSnap.forEach(function(d){
            const ts=d.data().createdAt?.seconds||0;
            if(ts>=monthTs.seconds)total++;
          });
        }
      }catch(e){}
    }
    return{allowed:total<limit,count:total,limit};
  }catch(e){return{allowed:true,count:0,limit:-1};}
}

function showResponseLimitError(count, limit){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;font-family:Sora,sans-serif;';
  overlay.innerHTML=`<div style="background:#fff;border-radius:20px;padding:32px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);">
    <div style="font-size:48px;margin-bottom:16px;">📊</div>
    <div style="font-size:20px;font-weight:800;color:#0f0e1a;margin-bottom:8px;">Form temporarily unavailable</div>
    <div style="font-size:14px;color:#64748b;margin-bottom:20px;line-height:1.6;">This form has reached its monthly response limit. The owner needs to upgrade their plan to continue collecting responses.</div>
    <div style="background:#f5f0e8;border-radius:10px;padding:14px;margin-bottom:20px;">
      <div style="font-size:13px;color:#64748b;">Monthly responses used</div>
      <div style="font-size:22px;font-weight:800;color:#e5484d;margin-top:4px;">${count} / ${limit}</div>
    </div>
    <a href="/" style="display:block;padding:12px;border-radius:10px;background:linear-gradient(135deg,#2d1b69,#7c3aed);color:#fff;font-size:14px;font-weight:700;text-decoration:none;">← Back to SwoopForm</a>
  </div>`;
  document.body.appendChild(overlay);
}
</script>
</body>
</html>
