<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Quiz — SwoopForm</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:linear-gradient(135deg,#1a0533,#2d1b69,#1a0533);background-attachment:fixed;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.card{background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1.5px solid rgba(255,255,255,.12);border-radius:24px;padding:36px;width:100%;max-width:440px;text-align:center;animation:slideUp .4s ease both;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{display:flex;align-items:center;text-decoration:none;flex-shrink:0;}
.title{font-weight:800;font-size:1.6rem;letter-spacing:-.03em;margin-bottom:6px;}
.sub{font-size:14px;color:rgba(255,255,255,.45);margin-bottom:28px;}
.pin-wrap{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.pin-d{width:64px;height:74px;border-radius:14px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-weight:800;font-size:2.2rem;text-align:center;outline:none;transition:border-color .2s;caret-color:transparent;font-family:'Sora',sans-serif;}
.pin-d:focus{border-color:#a855f7;}
.name-inp{width:100%;padding:13px 18px;border-radius:12px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:#fff;font-size:15px;font-family:'Sora',sans-serif;outline:none;text-align:center;margin-bottom:16px;transition:border-color .2s;}
.name-inp:focus{border-color:#a855f7;}
.name-inp::placeholder{color:rgba(255,255,255,.28);}
.join-btn{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-size:15px;font-weight:700;font-family:'Sora',sans-serif;cursor:pointer;transition:all .2s;}
.join-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,.4);}
.join-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
.err{font-size:13px;color:#ef4444;margin-bottom:12px;display:none;}

/* WAITING */
.wait-card{display:none;text-align:center;}
.wait-emoji{font-size:3.5rem;margin-bottom:16px;animation:bounce 1.2s ease infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.wait-name{font-weight:800;font-size:1.15rem;color:#a855f7;background:rgba(168,85,247,.15);border-radius:100px;padding:8px 28px;display:inline-block;margin-bottom:16px;}
.wait-title{font-weight:800;font-size:1.4rem;margin-bottom:6px;}
.wait-sub{font-size:14px;color:rgba(255,255,255,.4);}
.spinner{width:32px;height:32px;border:3px solid rgba(168,85,247,.2);border-top-color:#a855f7;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto 0;}
@keyframes spin{to{transform:rotate(360deg)}}

/* QUESTION */
.q-screen{display:none;width:100%;max-width:520px;}
.q-timer{font-weight:800;font-size:3rem;color:#f59e0b;text-align:center;margin-bottom:8px;transition:color .3s;font-variant-numeric:tabular-nums;}
.q-timer.urgent{color:#ef4444;animation:pulse .5s infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.q-prog{height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin-bottom:20px;overflow:hidden;}
.q-prog-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#a855f7);border-radius:3px;transition:width 1s linear;}
.q-num{font-size:11px;font-weight:700;color:#a855f7;letter-spacing:.1em;text-transform:uppercase;text-align:center;margin-bottom:10px;}
.q-text{font-weight:800;font-size:clamp(1.1rem,3vw,1.5rem);letter-spacing:-.02em;text-align:center;margin-bottom:24px;line-height:1.35;}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.opt-btn{padding:20px 14px;border-radius:14px;border:none;color:#fff;font-size:14px;font-weight:700;font-family:'Sora',sans-serif;cursor:pointer;transition:all .2s;text-align:center;display:flex;align-items:center;gap:8px;justify-content:center;}
.opt-btn:hover:not(.done){transform:scale(1.04);}
.opt-btn:active:not(.done){transform:scale(0.97);}
.opt-btn.done{cursor:default;transform:none;}
.opt-btn.correct{box-shadow:0 0 0 3px #10b981;}
.opt-btn.wrong{opacity:.45;}
.opt-letter{width:26px;height:26px;border-radius:7px;background:rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.type-ans-wrap{margin-top:8px;}
.type-ans-inp{width:100%;padding:14px 18px;border-radius:12px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:16px;font-family:'Sora',sans-serif;outline:none;text-align:center;margin-bottom:12px;}
.type-ans-inp:focus{border-color:#a855f7;}
.type-ans-inp::placeholder{color:rgba(255,255,255,.3);}
.type-ans-btn{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-size:14px;font-weight:700;font-family:'Sora',sans-serif;cursor:pointer;}
.type-ans-btn:disabled{opacity:.4;cursor:not-allowed;}
.feedback{text-align:center;padding:20px;font-size:1.5rem;animation:popIn .3s ease both;display:none;}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.pts-chip{display:inline-block;padding:6px 18px;border-radius:100px;font-weight:800;font-size:1rem;margin-top:8px;}

/* SCORE DISPLAY between questions -->
.between-card{display:none;text-align:center;}
.my-score-big{font-weight:800;font-size:3rem;color:#a855f7;margin:8px 0;}

/* RESULTS */
.results-card{display:none;text-align:center;}
.results-icon{font-size:4rem;margin-bottom:16px;animation:bounceIn .6s ease both;}
@keyframes bounceIn{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.results-title{font-weight:800;font-size:1.5rem;margin-bottom:6px;}
.results-score{font-weight:800;font-size:3rem;color:#a855f7;margin-bottom:4px;}
.results-sub{font-size:14px;color:rgba(255,255,255,.4);margin-bottom:20px;}
.lb-mini{display:flex;flex-direction:column;gap:6px;margin-bottom:20px;text-align:left;}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,.05);}
.lb-row.me{background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.3);}
.lb-rank{font-weight:800;width:24px;text-align:center;font-size:13px;color:rgba(255,255,255,.4);}
.lb-name{flex:1;font-weight:600;font-size:14px;}
.lb-score{font-weight:700;color:#a855f7;font-size:14px;}
@media(max-width:420px){.pin-d{width:52px;height:62px;font-size:1.8rem;}.opts-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- JOIN -->
<div class="card" id="join-card">
  <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><defs><linearGradient id="sg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#2d1b69"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#sg)"/><rect x="10" y="9" width="20" height="6" rx="3" fill="white"/><rect x="10" y="17" width="20" height="6" rx="3" fill="rgba(255,255,255,0.9)"/><rect x="10" y="25" width="20" height="6" rx="3" fill="white"/><circle cx="31" cy="12" r="3" fill="#d97706"/></svg>
  <div class="title">⚡ Join Quiz</div>
  <div class="sub">Enter the 4-digit PIN from your host</div>
  <div class="pin-wrap">
    <input class="pin-d" id="p0" maxlength="1" type="tel" oninput="pi(0)" onkeydown="pb(event,0)">
    <input class="pin-d" id="p1" maxlength="1" type="tel" oninput="pi(1)" onkeydown="pb(event,1)">
    <input class="pin-d" id="p2" maxlength="1" type="tel" oninput="pi(2)" onkeydown="pb(event,2)">
    <input class="pin-d" id="p3" maxlength="1" type="tel" oninput="pi(3)" onkeydown="pb(event,3)">
  </div>
  <input class="name-inp" id="pname" placeholder="Your name" maxlength="20">
  <div class="err" id="err"></div>
  <button class="join-btn" id="join-btn" onclick="joinQuiz()">Join →</button>
</div>

<!-- WAITING -->
<div class="card wait-card" id="wait-card">
  <div class="wait-emoji">🎮</div>
  <div class="wait-name" id="wait-name"></div>
  <div class="wait-title">You're in!</div>
  <div class="wait-sub">Waiting for the host to start the quiz...</div>
  <div class="spinner"></div>
</div>

<!-- QUESTION -->
<div class="q-screen" id="q-screen">
  <div class="q-timer" id="q-timer">--</div>
  <div class="q-prog"><div class="q-prog-fill" id="q-prog-fill" style="width:100%"></div></div>
  <div class="card" style="background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12);">
    <div class="q-num" id="q-num">Question 1</div>
    <div class="q-text" id="q-text"></div>
    <div class="opts-grid" id="opts-grid"></div>
    <div class="type-ans-wrap" id="type-ans-wrap" style="display:none;">
      <input class="type-ans-inp" id="type-ans-inp" placeholder="Type your answer..." onkeydown="if(event.key==='Enter')submitTypeAnswer()">
      <button class="type-ans-btn" id="type-ans-btn" onclick="submitTypeAnswer()">Submit →</button>
    </div>
    <div class="feedback" id="feedback"></div>
  </div>
</div>

<!-- BETWEEN QUESTIONS -->
<div class="card between-card" id="between-card">
  <div style="font-size:2rem;margin-bottom:12px;">🏆</div>
  <div style="font-weight:700;font-size:16px;margin-bottom:4px;">My Score</div>
  <div class="my-score-big" id="my-score-display">0 pts</div>
  <div style="font-size:13px;color:rgba(255,255,255,.4);">Next question coming up...</div>
  <div class="spinner"></div>
</div>

<!-- RESULTS -->
<div class="card results-card" id="results-card">
  <div class="results-icon">🏆</div>
  <div class="results-title">Quiz Complete!</div>
  <div class="results-score" id="final-score">0 pts</div>
  <div class="results-sub">Your final score</div>
  <div class="lb-mini" id="lb-mini"></div>
  <a href="/" style="color:rgba(255,255,255,.3);font-size:13px;text-decoration:none;">← Back to SwoopForm</a>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getDatabase,ref,get,push,set,update,onValue}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83",databaseURL:"https://swoopform-default-rtdb.asia-southeast1.firebasedatabase.app/"};
const app=initializeApp(FB);
const db=getDatabase(app);

const COLORS=['#ef4444','#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899'];
const LETTERS=['A','B','C','D','E','F'];
let sessionId=null,playerId=null,playerName='',myScore=0,timerInterval=null,answered=false,curQ=-1;

// PIN input
window.pi=function(i){
  const v=document.getElementById('p'+i).value.replace(/\D/g,'');
  document.getElementById('p'+i).value=v;
  if(v&&i<3)document.getElementById('p'+(i+1)).focus();
};
window.pb=function(e,i){if(e.key==='Backspace'&&!document.getElementById('p'+i).value&&i>0)document.getElementById('p'+(i-1)).focus();};
function getPin(){return[0,1,2,3].map(function(i){return document.getElementById('p'+i).value;}).join('');}

window.joinQuiz=async function(){
  const pin=getPin();
  const name=document.getElementById('pname').value.trim();
  const err=document.getElementById('err');
  if(pin.length!==4){err.textContent='Please enter the 4-digit PIN';err.style.display='block';return;}
  if(!name){err.textContent='Please enter your name';err.style.display='block';return;}
  err.style.display='none';
  const btn=document.getElementById('join-btn');btn.disabled=true;btn.textContent='Joining...';
  try{
    // Find session by PIN
    const snap=await get(ref(db,'quizSessions'));
    let found=null;
    if(snap.exists())snap.forEach(function(c){
      const s=c.val();
      if(s.code===pin&&s.status!=='ended')found={id:c.key,...s};
    });
    if(!found){err.textContent='PIN not found. Check with your host.';err.style.display='block';btn.disabled=false;btn.textContent='Join →';return;}
    sessionId=found.id;playerName=name;
    const pRef=push(ref(db,'quizPlayers/'+sessionId));
    playerId=pRef.key;
    await set(pRef,{name,score:0,joinedAt:Date.now()});
    document.getElementById('join-card').style.display='none';
    document.getElementById('wait-card').style.display='block';
    document.getElementById('wait-name').textContent=name;
    listenToSession();
  }catch(e){
    console.error(e);
    err.textContent='Something went wrong. Try again.';err.style.display='block';
    btn.disabled=false;btn.textContent='Join →';
  }
};

function listenToSession(){
  onValue(ref(db,'quizSessions/'+sessionId),function(snap){
    if(!snap.exists())return;
    const s=snap.val();
    if(s.status==='question'&&s.currentQuestion!==curQ){
      curQ=s.currentQuestion;answered=false;
      hideAll();
      document.getElementById('q-screen').style.display='flex';
      document.getElementById('q-screen').style.flexDirection='column';
      document.getElementById('q-screen').style.alignItems='center';
      renderQuestion(s.questions[curQ],curQ,s.questions.length,s.questionTimeLimit||20);
    }else if(s.status==='leaderboard'){
      hideAll();
      document.getElementById('between-card').style.display='block';
      document.getElementById('my-score-display').textContent=myScore+' pts';
    }else if(s.status==='ended'){
      showResults(s);
    }
  });
}

function hideAll(){
  ['wait-card','q-screen','between-card','results-card'].forEach(function(id){
    document.getElementById(id).style.display='none';
  });
}

function renderQuestion(q,idx,total,timeLimit){
  document.getElementById('q-num').textContent='Question '+(idx+1)+' of '+total;
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('feedback').style.display='none';
  document.getElementById('opts-grid').innerHTML='';
  document.getElementById('type-ans-wrap').style.display='none';

  if(q.type==='mcq'||q.type==='truefalse'){
    const opts=q.type==='truefalse'?['True','False']:q.options;
    document.getElementById('opts-grid').innerHTML=opts.map(function(o,i){
      return '<button class="opt-btn" id="opt_'+i+'" style="background:'+COLORS[i]+'" onclick="selectOpt('+i+')">'
        +'<div class="opt-letter">'+LETTERS[i]+'</div><span>'+eh(o)+'</span></button>';
    }).join('');
  }else{
    document.getElementById('type-ans-wrap').style.display='block';
    document.getElementById('type-ans-inp').value='';
    document.getElementById('type-ans-btn').disabled=false;
  }

  // Timer
  if(timerInterval)clearInterval(timerInterval);
  let tLeft=timeLimit;
  const timerEl=document.getElementById('q-timer');
  const fill=document.getElementById('q-prog-fill');
  timerEl.textContent=tLeft;timerEl.className='q-timer';
  timerInterval=setInterval(function(){
    tLeft--;timerEl.textContent=tLeft;
    if(fill)fill.style.width=(tLeft/timeLimit*100)+'%';
    if(tLeft<=5)timerEl.className='q-timer urgent';
    if(tLeft<=0){clearInterval(timerInterval);if(!answered)timeUp(q);}
  },1000);
}

window.selectOpt=async function(oi){
  if(answered)return;answered=true;clearInterval(timerInterval);
  const snap=await get(ref(db,'quizSessions/'+sessionId));
  const session=snap.val();
  const q=session.questions[curQ];
  const opts=q.type==='truefalse'?['True','False']:q.options;
  const isCorrect=oi===q.correctIndex;
  const timeLeft=parseInt(document.getElementById('q-timer').textContent)||0;
  const timePts=q.timeBonus?Math.round(timeLeft/q.timeLimit*q.points*0.5):0;
  const earned=isCorrect?(q.points+timePts):0;
  if(earned>0){
    myScore+=earned;
    await update(ref(db,'quizPlayers/'+sessionId+'/'+playerId),{score:myScore});
  }
  await push(ref(db,'quizAnswers/'+sessionId+'/'+curQ),{playerId,answer:oi,correct:isCorrect,points:earned});
  document.querySelectorAll('.opt-btn').forEach(function(b,i){
    b.classList.add('done');
    if(i===q.correctIndex)b.classList.add('correct');
    else if(i===oi&&!isCorrect)b.classList.add('wrong');
  });
  showFeedback(isCorrect,earned,LETTERS[q.correctIndex]);
};

window.submitTypeAnswer=async function(){
  if(answered)return;
  const inp=document.getElementById('type-ans-inp');
  const val=inp.value.trim();
  if(!val)return;
  answered=true;clearInterval(timerInterval);
  const snap=await get(ref(db,'quizSessions/'+sessionId));
  const q=snap.val().questions[curQ];
  const isCorrect=val.toLowerCase()===( q.answer||'').toLowerCase();
  const timeLeft=parseInt(document.getElementById('q-timer').textContent)||0;
  const timePts=q.timeBonus?Math.round(timeLeft/q.timeLimit*q.points*0.5):0;
  const earned=isCorrect?(q.points+timePts):0;
  if(earned>0){
    myScore+=earned;
    await update(ref(db,'quizPlayers/'+sessionId+'/'+playerId),{score:myScore});
  }
  await push(ref(db,'quizAnswers/'+sessionId+'/'+curQ),{playerId,answer:val,correct:isCorrect,points:earned});
  inp.disabled=true;
  document.getElementById('type-ans-btn').disabled=true;
  if(isCorrect)inp.style.borderColor='#10b981';
  else{inp.style.borderColor='#ef4444';}
  showFeedback(isCorrect,earned,q.answer);
};

function timeUp(q){
  answered=true;
  push(ref(db,'quizAnswers/'+sessionId+'/'+curQ),{playerId,answer:null,correct:false,points:0});
  document.querySelectorAll('.opt-btn').forEach(function(b,i){
    b.classList.add('done');
    if(i===q.correctIndex)b.classList.add('correct');
  });
  const fb=document.getElementById('feedback');
  fb.innerHTML='<div>⏰</div><div style="font-size:14px;color:rgba(255,255,255,.5);margin-top:6px;">Time\'s up!</div>';
  fb.style.display='block';
}

function showFeedback(isCorrect,pts,correctAns){
  const fb=document.getElementById('feedback');
  fb.innerHTML=isCorrect
    ?'<div>✅</div><div class="pts-chip" style="background:rgba(16,185,129,.2);color:#10b981;">+'+pts+' pts</div>'
    :'<div>❌</div><div style="font-size:13px;color:rgba(255,255,255,.5);margin-top:6px;">Answer: '+eh(correctAns)+'</div>';
  fb.style.display='block';
}

function showResults(s){
  hideAll();
  document.getElementById('results-card').style.display='block';
  document.getElementById('final-score').textContent=myScore+' pts';
  if(s.leaderboard){
    document.getElementById('lb-mini').innerHTML=s.leaderboard.slice(0,5).map(function(p,i){
      const isMe=p.name===playerName;
      return '<div class="lb-row'+(isMe?' me':'')+'">'
        +'<div class="lb-rank">'+(i+1)+'</div>'
        +'<div class="lb-name">'+eh(p.name)+(isMe?' (you)':'')+'</div>'
        +'<div class="lb-score">'+p.score+' pts</div>'
        +'</div>';
    }).join('');
  }
}

function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
</script>
</body>
</html>
