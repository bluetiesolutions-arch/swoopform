<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Screen — SwoopForm</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:#0f0e1a;color:#fff;min-height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.header{padding:16px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-box{width:32px;height:32px;background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;}
.logo-text{font-weight:800;font-size:16px;}
.pin-badge{font-weight:800;font-size:1.3rem;letter-spacing:.12em;color:#a855f7;background:rgba(168,85,247,.1);padding:6px 18px;border-radius:100px;border:1px solid rgba(168,85,247,.3);}
.player-count{font-size:14px;color:rgba(255,255,255,.4);}
.body{flex:1;display:flex;align-items:center;justify-content:center;padding:32px;position:relative;}

/* WAITING */
.wait-view{text-align:center;animation:fadeIn .5s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.pin-mega{font-weight:800;font-size:clamp(6rem,18vw,12rem);letter-spacing:.15em;color:#a855f7;line-height:1;margin-bottom:16px;}
.join-at{font-size:1.6rem;color:rgba(255,255,255,.5);margin-bottom:32px;}
.players-chips{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:900px;}
.p-chip{padding:10px 20px;border-radius:100px;background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.25);font-size:1rem;font-weight:600;color:#c4b5fd;animation:popIn .3s ease both;}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}

/* QUESTION */
.q-view{width:100%;max-width:1100px;animation:fadeIn .4s ease;}
.timer-ring{font-weight:800;font-size:clamp(4rem,10vw,8rem);color:#f59e0b;text-align:center;margin-bottom:16px;font-variant-numeric:tabular-nums;transition:color .3s;line-height:1;}
.timer-ring.urgent{color:#ef4444;animation:pulse .5s infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.timer-bar{height:10px;background:rgba(255,255,255,.08);border-radius:5px;margin-bottom:28px;overflow:hidden;}
.timer-bar-fill{height:100%;background:linear-gradient(90deg,#f59e0b,#ef4444);border-radius:5px;transition:width 1s linear;}
.q-label{font-size:14px;font-weight:700;color:#a855f7;letter-spacing:.1em;text-transform:uppercase;text-align:center;margin-bottom:12px;}
.q-txt{font-weight:800;font-size:clamp(1.8rem,4vw,3rem);text-align:center;margin-bottom:32px;line-height:1.2;letter-spacing:-.03em;}
.opts-big{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.opt-big{padding:28px 32px;border-radius:18px;font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;transition:all .3s;}
.opt-big-bar{position:absolute;left:0;top:0;bottom:0;border-radius:18px;opacity:.25;transition:width .5s ease;width:0;}
.opt-big-letter{width:40px;height:40px;border-radius:10px;background:rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;flex-shrink:0;}
.opt-big-text{flex:1;position:relative;z-index:1;}
.opt-big-count{font-weight:800;font-size:1.3rem;color:rgba(255,255,255,.7);position:relative;z-index:1;}
.opt-big.revealed-correct{box-shadow:0 0 0 4px #10b981;}
.opt-big.revealed-wrong{opacity:.35;}
.resp-count{text-align:center;font-size:1rem;color:rgba(255,255,255,.35);margin-top:12px;}

/* LEADERBOARD */
.lb-view{width:100%;max-width:800px;text-align:center;animation:fadeIn .4s ease;}
.lb-title-big{font-weight:800;font-size:clamp(2.5rem,6vw,4rem);letter-spacing:-.04em;margin-bottom:28px;}
.lb-rows{display:flex;flex-direction:column;gap:12px;}
.lb-row-big{display:flex;align-items:center;gap:18px;padding:18px 28px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);}
.lb-row-big.top{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.06);}
.lb-rank-big{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.3rem;flex-shrink:0;}
.lb-rank-big.gold{background:linear-gradient(135deg,#f59e0b,#fcd34d);color:#92400e;}
.lb-rank-big.silver{background:linear-gradient(135deg,#94a3b8,#cbd5e1);color:#1c1c2e;}
.lb-rank-big.bronze{background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff;}
.lb-rank-big.other{background:rgba(255,255,255,.07);color:rgba(255,255,255,.4);}
.lb-name-big{flex:1;font-weight:700;font-size:1.3rem;text-align:left;}
.lb-score-big{font-weight:800;font-size:1.5rem;color:#a855f7;}

/* ENDED */
.ended-view{text-align:center;animation:fadeIn .5s ease;}
</style>
</head>
<body>
<div class="header">
  <div class="logo-wrap"><div class="logo-box">S</div><div class="logo-text">SwoopForm Live Quiz</div></div>
  <div class="pin-badge" id="hdr-pin">----</div>
  <div class="player-count" id="hdr-players">0 players</div>
</div>
<div class="body" id="body">
  <div style="text-align:center;">
    <div style="width:40px;height:40px;border:4px solid rgba(168,85,247,.2);border-top-color:#a855f7;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto;"></div>
    <div style="margin-top:16px;font-size:14px;color:rgba(255,255,255,.4);">Connecting...</div>
  </div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getDatabase,ref,onValue}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83",databaseURL:"https://swoopform-default-rtdb.asia-southeast1.firebasedatabase.app/"};
const app=initializeApp(FB);
const db=getDatabase(app);

const COLORS=['#ef4444','#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899'];
const LETTERS=['A','B','C','D','E','F'];
const RANK_CLASS=['gold','silver','bronze'];
const RANK_EMOJI=['🥇','🥈','🥉'];

const params=new URLSearchParams(window.location.search);
const sessionId=params.get('session');
let timerInterval=null,curQ=-1;

if(!sessionId){
  document.getElementById('body').innerHTML='<div style="text-align:center;"><div style="font-size:48px;margin-bottom:16px;">😕</div><div style="font-size:18px;font-weight:700;">No session ID</div></div>';
}else{
  // Listen to session
  onValue(ref(db,'quizSessions/'+sessionId),function(snap){
    if(!snap.exists())return;
    const s=snap.val();
    document.getElementById('hdr-pin').textContent=s.code||'----';
    if(s.status==='waiting')renderWaiting(s);
    else if(s.status==='question'&&s.currentQuestion!==curQ){curQ=s.currentQuestion;renderQuestion(s);}
    else if(s.status==='reveal')revealAnswers(s);
    else if(s.status==='leaderboard')renderLeaderboard(s);
    else if(s.status==='ended')renderEnded(s);
  });

  // Player count
  onValue(ref(db,'quizPlayers/'+sessionId),function(snap){
    const count=snap.exists()?Object.keys(snap.val()).length:0;
    document.getElementById('hdr-players').textContent=count+' player'+(count!==1?'s':'');
    // Update waiting chips if visible
    const grid=document.getElementById('players-chips-wrap');
    if(grid){
      const names=snap.exists()?Object.values(snap.val()).map(function(p){return p.name;}):[];
      grid.innerHTML=names.map(function(n){return '<div class="p-chip">'+eh(n)+'</div>';}).join('');
    }
  });
}

function renderWaiting(s){
  document.getElementById('body').innerHTML=
    '<div class="wait-view">'
    +'<div style="font-size:1.2rem;color:rgba(255,255,255,.4);margin-bottom:8px;">Join at swoopform.com/quiz/play · PIN</div>'
    +'<div class="pin-mega">'+s.code+'</div>'
    +'<div class="join-at">swoopform.com/quiz/play</div>'
    +'<div class="players-chips" id="players-chips-wrap"></div>'
    +'</div>';
}

function renderQuestion(s){
  clearInterval(timerInterval);
  const q=s.questions[s.currentQuestion];
  const opts=q.type==='truefalse'?['True','False']:q.options||[];
  const timeLimit=s.questionTimeLimit||q.timeLimit||20;

  document.getElementById('body').innerHTML=
    '<div class="q-view">'
    +'<div class="timer-ring" id="scr-timer">'+timeLimit+'</div>'
    +'<div class="timer-bar"><div class="timer-bar-fill" id="scr-timer-bar" style="width:100%"></div></div>'
    +'<div class="q-label">Question '+(s.currentQuestion+1)+' of '+s.questions.length+'</div>'
    +'<div class="q-txt">'+eh(q.text)+'</div>'
    +'<div class="opts-big">'+opts.map(function(o,i){
      return '<div class="opt-big" id="scr-opt-'+i+'" style="background:'+COLORS[i]+'22;border:2px solid '+COLORS[i]+'44;">'
        +'<div class="opt-big-bar" id="scr-fill-'+i+'" style="background:'+COLORS[i]+'"></div>'
        +'<div class="opt-big-letter" style="background:'+COLORS[i]+'44">'+LETTERS[i]+'</div>'
        +'<div class="opt-big-text">'+eh(o)+'</div>'
        +'<div class="opt-big-count" id="scr-cnt-'+i+'">0</div>'
        +'</div>';
    }).join('')+'</div>'
    +'<div class="resp-count" id="scr-resp">0 responses</div>'
    +'</div>';

  // Timer
  let tLeft=timeLimit;
  const timerEl=document.getElementById('scr-timer');
  const barEl=document.getElementById('scr-timer-bar');
  timerInterval=setInterval(function(){
    tLeft--;
    if(timerEl)timerEl.textContent=tLeft;
    if(barEl)barEl.style.width=(tLeft/timeLimit*100)+'%';
    if(tLeft<=5&&timerEl)timerEl.className='timer-ring urgent';
    if(tLeft<=0)clearInterval(timerInterval);
  },1000);

  // Live answers
  onValue(ref(db,'quizAnswers/'+sessionId+'/'+s.currentQuestion),function(aSnap){
    const counts={};opts.forEach(function(_,i){counts[i]=0;});
    let total=0;
    if(aSnap.exists())aSnap.forEach(function(c){
      const a=c.val();
      if(q.type==='typeanswer'){const slot=a.correct?0:1;counts[slot]=(counts[slot]||0)+1;}
      else if(a.answer!==undefined)counts[a.answer]=(counts[a.answer]||0)+1;
      total++;
    });
    const max=Math.max(...Object.values(counts),1);
    opts.forEach(function(_,i){
      const fill=document.getElementById('scr-fill-'+i);
      const cnt=document.getElementById('scr-cnt-'+i);
      if(fill)fill.style.width=(counts[i]/max*100)+'%';
      if(cnt)cnt.textContent=counts[i];
    });
    const resp=document.getElementById('scr-resp');
    if(resp)resp.textContent=total+' response'+(total!==1?'s':'');
  });
}

function revealAnswers(s){
  clearInterval(timerInterval);
  const q=s.questions[s.currentQuestion];
  const opts=q.type==='truefalse'?['True','False']:q.options||[];
  opts.forEach(function(_,i){
    const bar=document.getElementById('scr-opt-'+i);if(!bar)return;
    const isCorrect=q.type==='typeanswer'?i===0:i===q.correctIndex;
    bar.classList.add(isCorrect?'revealed-correct':'revealed-wrong');
  });
}

function renderLeaderboard(s){
  clearInterval(timerInterval);
  const lb=s.leaderboard||[];
  document.getElementById('body').innerHTML=
    '<div class="lb-view">'
    +'<div class="lb-title-big">🏆 Leaderboard</div>'
    +'<div class="lb-rows">'+lb.map(function(p,i){
      return '<div class="lb-row-big'+(i===0?' top':'')+'">'
        +'<div class="lb-rank-big '+(RANK_CLASS[i]||'other')+'">'+(RANK_EMOJI[i]||i+1)+'</div>'
        +'<div class="lb-name-big">'+eh(p.name)+'</div>'
        +'<div class="lb-score-big">'+p.score+' pts</div>'
        +'</div>';
    }).join('')+'</div>'
    +'</div>';
}

function renderEnded(s){
  clearInterval(timerInterval);
  const lb=s.leaderboard||[];
  document.getElementById('body').innerHTML=
    '<div class="ended-view">'
    +'<div style="font-size:5rem;margin-bottom:16px;">🏆</div>'
    +'<div style="font-weight:800;font-size:clamp(2rem,6vw,4rem);letter-spacing:-.04em;margin-bottom:28px;">Final Results</div>'
    +'<div class="lb-rows">'+lb.slice(0,5).map(function(p,i){
      return '<div class="lb-row-big'+(i===0?' top':'')+'">'
        +'<div class="lb-rank-big '+(RANK_CLASS[i]||'other')+'">'+(RANK_EMOJI[i]||i+1)+'</div>'
        +'<div class="lb-name-big">'+eh(p.name)+'</div>'
        +'<div class="lb-score-big">'+p.score+' pts</div>'
        +'</div>';
    }).join('')+'</div>'
    +'<div style="margin-top:28px;font-size:1rem;color:rgba(255,255,255,.3);">Powered by SwoopForm</div>'
    +'</div>';
}

function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
</script>
</body>
</html>
