<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Screen — SwoopForm</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#0F0E1A;color:#fff;min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
    .screen-header{padding:16px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.06)}
    .screen-logo{display:flex;align-items:center;gap:10px}
    .logo-mk{width:32px;height:32px;background:linear-gradient(135deg,#2D1B69,#D97706);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.9rem}
    .logo-nm{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem}
    .join-code-sm{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:#A855F7;letter-spacing:0.12em;background:rgba(168,85,247,0.1);padding:6px 16px;border-radius:100px;border:1px solid rgba(168,85,247,0.3)}
    .player-count-sm{font-size:0.85rem;color:rgba(255,255,255,0.4)}
    .screen-body{flex:1;display:flex;align-items:center;justify-content:center;padding:32px;position:relative}

    /* WAITING */
    .waiting-display{text-align:center;animation:slideUp 0.5s ease}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .big-pin{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(5rem,15vw,10rem);letter-spacing:0.15em;color:#A855F7;line-height:1}
    .big-pin-label{font-size:1.2rem;color:rgba(255,255,255,0.4);margin-bottom:16px}
    .join-url-big{font-size:1.4rem;color:rgba(255,255,255,0.6);margin-bottom:32px}
    .players-display{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:800px}
    .player-pill{padding:8px 18px;border-radius:100px;background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.3);font-size:1rem;font-weight:600;color:#C4B5FD;animation:popIn 0.3s ease both}
    @keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}

    /* QUESTION */
    .question-display{width:100%;max-width:1000px;animation:slideUp 0.4s ease}
    .timer-big{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(3rem,8vw,6rem);color:#F59E0B;text-align:center;margin-bottom:12px;transition:color 0.3s}
    .timer-big.urgent{color:#EF4444;animation:pulse 0.5s ease infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    .timer-bar{height:8px;background:rgba(255,255,255,0.08);border-radius:4px;margin-bottom:28px;overflow:hidden}
    .timer-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#F59E0B,#EF4444);transition:width 1s linear}
    .q-display-num{font-size:0.85rem;font-weight:700;color:#A855F7;letter-spacing:0.1em;text-transform:uppercase;text-align:center;margin-bottom:12px}
    .q-display-text{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.6rem,4vw,2.6rem);text-align:center;margin-bottom:32px;line-height:1.2;letter-spacing:-0.03em}
    .options-big{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .opt-big{padding:24px 28px;border-radius:16px;font-size:1.2rem;font-weight:700;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;transition:all 0.3s}
    .opt-big-bar{position:absolute;left:0;top:0;bottom:0;border-radius:16px;opacity:0.3;transition:width 0.5s ease;width:0}
    .opt-big-letter{width:36px;height:36px;border-radius:8px;background:rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;font-size:0.9rem;font-weight:800;flex-shrink:0}
    .opt-big-text{flex:1;position:relative;z-index:1}
    .opt-big-count{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:rgba(255,255,255,0.8);position:relative;z-index:1}
    .opt-big.correct{box-shadow:0 0 0 3px #10B981}
    .responses-bar-count{text-align:center;font-size:0.9rem;color:rgba(255,255,255,0.4);margin-top:8px}

    /* LEADERBOARD */
    .lb-display{width:100%;max-width:700px;text-align:center;animation:slideUp 0.4s ease}
    .lb-title-big{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2rem,5vw,3rem);letter-spacing:-0.04em;margin-bottom:28px}
    .lb-rows{display:flex;flex-direction:column;gap:10px}
    .lb-row-big{display:flex;align-items:center;gap:16px;padding:16px 24px;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06)}
    .lb-rank-big{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;flex-shrink:0}
    .lb-name-big{flex:1;font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem}
    .lb-score-big{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:#A855F7}
  </style>
</head>
<body>
<div class="screen-header">
  <div class="screen-logo"><div class="logo-mk">S</div><div class="logo-nm">SwoopForm Quiz</div></div>
  <div class="join-code-sm" id="join-code-sm">----</div>
  <div class="player-count-sm" id="player-count-sm">0 players</div>
</div>
<div class="screen-body" id="screen-body">
  <div style="text-align:center"><div style="width:40px;height:40px;border:4px solid rgba(168,85,247,0.2);border-top-color:#A855F7;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto"></div></div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getDatabase,ref,onValue}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83",databaseURL:"https://swoopform-default-rtdb.firebaseio.com"};
const app=initializeApp(FB);
const db=getDatabase(app);

const params=new URLSearchParams(window.location.search);
const sessionId=params.get('session');
const COLORS=['#EF4444','#3B82F6','#10B981','#F59E0B','#8B5CF6','#EC4899'];
const LETTERS=['A','B','C','D','E','F'];
let timerInterval=null,currentQ=-1;

if(!sessionId){document.getElementById('screen-body').innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.4)">No session ID provided</div>';} else {
  onValue(ref(db,'quizSessions/'+sessionId),snap=>{
    if(!snap.exists())return;
    const s=snap.val();
    document.getElementById('join-code-sm').textContent=s.code||'----';
    if(s.status==='waiting')showWaiting(s);
    else if(s.status==='question'&&s.currentQuestion!==currentQ){currentQ=s.currentQuestion;showQuestion(s)}
    else if(s.status==='reveal')revealAnswers(s);
    else if(s.status==='leaderboard')showLeaderboard(s);
    else if(s.status==='ended')showEnded(s);
  });
  onValue(ref(db,'quizPlayers/'+sessionId),snap=>{
    const count=snap.exists()?snap.size:0;
    document.getElementById('player-count-sm').textContent=count+' player'+(count!==1?'s':'');
    if(document.getElementById('players-display')){
      const players=[];if(snap.exists())snap.forEach(c=>players.push(c.val().name));
      document.getElementById('players-display').innerHTML=players.map(n=>`<div class="player-pill">${n}</div>`).join('');
    }
  });
}

function showWaiting(s){
  document.getElementById('screen-body').innerHTML=`<div class="waiting-display">
    <div class="big-pin-label">Join at swoopform.com/quiz/play · Enter PIN</div>
    <div class="big-pin">${s.code||'----'}</div>
    <div class="join-url-big" style="margin-top:16px">${s.title||'Quiz'}</div>
    <div class="players-display" id="players-display"></div>
  </div>`;
}

function showQuestion(s){
  const q=s.questions[s.currentQuestion];const timeLimit=q.timeLimit||20;
  if(timerInterval)clearInterval(timerInterval);
  document.getElementById('screen-body').innerHTML=`<div class="question-display">
    <div class="timer-big" id="timer-big">${timeLimit}</div>
    <div class="timer-bar"><div class="timer-bar-fill" id="timer-bar-fill" style="width:100%"></div></div>
    <div class="q-display-num">Question ${s.currentQuestion+1} of ${s.questions.length}</div>
    <div class="q-display-text">${q.text}</div>
    <div class="options-big">
      ${q.options.map((o,oi)=>`<div class="opt-big" id="obig-${oi}" style="background:${COLORS[oi]||'#64748B'}">
        <div class="opt-big-bar" id="obar-${oi}" style="background:rgba(255,255,255,0.3)"></div>
        <div class="opt-big-letter">${LETTERS[oi]}</div>
        <div class="opt-big-text">${o}</div>
        <div class="opt-big-count" id="ocnt-${oi}">0</div>
      </div>`).join('')}
    </div>
    <div class="responses-bar-count" id="resp-count">0 responses</div>
  </div>`;

  let timeLeft=timeLimit;
  const timerEl=document.getElementById('timer-big');
  timerInterval=setInterval(()=>{
    timeLeft--;timerEl.textContent=timeLeft;
    const fill=document.getElementById('timer-bar-fill');if(fill)fill.style.width=(timeLeft/timeLimit*100)+'%';
    if(timeLeft<=5)timerEl.className='timer-big urgent';
    if(timeLeft<=0)clearInterval(timerInterval);
  },1000);

  onValue(ref(db,'quizAnswers/'+sessionId+'/'+s.currentQuestion),snap=>{
    const counts={};q.options.forEach((_,oi)=>counts[oi]=0);let total=0;
    if(snap.exists())snap.forEach(c=>{const a=c.val();if(a.answer!==undefined){counts[a.answer]=(counts[a.answer]||0)+1;total++}});
    const max=Math.max(...Object.values(counts),1);
    q.options.forEach((_,oi)=>{
      const bar=document.getElementById('obar-'+oi);const cnt=document.getElementById('ocnt-'+oi);
      if(bar)bar.style.width=(counts[oi]/max*100)+'%';if(cnt)cnt.textContent=counts[oi];
    });
    const rc=document.getElementById('resp-count');if(rc)rc.textContent=total+' response'+(total!==1?'s':'');
  });
}

function revealAnswers(s){
  clearInterval(timerInterval);
  const q=s.questions[s.currentQuestion];
  q.options.forEach((_,oi)=>{
    const opt=document.getElementById('obig-'+oi);
    if(opt){if(oi===q.correctIndex)opt.classList.add('correct');else opt.style.opacity='0.35'}
  });
}

function showLeaderboard(s){
  clearInterval(timerInterval);
  const lb=s.leaderboard||[];
  const rankColors=['#F59E0B','#94A3B8','#D97706'];
  document.getElementById('screen-body').innerHTML=`<div class="lb-display">
    <div class="lb-title-big">🏆 Leaderboard</div>
    <div class="lb-rows">${lb.slice(0,5).map((p,i)=>`<div class="lb-row-big" style="animation:slideUp 0.4s ease ${i*0.1}s both">
      <div class="lb-rank-big" style="background:${rankColors[i]||'rgba(255,255,255,0.08)'};color:${i<3?'#0F0E1A':'rgba(255,255,255,0.4)'}">${i+1}</div>
      <div class="lb-name-big">${p.name}</div>
      <div class="lb-score-big">${p.score} pts</div>
    </div>`).join('')}</div>
  </div>`;
}

function showEnded(s){
  clearInterval(timerInterval);
  const lb=s.leaderboard||[];
  document.getElementById('screen-body').innerHTML=`<div class="lb-display">
    <div class="lb-title-big">🎉 Quiz Complete!</div>
    <div style="font-size:1rem;color:rgba(255,255,255,0.4);margin-bottom:24px;text-align:center">Final Results</div>
    <div class="lb-rows">${lb.slice(0,5).map((p,i)=>`<div class="lb-row-big"><div class="lb-rank-big" style="background:${['#F59E0B','#94A3B8','#D97706'][i]||'rgba(255,255,255,0.08)'};color:${i<3?'#0F0E1A':'rgba(255,255,255,0.4)'}">${i===0?'🏆':i+1}</div><div class="lb-name-big">${p.name}</div><div class="lb-score-big">${p.score} pts</div></div>`).join('')}</div>
    <div style="margin-top:24px;text-align:center;font-size:0.85rem;color:rgba(255,255,255,0.3)">Powered by SwoopForm</div>
  </div>`;
}
</script>
</body>
</html>
