<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey — SwoopForm</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F5F0E8;--card:#fff;--border:#E2DAD0;--accent:#2D1B69;--accent2:#D97706;--text:#0F0E1A;--muted:#64748B}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.progress-bar{position:fixed;top:0;left:0;right:0;height:3px;background:rgba(0,0,0,0.08);z-index:200}
.progress-fill{height:100%;background:linear-gradient(90deg,#2D1B69,#D97706);transition:width 0.5s ease}
.top-nav{position:fixed;top:3px;left:0;right:0;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;z-index:99}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;opacity:0.5;transition:opacity 0.2s}
.nav-logo:hover{opacity:1}
.logo-mk{width:26px;height:26px;background:linear-gradient(135deg,#2d1b69,#7c3aed);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.75rem;color:#fff}
.logo-nm{font-family:'Syne',sans-serif;font-weight:800;font-size:0.9rem;color:var(--text)}
.progress-txt{font-size:0.72rem;color:var(--muted);font-weight:600}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:80px 20px 100px;min-height:100vh}
.q-wrap{width:100%;max-width:640px;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.q-num{font-size:0.72rem;font-weight:700;color:var(--accent);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.q-num-badge{width:22px;height:22px;border-radius:5px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:800}
.q-text{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.2rem,3vw,1.8rem);letter-spacing:-0.03em;line-height:1.3;margin-bottom:24px;color:var(--text)}
.q-text .req{color:#EF4444;margin-left:4px}
.choice-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.choice-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all 0.15s;text-align:left;font-family:'DM Sans',sans-serif;font-size:0.92rem;font-weight:500;color:var(--text);width:100%}
.choice-btn:hover{border-color:var(--accent);background:#EDE9FF}
.choice-btn.selected{border-color:var(--accent);background:#EDE9FF;color:var(--accent);font-weight:700}
.choice-key{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:700;flex-shrink:0;transition:all 0.15s}
.choice-btn.selected .choice-key{background:var(--accent);border-color:var(--accent);color:#fff}
.choice-cb{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.choice-cb.selected{background:var(--accent);border-color:var(--accent)}
.choice-cb.selected::after{content:'✓';color:#fff;font-size:0.65rem;font-weight:700}
.yesno-group{display:flex;gap:12px;margin-bottom:20px}
.yesno-btn{flex:1;padding:18px;border-radius:12px;border:2px solid var(--border);background:var(--card);font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:all 0.2s;color:var(--text)}
.yesno-btn:hover{border-color:var(--accent);background:#EDE9FF}
.yesno-btn.selected{border-color:var(--accent);background:#EDE9FF;color:var(--accent)}
.eo-group{display:flex;gap:12px;margin-bottom:20px;width:100%}
.eo-btn{flex:1;padding:20px 16px;border-radius:12px;border:2px solid var(--border);background:var(--card);font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;transition:all 0.2s;color:var(--text);text-align:center}
.eo-btn:hover{border-color:var(--accent);background:#EDE9FF}
.eo-btn.selected{border-color:var(--accent);background:#EDE9FF;color:var(--accent)}
.eo-label{font-size:0.62rem;font-weight:700;color:var(--muted);letter-spacing:0.08em;margin-bottom:6px}
.eo-or{display:flex;align-items:center;font-size:0.75rem;font-weight:700;color:var(--muted);flex-shrink:0;padding:0 4px}
.text-ans{width:100%;padding:14px 16px;border-radius:10px;border:2px solid var(--border);background:var(--card);font-size:1rem;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;transition:border-color 0.2s;margin-bottom:16px}
.text-ans:focus{border-color:var(--accent)}
.text-ans::placeholder{color:#C4B9AA}
.textarea-ans{width:100%;padding:14px 16px;border-radius:10px;border:2px solid var(--border);background:var(--card);font-size:1rem;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;transition:border-color 0.2s;margin-bottom:16px;resize:vertical;min-height:120px}
.textarea-ans:focus{border-color:var(--accent)}
.scale-group{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.scale-btn{width:48px;height:48px;border-radius:9px;border:1.5px solid var(--border);background:var(--card);font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.15s;color:var(--text)}
.scale-btn:hover{border-color:var(--accent);background:#EDE9FF}
.scale-btn.selected{background:var(--accent);border-color:var(--accent);color:#fff}
.rating-group{display:flex;gap:8px;margin-bottom:20px}
.rating-btn{flex:1;height:52px;border-radius:9px;border:1.5px solid var(--border);background:var(--card);font-size:1.1rem;cursor:pointer;transition:all 0.2s}
.rating-btn:hover{border-color:var(--accent);background:#EDE9FF}
.rating-btn.selected{background:var(--accent);border-color:var(--accent);color:#fff}
.next-btn{display:inline-flex;align-items:center;gap:10px;padding:13px 26px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:0.95rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s}
.next-btn:hover{opacity:0.88;transform:translateY(-1px)}
.next-hint{font-size:0.72rem;color:var(--muted);margin-left:8px}
.media-wrap{margin-bottom:20px;border-radius:12px;overflow:hidden;border:1.5px solid var(--border)}
.media-wrap img{width:100%;max-height:280px;object-fit:cover;display:block}
.media-wrap iframe{width:100%;height:220px;border:none;display:block}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;padding:16px 20px;display:flex;align-items:center;gap:8px;background:linear-gradient(to top,var(--bg) 60%,transparent);z-index:99}
.nav-up,.nav-dn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center}
.nav-up:hover,.nav-dn:hover{border-color:var(--accent);color:var(--accent)}
.nav-up:disabled,.nav-dn:disabled{opacity:0.3;cursor:not-allowed}
.welcome-screen{text-align:center;max-width:560px;padding:20px}
.welcome-icon{font-size:3rem;margin-bottom:16px}
.welcome-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.6rem,4vw,2.4rem);letter-spacing:-0.04em;margin-bottom:12px;line-height:1.2}
.welcome-desc{font-size:0.95rem;color:var(--muted);margin-bottom:28px;line-height:1.7}
.start-btn{padding:15px 36px;border-radius:12px;border:none;background:linear-gradient(135deg,#2d1b69,#7c3aed);color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;transition:all 0.2s}
.start-btn:hover{opacity:0.9;transform:translateY(-2px)}
.thankyou-screen{text-align:center;max-width:480px;padding:20px}
.ty-icon{font-size:3.5rem;margin-bottom:16px;animation:pop 0.5s ease}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.ty-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.4rem,3vw,2rem);letter-spacing:-0.03em;margin-bottom:10px}
.ty-msg{font-size:0.92rem;color:var(--muted);margin-bottom:24px;line-height:1.6}
.share-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.share-btn{padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:0.78rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text);text-decoration:none;transition:all 0.2s}
.share-btn:hover{border-color:var(--accent);color:var(--accent)}
.sf-brand{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:24px;opacity:0.35}
.sf-brand-logo{width:18px;height:18px;border-radius:4px;background:linear-gradient(135deg,#2d1b69,#7c3aed);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.55rem;color:#fff}
.sf-brand-text{font-size:0.7rem;color:var(--muted)}
.error-screen{text-align:center;padding:40px 20px;max-width:400px}
.section-intro{text-align:center;max-width:480px;padding:20px}
.section-intro-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:-0.03em;margin-bottom:8px}
.section-intro-sub{font-size:0.92rem;color:var(--muted);margin-bottom:20px}
.ls{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:900;flex-direction:column;gap:12px}
.sp{width:30px;height:30px;border:3px solid rgba(45,27,105,0.15);border-top-color:#2D1B69;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ls-txt{font-size:0.82rem;color:var(--muted)}
@media(max-width:600px){.stage{padding:70px 16px 90px}.eo-group{flex-direction:column}.eo-or{justify-content:center}}
</style>
</head>
<body>
<div class="ls" id="ls"><div class="sp"></div><div class="ls-txt">Loading survey...</div></div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
<nav class="top-nav">
  <a href="/" class="nav-logo"><svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="sg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#2d1b69"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#sg)"/><rect x="10" y="9" width="20" height="6" rx="3" fill="white"/><rect x="10" y="17" width="20" height="6" rx="3" fill="rgba(255,255,255,0.9)"/><rect x="10" y="25" width="20" height="6" rx="3" fill="white"/><circle cx="31" cy="12" r="3" fill="#d97706"/></svg><div class="logo-nm">SwoopForm</div></a>
  <span class="progress-txt" id="progress-txt"></span>
</nav>
<div class="stage" id="stage"></div>
<div class="bottom-nav" id="bottom-nav" style="display:none">
  <button class="nav-up" id="nav-up" onclick="prevStep()">↑</button>
  <button class="nav-dn" id="nav-dn" onclick="nextStep()">↓</button>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,collection,query,where,getDocs,doc,getDoc,addDoc,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);
const db=getFirestore(app);

// ── STATE ─────────────────────────────────────────────
let survey=null,surveyId=null;
let questions=[],sections=[];
let steps=[],currentStep=0;
let answers={},hiddenQs=new Set();
let quizScore=0,quizTotal=0;

// ── INIT ──────────────────────────────────────────────
async function init(){
  try{
    const path=window.location.pathname; // e.g. /survey/my-slug or /survey/
    const parts=path.split('/').filter(Boolean); // ['survey','my-slug'] or ['survey']
    const slug=parts[1]||null;
    const idParam=new URLSearchParams(window.location.search).get('id');

    let snap=null;

    if(slug){
      // Try by slug field first
      const q=query(collection(db,'surveys'),where('slug','==',slug));
      const res=await getDocs(q);
      if(!res.empty){snap=res.docs[0];surveyId=snap.id}
      else{
        // Try by document ID
        const byId=await getDoc(doc(db,'surveys',slug));
        if(byId.exists()){snap=byId;surveyId=byId.id}
      }
    } else if(idParam){
      const byId=await getDoc(doc(db,'surveys',idParam));
      if(byId.exists()){snap=byId;surveyId=byId.id}
    }

    if(!snap){showError('Survey not found','This survey may have been removed or the link is incorrect.');return}

    survey=snap.data?snap.data():snap;

    if(survey.status==='closed'){showError('Survey closed','This survey is no longer accepting responses.');return}

    // ── LOAD QUESTIONS ────────────────────────────────
    // Support both new format (items array) and old format (questions array)
    const rawItems=survey.items||survey.questions||[];
    questions=rawItems.filter(i=>!i.kind||i.kind==='q').map(i=>({
      id:i.id||('q'+Math.random().toString(36).slice(2)),
      type:i.type||'multiple',
      text:i.text||i.question||'',
      options:i.options||[],
      required:i.required||false,
      correctIndex:i.correctIndex??-1,
      sectionId:i.sectionId||null,
      mediaUrl:i.mediaUrl||'',
      mediaLayout:i.mediaLayout||'top',
      logic:i.logic||[],
      timerEnabled:i.timerEnabled||false,
      timerSeconds:i.timerSeconds||30
    }));
    sections=rawItems.filter(i=>i.kind==='sec');


    
    buildSteps();
    document.getElementById('ls').style.display='none';

    // Apply welcome page bg
    const wp=survey.welcomePage||survey.welcome||{};
    if(wp.bgColor)document.body.style.background=wp.bgColor;

    showWelcome();
  }catch(e){
    console.error(e);
    showError('Something went wrong','Please try again or contact the survey creator.');
  }
}

// ── BUILD STEPS ───────────────────────────────────────
function buildSteps(){
  steps=[];
  steps.push({type:'welcome'});

  if(sections.length===0){
    // No sections — just add all questions in order
    questions.forEach(q=>steps.push({type:'question',question:q,section:null}));
  } else {
    // Questions with no section first
    questions.filter(q=>!q.sectionId).forEach(q=>{
      steps.push({type:'question',question:q,section:null});
    });
    // Then sections with their questions
    sections.forEach(s=>{
      const secQs=questions.filter(q=>q.sectionId===s.id);
      if(!secQs.length)return;
      const mode=s.mode||s.displayMode||'one';
      if(mode==='fullscreen'){
        steps.push({type:'section-intro',section:s,questions:secQs});
        secQs.forEach(q=>steps.push({type:'question',question:q,section:s}));
      } else if(mode==='all'){
        steps.push({type:'all-page',section:s,questions:secQs});
      } else {
        secQs.forEach(q=>steps.push({type:'question',question:q,section:s}));
      }
    });
  }

  steps.push({type:'thankyou'});
}

// ── PROGRESS ──────────────────────────────────────────
function updateProgress(){
  const qSteps=steps.filter(s=>s.type==='question'||s.type==='all-page');
  const total=qSteps.length;
  const done=qSteps.filter(s=>{
    if(s.type==='question')return answers[s.question.id]!==undefined&&answers[s.question.id]!=='';
    return false;
  }).length;
  const pct=total>0?Math.round((currentStep/steps.length)*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  const qNum=qSteps.indexOf(steps[currentStep]);
  document.getElementById('progress-txt').textContent=qNum>=0?(qNum+1)+' of '+total:'';
  const up=document.getElementById('nav-up'),dn=document.getElementById('nav-dn');
  if(up)up.disabled=currentStep<=0;
  if(dn)dn.disabled=false;
}

// ── NAVIGATION ────────────────────────────────────────
window.nextStep=function(){stopTimer();
  saveCurrentAnswer();
  // Check required
  const step=steps[currentStep];
  if(step&&step.type==='question'){
    const q=step.question;
    if(q.required){
      const ans=answers[q.id];
      const empty=!ans||(Array.isArray(ans)&&!ans.length)||(typeof ans==='string'&&!ans.trim());
      if(empty){showRequiredError();return}
    }
  }
  // Apply logic
  const jump=evaluateLogic();
  if(jump!==null){currentStep=jump}
  else{
    // Skip hidden questions
    let next=currentStep+1;
    while(next<steps.length-1){
      const ns=steps[next];
      if(ns.type==='question'&&hiddenQs.has(ns.question.id)){next++;continue}
      break;
    }
    currentStep=next;
  }
  if(currentStep>=steps.length)currentStep=steps.length-1;
  renderStep();
};

window.prevStep=function(){stopTimer();
  saveCurrentAnswer();
  let prev=currentStep-1;
  while(prev>0){
    const ps=steps[prev];
    if(ps.type==='question'&&hiddenQs.has(ps.question.id)){prev--;continue}
    break;
  }
  currentStep=Math.max(0,prev);
  renderStep();
};

function showRequiredError(){
  const existing=document.querySelector('.req-error');
  if(existing)return;
  const el=document.createElement('div');
  el.className='req-error';
  el.style.cssText='color:#EF4444;font-size:0.82rem;font-weight:600;margin-top:-12px;margin-bottom:12px';
  el.textContent='⚠️ This question is required';
  const wrap=document.querySelector('.q-wrap');
  if(wrap){const nb=wrap.querySelector('.next-btn');if(nb)nb.before(el)}
  setTimeout(()=>el.remove(),3000);
}

// ── LOGIC ENGINE ──────────────────────────────────────
function evaluateLogic(){
  const step=steps[currentStep];
  if(!step||step.type!=='question')return null;
  const q=step.question;
  if(!q.logic||!q.logic.length)return null;

  for(const rule of q.logic){
    const condsMet=rule.conditions.map(c=>checkCondition(c));
    const match=rule.condType==='ANY'?condsMet.some(Boolean):condsMet.every(Boolean);
    if(!match)continue;

    if(rule.action==='skip'&&rule.target){
      const idx=steps.findIndex(s=>s.type==='question'&&s.question.id===rule.target);
      if(idx>-1)return idx;
    }
    if(rule.action==='end')return steps.length-1;
    if(rule.action==='show'&&rule.target)hiddenQs.delete(rule.target);
    if(rule.action==='hide'&&rule.target)hiddenQs.add(rule.target);
  }
  return null;
}

function checkCondition(c){
  const ans=answers[c.qid];
  const val=(c.val||'').toLowerCase().trim();
  const ansStr=(Array.isArray(ans)?ans.join(','):ans||'').toLowerCase().trim();
  if(c.op==='is')return ansStr===val;
  if(c.op==='is_not')return ansStr!==val;
  if(c.op==='contains')return ansStr.includes(val);
  if(c.op==='filled')return!!ans&&ansStr!=='';
  if(c.op==='empty')return!ans||ansStr==='';
  return false;
}

// ── RENDER ────────────────────────────────────────────
function renderStep(){
  updateProgress();
  const step=steps[currentStep];
  if(!step)return;
  document.getElementById('bottom-nav').style.display=currentStep>0&&currentStep<steps.length-1?'flex':'none';

  if(step.type==='welcome')return showWelcome();
  if(step.type==='thankyou')return showThankyou();
  if(step.type==='section-intro')return showSectionIntro(step.section,step.questions);
  if(step.type==='question')return showQuestion(step.question,step.section);
  if(step.type==='all-page')return showAllPage(step.section,step.questions);
}

// ── WELCOME ───────────────────────────────────────────
function showWelcome(){
  currentStep=0;
  document.getElementById('bottom-nav').style.display='none';
  const wp=survey.welcomePage||survey.welcome||{};
  const prize=survey.prize||{};
  const qCount=questions.length;
  const title=wp.headline||survey.title||'Untitled Survey';
  const desc=survey.description||'';
  const btnText=wp.btnText||"Let's go →";

  document.getElementById('stage').innerHTML=`
    <div class="welcome-screen">
      <div class="welcome-icon">📋</div>
      <div class="welcome-title">${eh(title)}</div>
      ${desc?`<div class="welcome-desc">${eh(desc)}</div>`:''}
      ${prize.enabled?`<div style="background:#FEF3C7;border:1.5px solid #FCD34D;border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:0.85rem;color:#92400E"><strong>🎁 Prize:</strong> ${eh(prize.description||'')}</div>`:''}
      <div style="font-size:0.78rem;color:var(--muted);margin-bottom:20px">${qCount} question${qCount!==1?'s':''}</div>
      <button class="start-btn" onclick="startSurvey()">${eh(btnText)}</button>

window.toggleCb=function(qid,val,el){
  if(!Array.isArray(answers[qid]))answers[qid]=[];
  const arr=answers[qid];
  const idx=arr.indexOf(val);
  if(idx>-1)arr.splice(idx,1);else arr.push(val);
  const cb=el.querySelector('.choice-cb');
  if(cb)cb.classList.toggle('selected',arr.includes(val));
  el.classList.toggle('selected',arr.includes(val));
};

window.toggleCbVal=function(qid,val,checked){
  if(!Array.isArray(answers[qid]))answers[qid]=[];
  const arr=answers[qid];
  const idx=arr.indexOf(val);
  if(checked&&idx===-1)arr.push(val);
  else if(!checked&&idx>-1)arr.splice(idx,1);
};

let timerInterval=null;

  // Add timer display
  const wrap=document.querySelector('.q-wrap');

  document.body.appendChild(timerEl);
  let left=seconds;

}

}

async function checkResponseLimit(db, ownerId){
  try{
    const {collection,query,where,getDocs,Timestamp}=await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    // Get start of current month
    const now=new Date();
    const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
    const monthTs={seconds:Math.floor(monthStart.getTime()/1000),nanoseconds:0};
    // Get owner's plan
    const {doc,getDoc}=await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    const userSnap=await getDoc(doc(db,'users',ownerId));
    const userData=userSnap.exists()?userSnap.data():{plan:'free'};
    const plan=userData.plan||'free';
    const LIMITS={free:100,starter:1000,pro:-1,business:-1,student:-1,educator:-1,ngo:-1};
    const limit=LIMITS[plan]??100;
    if(limit===-1)return{allowed:true,count:0,limit:-1};
    // Count responses this month across all response collections
    const RESP_COLS=['surveyResponses','pollResponses','votingResponses','pledgeResponses','riddleResponses'];
    let total=0;
    for(const col of RESP_COLS){
      try{
        const snap=await getDocs(query(collection(db,col),where('ownerId','==',ownerId)));
        // Filter by this month client-side (simpler than composite index)
        snap.forEach(function(d){
          const ts=d.data().createdAt?.seconds||0;
          if(ts>=monthTs.seconds)total++;
        });
      }catch(e){}
    }
    // Also check subcollection responses (assessment, feedback, lead, registration, employee, product, award, jobapp)
    const SUB_COLS=['assessments','feedbacks','leads','registrations','employees','products','awards','jobapps'];
    for(const col of SUB_COLS){
      try{
        const formsSnap=await getDocs(query(collection(db,col),where('userId','==',ownerId)));
        for(const formDoc of formsSnap.docs){
          const rSnap=await getDocs(collection(db,col,formDoc.id,'responses'));
          rSnap.forEach(function(d){
            const ts=d.data().createdAt?.seconds||0;
            if(ts>=monthTs.seconds)total++;
          });
        }
      }catch(e){}
    }
    return{allowed:total<limit,count:total,limit};
  }catch(e){return{allowed:true,count:0,limit:-1};}
}

function showResponseLimitError(count, limit){
