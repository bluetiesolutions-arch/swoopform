<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover — SwoopForm</title>
  <meta name="description" content="Discover surveys, polls, pledges and riddles on SwoopForm.">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#F5F0E8;color:#0F0E1A;min-height:100vh}
    nav{background:#fff;border-bottom:1.5px solid #E2DAD0;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
    .logo-mk{width:30px;height:30px;background:linear-gradient(135deg,#2D1B69,#D97706);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.85rem;color:#fff}
    .logo-nm{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:#0F0E1A}
    .nav-right{display:flex;gap:8px;align-items:center}
    .nav-btn{padding:7px 14px;border-radius:8px;border:1.5px solid #E2DAD0;background:transparent;color:#64748B;font-size:0.82rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .nav-btn:hover{border-color:#2D1B69;color:#2D1B69}
    .nav-btn.primary{background:linear-gradient(135deg,#2D1B69,#D97706);color:#fff;border:none}
    .nav-btn.primary:hover{opacity:0.9}

    /* HERO */
    .hero{padding:60px 20px 40px;text-align:center;background:linear-gradient(180deg,#EDE9FF 0%,#F5F0E8 100%)}
    .hero-label{font-size:0.72rem;font-weight:700;color:#D97706;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px}
    .hero-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.8rem,5vw,3rem);letter-spacing:-0.04em;margin-bottom:12px}
    .hero-sub{font-size:0.95rem;color:#64748B;max-width:480px;margin:0 auto 28px;line-height:1.7}
    .search-bar{display:flex;gap:8px;max-width:500px;margin:0 auto}
    .search-inp{flex:1;padding:12px 18px;border-radius:12px;border:1.5px solid #E2DAD0;background:#fff;font-size:0.92rem;font-family:'DM Sans',sans-serif;outline:none;color:#0F0E1A;transition:border-color 0.2s}
    .search-inp:focus{border-color:#2D1B69}
    .search-btn{padding:12px 20px;border-radius:12px;border:none;background:#2D1B69;color:#fff;font-size:0.88rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;flex-shrink:0}

    /* MAIN */
    .main{max-width:1100px;margin:0 auto;padding:32px 20px}

    /* FEATURED */
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .section-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;letter-spacing:-0.02em;display:flex;align-items:center;gap:8px}
    .featured-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:40px}

    /* FILTERS */
    .filters-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
    .filter-btn{padding:6px 14px;border-radius:100px;border:1.5px solid #E2DAD0;background:#fff;font-size:0.78rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;color:#64748B}
    .filter-btn:hover{border-color:#2D1B69;color:#2D1B69}
    .filter-btn.active{background:#2D1B69;border-color:#2D1B69;color:#fff}
    .sort-sel{padding:6px 12px;border-radius:100px;border:1.5px solid #E2DAD0;background:#fff;font-size:0.78rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;outline:none;color:#64748B;margin-left:auto}

    /* CARDS */
    .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    .item-card{background:#fff;border-radius:16px;border:1.5px solid #E2DAD0;overflow:hidden;transition:all 0.2s;cursor:pointer;text-decoration:none;color:#0F0E1A;display:block}
    .item-card:hover{box-shadow:0 8px 32px rgba(15,14,26,0.1);transform:translateY(-3px);border-color:#D4CAF8}
    .item-card-top{height:8px}
    .item-card-body{padding:20px}
    .item-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .type-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:0.68rem;font-weight:700}
    .featured-star{color:#D97706;font-size:0.82rem}
    .item-card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;margin-bottom:8px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    .item-card-desc{font-size:0.8rem;color:#64748B;line-height:1.5;margin-bottom:12px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    .item-card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid #F5F0E8}
    .item-card-meta{font-size:0.72rem;color:#94A3B8;display:flex;align-items:center;gap:6px}
    .take-btn{padding:6px 14px;border-radius:8px;font-size:0.75rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all 0.2s;color:#fff}
    .take-btn:hover{opacity:0.85}

    /* EMPTY */
    .empty{text-align:center;padding:60px 20px;grid-column:1/-1}
    .empty-icon{font-size:3rem;margin-bottom:16px}
    .empty-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;margin-bottom:8px}
    .empty-sub{font-size:0.85rem;color:#64748B}

    /* CATEGORIES */
    .cats-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
    .cat-chip{padding:6px 14px;border-radius:100px;border:1.5px solid #E2DAD0;background:#fff;font-size:0.78rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;color:#64748B}
    .cat-chip:hover{border-color:#2D1B69;background:#EDE9FF;color:#2D1B69}
    .cat-chip.active{background:#EDE9FF;border-color:#2D1B69;color:#2D1B69}

    .spinner{width:28px;height:28px;border:3px solid rgba(45,27,105,0.15);border-top-color:#2D1B69;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-wrap{text-align:center;padding:60px 20px;grid-column:1/-1}
    footer{background:#0F0E1A;padding:32px 20px;text-align:center;margin-top:60px}
    .footer-links{display:flex;gap:20px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
    .footer-link{font-size:0.78rem;color:rgba(255,255,255,0.35);text-decoration:none}
    .footer-link:hover{color:#fff}
    .footer-copy{font-size:0.72rem;color:rgba(255,255,255,0.2)}
    @media(max-width:600px){nav{padding:0 14px}.logo-nm{display:none}.main{padding:20px 14px}.hero{padding:40px 14px 28px}.search-bar{flex-direction:column}}
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo"><div class="logo-mk">S</div><div class="logo-nm">SwoopForm</div></a>
  <div class="nav-right">
    <a href="/dashboard" class="nav-btn">Dashboard</a>
    <a href="/login" class="nav-btn primary">Create free →</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-label">✦ Discover</div>
  <h1 class="hero-title">Explore public content</h1>
  <p class="hero-sub">Surveys, polls, pledges and riddles created by the SwoopForm community.</p>
  <div class="search-bar">
    <input class="search-inp" id="search-inp" placeholder="Search surveys, polls, riddles..." oninput="filterItems()">
    <button class="search-btn" onclick="filterItems()">Search</button>
  </div>
</div>

<div class="main">

  <!-- FEATURED -->
  <div id="featured-section" style="display:none">
    <div class="section-header"><div class="section-title">⭐ Featured</div></div>
    <div class="featured-grid" id="featured-grid"></div>
  </div>

  <!-- FILTERS -->
  <div class="filters-row">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('surveys',this)">📋 Surveys</button>
    <button class="filter-btn" onclick="setFilter('polls',this)">📊 Polls</button>
    <button class="filter-btn" onclick="setFilter('votings',this)">🗳️ Voting</button>
    <button class="filter-btn" onclick="setFilter('pledges',this)">🤝 Pledges</button>
    <button class="filter-btn" onclick="setFilter('riddles',this)">🧩 Riddles</button>
    <select class="sort-sel" id="sort-sel" onchange="filterItems()">
      <option value="newest">Newest first</option>
      <option value="popular">Most popular</option>
    </select>
  </div>

  <!-- CATEGORIES -->
  <div class="cats-row" id="cats-row"></div>

  <!-- ITEMS -->
  <div class="items-grid" id="items-grid">
    <div class="loading-wrap"><div class="spinner"></div><div style="font-size:0.85rem;color:#94A3B8">Loading content...</div></div>
  </div>
</div>

<footer>
  <div class="footer-links">
    <a href="/" class="footer-link">Home</a>
    <a href="/about" class="footer-link">About</a>
    <a href="/pricing" class="footer-link">Pricing</a>
    <a href="/contact" class="footer-link">Contact</a>
    <a href="/privacy" class="footer-link">Privacy</a>
    <a href="/terms" class="footer-link">Terms</a>
  </div>
  <div class="footer-copy">© 2024 SwoopForm. All rights reserved.</div>
</footer>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,collection,query,where,getDocs,orderBy,limit}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);
const db=getFirestore(app);

const TYPE_META={
  surveys:{label:'Survey',icon:'📋',color:'#2D1B69',bg:'#EDE9FF',viewPath:'/survey/',btnColor:'#2D1B69',btnLabel:'Take survey'},
  polls:{label:'Poll',icon:'📊',color:'#4F46E5',bg:'#EEF2FF',viewPath:'/poll/',btnColor:'#4F46E5',btnLabel:'Vote now'},
  votings:{label:'Voting',icon:'🗳️',color:'#D97706',bg:'#FEF3C7',viewPath:'/voting/',btnColor:'#D97706',btnLabel:'Cast vote'},
  pledges:{label:'Pledge',icon:'🤝',color:'#10B981',bg:'#DCFCE7',viewPath:'/pledge/',btnColor:'#10B981',btnLabel:'Take pledge'},
  riddles:{label:'Riddle',icon:'🧩',color:'#A855F7',bg:'#F3E8FF',viewPath:'/riddle/',btnColor:'#A855F7',btnLabel:'Play riddle'},
};

let allItems=[],activeFilter='all',activeCategory='';

async function init(){
  // Load all public content from all collections
  const results=await Promise.all(Object.keys(TYPE_META).map(async col=>{
    try{
      const q=query(collection(db,col),where('isPublic','==',true),where('status','==','active'));
      const snap=await getDocs(q);
      return snap.docs.map(d=>({id:d.id,_col:col,...d.data()}));
    }catch(e){return[]}
  }));
  allItems=results.flat().sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

  // Categories from Firestore
  try{
    const catSnap=await getDocs(query(collection(db,'categories'),orderBy('order')));
    const cats=[];
    catSnap.forEach(d=>cats.push(d.data()));
    renderCategories(cats);
  }catch(e){}

  renderFeatured();
  filterItems();
}

function renderCategories(cats){
  const row=document.getElementById('cats-row');
  if(!cats.length){row.style.display='none';return}
  row.innerHTML=cats.map(c=>`<button class="cat-chip" onclick="setCategory('${c.name}',this)">${c.emoji||''} ${c.name}</button>`).join('');
}

function renderFeatured(){
  const featured=allItems.filter(i=>i.featured===true);
  const section=document.getElementById('featured-section');
  const grid=document.getElementById('featured-grid');
  if(!featured.length){section.style.display='none';return}
  section.style.display='block';
  grid.innerHTML=featured.map(item=>renderCard(item,true)).join('');
}

window.filterItems=function(){
  const search=(document.getElementById('search-inp')?.value||'').toLowerCase();
  const sort=document.getElementById('sort-sel')?.value||'newest';
  let filtered=allItems.filter(i=>{
    const matchFilter=activeFilter==='all'||i._col===activeFilter;
    const matchCat=!activeCategory||(i.category||'')=== activeCategory;
    const title=getTitle(i).toLowerCase();
    const matchSearch=!search||title.includes(search)||(i.description||'').toLowerCase().includes(search);
    return matchFilter&&matchCat&&matchSearch;
  });
  if(sort==='popular'){filtered.sort((a,b)=>getScore(b)-getScore(a))}
  const grid=document.getElementById('items-grid');
  if(!filtered.length){
    grid.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Nothing found</div><div class="empty-sub">Try a different search or filter.</div></div>`;
    return;
  }
  grid.innerHTML=filtered.map(item=>renderCard(item,false)).join('');
}

window.setFilter=function(f,el){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  filterItems();
}
window.setCategory=function(cat,el){
  if(activeCategory===cat){activeCategory='';document.querySelectorAll('.cat-chip').forEach(b=>b.classList.remove('active'))}
  else{activeCategory=cat;document.querySelectorAll('.cat-chip').forEach(b=>b.classList.remove('active'));el.classList.add('active')}
  filterItems();
}

function getTitle(item){return item.title||item.question||'Untitled'}
function getScore(item){return item.responseCount||item.totalVotes||item.totalPledges||0}
function getViewUrl(item){
  const m=TYPE_META[item._col];if(!m)return '#';
  return item.slug?'/engage/'+item.slug:(m.viewPath+item.id);
}
function getDesc(item){return item.description||item.heroSubtitle||item.subtitle||''}

function renderCard(item,isFeatured){
  const m=TYPE_META[item._col]||{label:'Item',icon:'📄',color:'#64748B',bg:'#F5F0E8',btnColor:'#64748B',btnLabel:'View'};
  const score=getScore(item);
  const url=getViewUrl(item);
  const desc=getDesc(item);
  return`<a class="item-card" href="${url}" target="_blank">
    <div class="item-card-top" style="background:${m.color}"></div>
    <div class="item-card-body">
      <div class="item-card-header">
        <div class="type-badge" style="background:${m.bg};color:${m.color}">${m.icon} ${m.label}</div>
        ${isFeatured?'<span class="featured-star">⭐ Featured</span>':''}
        ${item.category?`<span style="font-size:0.68rem;color:#94A3B8">${item.category}</span>`:''}
      </div>
      <div class="item-card-title">${eh(getTitle(item))}</div>
      ${desc?`<div class="item-card-desc">${eh(desc)}</div>`:''}
      <div class="item-card-footer">
        <div class="item-card-meta">
          ${score?`👥 ${score} ${m.label==='Poll'?'vote':m.label==='Pledge'?'pledge':'response'}${score!==1?'s':''}`:m.icon+' '+m.label}
        </div>
        <button class="take-btn" style="background:${m.btnColor}">${m.btnLabel} →</button>
      </div>
    </div>
  </a>`;
}

function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}
init();
</script>
</body>
</html>
