<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover — SwoopForm</title>
<meta name="description" content="Explore public surveys, polls, quizzes and more created by the SwoopForm community.">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f0e8;--surface:#fff;--border:#e2dad0;--accent:#2d1b69;--accent2:#7c3aed;--amber:#d97706;--text:#0f0e1a;--muted:#64748b;--muted2:#94a3b8;--font:'Sora',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(245,240,232,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-nm{font-weight:800;font-size:18px;color:var(--text);}
.nav-link{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;transition:all .15s;}
.nav-link:hover{color:var(--text);}
.btn-primary{padding:9px 20px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;text-decoration:none;}

/* HERO */
.hero{padding:60px 40px 40px;text-align:center;}
.hero-title{font-size:clamp(2rem,5vw,3.5rem);font-weight:800;letter-spacing:-.04em;margin-bottom:12px;}
.hero-title span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{font-size:16px;color:var(--muted);margin-bottom:32px;line-height:1.7;}

/* SEARCH */
.search-bar{max-width:640px;margin:0 auto 40px;display:flex;gap:10px;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:8px 8px 8px 20px;box-shadow:0 4px 20px rgba(45,27,105,.06);}
.search-inp{flex:1;border:none;background:transparent;font-size:15px;font-family:var(--font);outline:none;color:var(--text);}
.search-inp::placeholder{color:var(--muted2);}
.search-btn{padding:10px 20px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;}

/* FILTERS */
.filter-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:48px;}
.filter-btn{padding:7px 16px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;color:var(--muted);transition:all .15s;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* FEATURED */
.featured-section{max-width:1200px;margin:0 auto;padding:0 40px 48px;}
.section-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.featured-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}

/* CARDS */
.disc-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;transition:all .2s;cursor:pointer;text-decoration:none;display:block;color:var(--text);}
.disc-card:hover{box-shadow:0 8px 28px rgba(45,27,105,.1);transform:translateY(-3px);border-color:#c4b5fd;}
.disc-card.featured{border-color:rgba(217,119,6,.3);background:linear-gradient(145deg,#fffbeb,#fff);}
.disc-card-top{height:4px;}
.disc-card-body{padding:16px 18px;}
.disc-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.disc-type-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;}
.disc-featured-star{font-size:14px;}
.disc-card-title{font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.35;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.disc-card-meta{font-size:11px;color:var(--muted2);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.disc-card-footer{padding:12px 18px;border-top:1px solid var(--bg);display:flex;align-items:center;justify-content:space-between;}
.disc-responses{font-size:12px;color:var(--muted2);}
.disc-play-btn{padding:5px 14px;border-radius:7px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;text-decoration:none;}

/* MAIN GRID */
.main-content{max-width:1200px;margin:0 auto;padding:0 40px 80px;}
.items-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.4;}

/* SPINNER */
.spinner{width:28px;height:28px;border:3px solid rgba(45,27,105,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto;display:block;}
@keyframes spin{to{transform:rotate(360deg)}}

footer-strip{display:block;text-align:center;padding:24px;font-size:13px;color:var(--muted2);border-top:1px solid var(--border);}

@media(max-width:768px){
  nav{padding:0 20px;}.hero{padding:40px 20px 24px;}.search-bar{margin:0 20px 24px;}.filter-row{padding:0 20px;}.featured-section{padding:0 20px 32px;}.main-content{padding:0 20px 48px;}.featured-grid,.items-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <svg width="30" height="30" viewBox="0 0 40 40" fill="none"><defs><linearGradient id="sg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#2d1b69"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#sg)"/><rect x="10" y="9" width="20" height="6" rx="3" fill="white"/><rect x="10" y="17" width="20" height="6" rx="3" fill="rgba(255,255,255,0.9)"/><rect x="10" y="25" width="20" height="6" rx="3" fill="white"/><circle cx="31" cy="12" r="3" fill="#d97706"/></svg>
    <span class="logo-nm">SwoopForm</span>
  </a>
  <div style="display:flex;align-items:center;gap:4px;">
    <a href="/" class="nav-link">Home</a>
    <a href="/pricing/" class="nav-link">Pricing</a>
  </div>
  <a href="/login/" class="btn-primary">Get started →</a>
</nav>

<div class="hero">
  <h1 class="hero-title">Discover <span>public forms</span></h1>
  <p class="hero-sub">Explore surveys, quizzes, polls and more created by the SwoopForm community. Take part or get inspired.</p>
</div>

<div class="search-bar">
  <input class="search-inp" id="search-inp" placeholder="Search forms, quizzes, polls..." onkeydown="if(event.key==='Enter')applyFilters()">
  <button class="search-btn" onclick="applyFilters()">Search</button>
</div>

<div class="filter-row">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('surveys',this)">📋 Surveys</button>
  <button class="filter-btn" onclick="setFilter('polls',this)">📊 Polls</button>
  <button class="filter-btn" onclick="setFilter('votings',this)">🗳️ Voting</button>
  <button class="filter-btn" onclick="setFilter('pledges',this)">🤝 Pledges</button>
  <button class="filter-btn" onclick="setFilter('riddles',this)">🧩 Riddles</button>
</div>

<div class="featured-section" id="featured-section">
  <div class="section-label">⭐ Featured</div>
  <div class="featured-grid" id="featured-grid">
    <div class="spinner"></div>
  </div>
</div>

<div class="main-content">
  <div class="section-label">🌍 All public forms</div>
  <div class="items-grid" id="items-grid">
    <div class="spinner"></div>
  </div>
</div>

<div style="text-align:center;padding:24px;font-size:13px;color:var(--muted2);border-top:1px solid var(--border);">
  <a href="/" style="color:var(--accent);text-decoration:none;font-weight:600;">← Back to SwoopForm</a>
  &nbsp;·&nbsp; Want to share your form? <a href="/login/" style="color:var(--accent);text-decoration:none;font-weight:600;">Create one free →</a>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,collection,query,where,getDocs,orderBy,limit}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);
const db=getFirestore(app);

const COLS=['surveys','polls','votings','pledges','riddles'];
const ICONS={surveys:'📋',polls:'📊',votings:'🗳️',pledges:'🤝',riddles:'🧩'};
const COLORS={surveys:'#7c3aed',polls:'#4f46e5',votings:'#d97706',pledges:'#10b981',riddles:'#a855f7'};
const LABELS={surveys:'Survey',polls:'Poll',votings:'Voting',pledges:'Pledge',riddles:'Riddle'};
const VIEW_URLS={surveys:'/s/?id=',polls:'/poll/?id=',votings:'/voting/?id=',pledges:'/pledge/?id=',riddles:'/riddle/?id='};

let allItems=[],activeFilter='all';

async function loadAll(){
  try{
    const results=await Promise.all(COLS.map(async function(col){
      try{
        const q=query(collection(db,col),where('isPublic','==',true),where('status','==','active'));
        const snap=await getDocs(q);
        return snap.docs.map(function(d){return{id:d.id,_col:col,...d.data()};});
      }catch(e){return[];}
    }));
    allItems=results.flat().sort(function(a,b){return(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0);});
    renderFeatured();
    renderItems();
  }catch(e){console.error(e);}
}

function renderFeatured(){
  const featured=allItems.filter(function(i){return i.featured;}).slice(0,3);
  const grid=document.getElementById('featured-grid');
  if(!featured.length){document.getElementById('featured-section').style.display='none';return;}
  grid.innerHTML=featured.map(function(i){return renderCard(i,true);}).join('');
}

function renderItems(){
  const search=(document.getElementById('search-inp')?.value||'').toLowerCase();
  const filtered=allItems.filter(function(i){
    const matchCat=activeFilter==='all'||i._col===activeFilter;
    const matchSearch=!search||(i.title||i.question||'').toLowerCase().includes(search);
    return matchCat&&matchSearch;
  });
  const grid=document.getElementById('items-grid');
  if(!filtered.length){
    grid.innerHTML='<div class="empty" style="grid-column:1/-1;"><div class="empty-icon">🔍</div><div style="font-size:16px;font-weight:700;margin-bottom:8px;">No forms found</div><div style="font-size:13px;">Try a different search or filter</div></div>';
    return;
  }
  grid.innerHTML=filtered.map(function(i){return renderCard(i,false);}).join('');
}

function renderCard(i,featured){
  const color=COLORS[i._col]||'#64748b';
  const icon=ICONS[i._col]||'📄';
  const label=LABELS[i._col]||i._col;
  const url=(VIEW_URLS[i._col]||'#')+i.id;
  const rc=i.responseCount||i.totalVotes||i.totalPledges||0;
  return'<a href="'+url+'" class="disc-card'+(featured?' featured':'')+'">'
    +'<div class="disc-card-top" style="background:'+color+';"></div>'
    +'<div class="disc-card-body">'
    +'<div class="disc-card-header">'
    +'<span class="disc-type-badge" style="background:'+color+'18;color:'+color+';">'+icon+' '+label+'</span>'
    +(featured?'<span class="disc-featured-star">⭐</span>':'')
    +'</div>'
    +'<div class="disc-card-title">'+eh(i.title||i.question||'Untitled')+'</div>'
    +'<div class="disc-card-meta">'
    +(i.category?'<span>'+i.category+'</span>':'')
    +'</div>'
    +'</div>'
    +'<div class="disc-card-footer">'
    +'<span class="disc-responses">📊 '+rc+' response'+(rc!==1?'s':'')+'</span>'
    +'<span class="disc-play-btn">Open →</span>'
    +'</div>'
    +'</a>';
}

window.setFilter=function(f,el){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  if(el)el.classList.add('active');
  renderItems();
};

window.applyFilters=function(){renderItems();};

function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}

loadAll();
</script>
</body>
</html>
