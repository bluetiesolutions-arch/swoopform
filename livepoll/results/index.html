<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseCheck Results — SwoopForm</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f0e8;--surface:#fff;--surface2:#f0eeea;--border:#e2dad0;--accent:#2d1b69;--accent2:#7c3aed;--green:#12a872;--text:#0f0e1a;--muted:#64748b;--muted2:#94a3b8;--font:'Sora',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
nav{height:56px;background:var(--surface);border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.logo-nm{font-weight:800;font-size:16px;color:var(--text);}
.btn{padding:8px 16px;border-radius:9px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
.btn-ghost{border:1.5px solid var(--border);background:transparent;color:var(--muted);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.main{max-width:900px;margin:0 auto;padding:32px 20px;}
.page-title{font-size:22px;font-weight:800;letter-spacing:-.03em;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:22px;margin-bottom:16px;}
.card-title{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-box{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.stat-val{font-weight:800;font-size:1.8rem;letter-spacing:-.04em;color:var(--accent);margin-bottom:2px;}
.stat-lbl{font-size:11px;color:var(--muted2);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}

/* SESSION SELECT */
.session-select{padding:8px 14px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);font-family:var(--font);font-size:13px;color:var(--text);outline:none;cursor:pointer;min-width:220px;}
.session-select:focus{border-color:var(--accent);}

/* SLIDE RESULTS */
.slide-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px;}
.slide-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.slide-num{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.slide-type{font-size:11px;font-weight:700;padding:2px 8px;border-radius:100px;background:var(--surface);border:1px solid var(--border);color:var(--muted);}
.slide-question{font-size:15px;font-weight:700;flex:1;}
.slide-count{font-size:12px;color:var(--muted2);}

/* BAR CHART */
.bar-row{margin-bottom:10px;}
.bar-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
.bar-track{height:10px;background:var(--border);border-radius:100px;overflow:hidden;}
.bar-fill{height:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:100px;transition:width .5s ease;}

/* WORD CLOUD */
.word-cloud{display:flex;flex-wrap:wrap;gap:8px;padding:8px 0;}
.word-tag{padding:6px 14px;border-radius:100px;font-size:13px;font-weight:700;background:var(--surface);border:1.5px solid var(--border);}

/* OPEN TEXT */
.open-resp{padding:10px 14px;background:var(--surface);border-radius:8px;border:1px solid var(--border);font-size:13px;margin-bottom:6px;line-height:1.5;}

/* HISTORY TABLE */
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--surface2);}
th{padding:10px 14px;font-size:10px;font-weight:700;color:var(--muted2);text-align:left;text-transform:uppercase;letter-spacing:.06em;border-bottom:1.5px solid var(--border);}
td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--surface2);}

.empty{text-align:center;padding:60px;color:var(--muted);}
.spinner{width:28px;height:28px;border:3px solid rgba(45,27,105,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto;display:block;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;display:none;z-index:999;}
@media(max-width:600px){.stats-row{grid-template-columns:1fr 1fr;}.main{padding:20px;}}
</style>
<link rel="stylesheet" href="/mobile.css">
</head>
<body>
<nav>
  <a href="/dashboard/" class="nav-logo">
    <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><defs><linearGradient id="sg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#2d1b69"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#sg)"/><rect x="10" y="9" width="20" height="6" rx="3" fill="white"/><rect x="10" y="17" width="20" height="6" rx="3" fill="rgba(255,255,255,0.9)"/><rect x="10" y="25" width="20" height="6" rx="3" fill="white"/><circle cx="31" cy="12" r="3" fill="#d97706"/></svg>
    <span class="logo-nm">SwoopForm</span>
  </a>
  <div style="display:flex;gap:8px;">
    <button class="btn btn-ghost" onclick="exportCSV()">⬇ Export CSV</button>
    <a href="/dashboard/" class="btn btn-ghost">← Dashboard</a>
    <a href="#" id="launch-btn" class="btn btn-primary">🚀 Launch Again</a>
  </div>
</nav>

<div class="main">
  <div class="page-title">📡 PulseCheck Results</div>
  <div class="page-sub" id="page-sub">Loading...</div>

  <div class="stats-row">
    <div class="stat-box"><div class="stat-val" id="stat-sessions">—</div><div class="stat-lbl">Sessions Run</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-participants">—</div><div class="stat-lbl">Total Participants</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-slides">—</div><div class="stat-lbl">Slides</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-responses">—</div><div class="stat-lbl">Total Responses</div></div>
  </div>

  <!-- SESSION RESULTS -->
  <div class="card">
    <div class="card-title">
      <span>📊 Slide Results</span>
      <select class="session-select" id="session-select" onchange="loadSession()">
        <option value="">Select session...</option>
      </select>
    </div>
    <div id="slides-wrap"><div class="spinner"></div></div>
  </div>

  <!-- HISTORY -->
  <div class="card">
    <div class="card-title">📅 Session History</div>
    <div id="history-wrap"><div class="spinner"></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getAuth,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import{getFirestore,doc,getDoc,getDocs,collection,query,where,orderBy}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);
const auth=getAuth(app);
const db=getFirestore(app);
const params=new URLSearchParams(window.location.search);
const PID=params.get('id');
let pollData=null,allSessions=[];

onAuthStateChanged(auth,async function(u){
  if(!u){window.location.href='/login/';return;}
  if(!PID){window.location.href='/dashboard/';return;}
  await load();
});

async function load(){
  try{
    const snap=await getDoc(doc(db,'livePollSessions',PID));
    if(!snap.exists()){window.location.href='/dashboard/';return;}
    pollData=snap.data();
    document.getElementById('page-sub').textContent=pollData.title||'PulseCheck';
    document.title=(pollData.title||'PulseCheck')+' — Results';
    document.getElementById('stat-slides').textContent=pollData.slideCount||pollData.slides?.length||0;
    document.getElementById('launch-btn').href='/livepoll/host/?id='+PID;

    // Load sessions
    const rSnap=await getDocs(query(collection(db,'pulseResults'),where('pollId','==',PID)));
    allSessions=rSnap.docs.map(function(d){return{id:d.id,...d.data()};});
    allSessions.sort(function(a,b){return(b.playedAt?.seconds||0)-(a.playedAt?.seconds||0);});

    // Stats
    const totalParticipants=allSessions.reduce(function(s,r){return s+(r.participantCount||0);},0);
    const totalResponses=allSessions.reduce(function(s,r){
      return s+(r.slideResults||[]).reduce(function(ss,sl){return ss+(sl.responseCount||0);},0);
    },0);
    document.getElementById('stat-sessions').textContent=allSessions.length;
    document.getElementById('stat-participants').textContent=totalParticipants;
    document.getElementById('stat-responses').textContent=totalResponses;

    // Populate session selector
    const sel=document.getElementById('session-select');
    allSessions.forEach(function(s,i){
      const opt=document.createElement('option');
      opt.value=s.id;
      const date=s.playedAt?.seconds?new Date(s.playedAt.seconds*1000).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'Session '+(i+1);
      opt.textContent=date+' · '+(s.participantCount||0)+' participants';
      if(i===0)opt.selected=true;
      sel.appendChild(opt);
    });

    if(allSessions.length)loadSession();
    else document.getElementById('slides-wrap').innerHTML='<div class="empty">No sessions yet. Launch your PulseCheck to start collecting results.</div>';
    renderHistory();
  }catch(e){console.error(e);}
}

window.loadSession=function(){
  const id=document.getElementById('session-select').value;
  if(!id)return;
  const session=allSessions.find(function(s){return s.id===id;});
  if(!session)return;
  renderSlides(session.slideResults||[]);
};

function renderSlides(slides){
  const wrap=document.getElementById('slides-wrap');
  if(!slides.length){wrap.innerHTML='<div class="empty">No slide data for this session</div>';return;}
  wrap.innerHTML=slides.map(function(s,i){
    const type=s.type||'mcq';
    const typeLabel={mcq:'📊 Poll',wordcloud:'☁️ Word Cloud',opentext:'💬 Open Text'}[type]||type;
    let resultHtml='';
    if(type==='mcq'){
      const total=s.responses.length||1;
      const counts={};
      s.responses.forEach(function(r){counts[r.answer]=(counts[r.answer]||0)+1;});
      resultHtml=(s.options||[]).map(function(opt){
        const count=counts[opt]||0;
        const pct=Math.round((count/total)*100);
        return'<div class="bar-row">'
          +'<div class="bar-label"><span>'+eh(opt)+'</span><span style="font-weight:700;">'+count+' ('+pct+'%)</span></div>'
          +'<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div>'
          +'</div>';
      }).join('');
    }else if(type==='wordcloud'){
      const counts={};
      s.responses.forEach(function(r){
        const words=(r.word||r.answer||'').toLowerCase().trim().split(/\s+/);
        words.forEach(function(w){if(w)counts[w]=(counts[w]||0)+1;});
      });
      const sorted=Object.entries(counts).sort(function(a,b){return b[1]-a[1];}).slice(0,30);
      const max=sorted[0]?.[1]||1;
      resultHtml='<div class="word-cloud">'+sorted.map(function(w){
        const size=Math.max(12,Math.round(12+(w[1]/max)*16));
        const opacity=0.4+((w[1]/max)*0.6);
        return'<span class="word-tag" style="font-size:'+size+'px;opacity:'+opacity+';">'+eh(w[0])+'<span style="font-size:10px;margin-left:4px;color:var(--muted2);">×'+w[1]+'</span></span>';
      }).join('')+'</div>';
    }else{
      resultHtml='<div>'+s.responses.slice(0,20).map(function(r){
        return'<div class="open-resp">'+eh(r.text||r.answer||'')+'</div>';
      }).join('')+(s.responses.length>20?'<div style="font-size:12px;color:var(--muted2);text-align:center;padding:8px;">+'+( s.responses.length-20)+' more responses</div>':'')+'</div>';
    }
    return'<div class="slide-card">'
      +'<div class="slide-header">'
      +'<div class="slide-num">'+(i+1)+'</div>'
      +'<div class="slide-question">'+eh(s.question||'Slide '+(i+1))+'</div>'
      +'<span class="slide-type">'+typeLabel+'</span>'
      +'<span class="slide-count">'+s.responseCount+' responses</span>'
      +'</div>'
      +resultHtml
      +'</div>';
  }).join('');
}

function renderHistory(){
  const wrap=document.getElementById('history-wrap');
  if(!allSessions.length){wrap.innerHTML='<div class="empty">No session history yet</div>';return;}
  wrap.innerHTML='<table><thead><tr><th>Date & Time</th><th>Participants</th><th>Slides</th><th>Total Responses</th><th>Action</th></tr></thead><tbody>'
    +allSessions.map(function(s){
      const date=s.playedAt?.seconds?new Date(s.playedAt.seconds*1000).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
      const totalResp=(s.slideResults||[]).reduce(function(sum,sl){return sum+(sl.responseCount||0);},0);
      return'<tr>'
        +'<td style="font-weight:600;">'+date+'</td>'
        +'<td style="font-weight:700;color:var(--accent);">'+( s.participantCount||0)+'</td>'
        +'<td>'+( s.slideCount||0)+'</td>'
        +'<td>'+totalResp+'</td>'
        +'<td><button class="btn btn-ghost" style="padding:5px 10px;font-size:12px;" onclick="viewSession(\''+s.id+'\')">View</button></td>'
        +'</tr>';
    }).join('')
    +'</tbody></table>';
}

window.viewSession=function(id){
  document.getElementById('session-select').value=id;
  loadSession();
  document.getElementById('slides-wrap').scrollIntoView({behavior:'smooth'});
};

window.exportCSV=function(){
  if(!allSessions.length){toast('No sessions to export');return;}
  const id=document.getElementById('session-select').value;
  const session=allSessions.find(function(s){return s.id===id;})||allSessions[0];
  const rows=[['Slide','Type','Question','Response','Count']];
  (session.slideResults||[]).forEach(function(s,i){
    if(s.type==='mcq'){
      const counts={};
      s.responses.forEach(function(r){counts[r.answer]=(counts[r.answer]||0)+1;});
      Object.entries(counts).forEach(function(e){rows.push([i+1,s.type,s.question,e[0],e[1]]);});
    }else{
      s.responses.forEach(function(r){rows.push([i+1,s.type,s.question,r.word||r.text||r.answer||'',1]);});
    }
  });
  const csv=rows.map(function(r){return r.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='pulsecheck-results.csv';
  a.click();
  toast('CSV downloaded!');
};

function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(function(){t.style.display='none';},2500);}
</script>
</body>
</html>
