<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseCheck Screen — SwoopForm</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:#0c1a2e;color:#fff;min-height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.header{padding:16px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-box{width:32px;height:32px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;}
.logo-text{font-weight:800;font-size:16px;}
.pin-badge{font-weight:800;font-size:1.3rem;letter-spacing:.12em;color:#0ea5e9;background:rgba(14,165,233,.1);padding:6px 18px;border-radius:100px;border:1px solid rgba(14,165,233,.3);}
.participants-badge{font-size:14px;color:rgba(255,255,255,.4);}
.body{flex:1;display:flex;align-items:center;justify-content:center;padding:32px;overflow:hidden;}
/* WAITING */
.wait-view{text-align:center;animation:fadeIn .5s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.pin-mega{font-weight:800;font-size:clamp(5rem,16vw,11rem);letter-spacing:.15em;color:#0ea5e9;line-height:1;margin-bottom:12px;}
.join-at{font-size:1.4rem;color:rgba(255,255,255,.45);margin-bottom:28px;}
.participants-chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:900px;}
.p-chip{padding:8px 18px;border-radius:100px;background:rgba(14,165,233,.1);border:1px solid rgba(14,165,233,.25);font-size:0.95rem;font-weight:600;color:#7dd3fc;animation:popIn .3s ease both;}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
/* SLIDE VIEW */
.slide-view{width:100%;max-width:1100px;animation:fadeIn .4s ease;}
.slide-num{font-size:14px;font-weight:700;color:#0ea5e9;letter-spacing:.1em;text-transform:uppercase;text-align:center;margin-bottom:14px;}
.slide-q{font-weight:800;font-size:clamp(2rem,4.5vw,3.5rem);text-align:center;margin-bottom:36px;line-height:1.2;letter-spacing:-.03em;}
/* MCQ BARS */
.mcq-bars{display:flex;flex-direction:column;gap:14px;}
.mcq-bar-row{display:flex;align-items:center;gap:16px;}
.mcq-bar-label{font-size:1.1rem;font-weight:600;width:160px;flex-shrink:0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mcq-bar-track{flex:1;height:48px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden;position:relative;}
.mcq-bar-fill{height:100%;border-radius:10px;transition:width .6s ease;}
.mcq-bar-cnt{font-size:1.1rem;font-weight:800;width:48px;text-align:left;flex-shrink:0;}
/* WORD CLOUD */
.wc-wrap{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;padding:20px 0;}
.wc-word{padding:8px 20px;border-radius:100px;font-weight:700;animation:popIn .3s ease both;cursor:default;}
/* OPEN TEXT */
.ot-wrap{display:flex;flex-direction:column;gap:10px;max-height:55vh;overflow:hidden;}
.ot-item{background:rgba(255,255,255,.06);border-radius:12px;padding:16px 20px;font-size:1.1rem;animation:slideIn .4s ease both;}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.resp-count-big{text-align:center;font-size:1rem;color:rgba(255,255,255,.3);margin-top:16px;}
.waiting-big{text-align:center;font-size:1.2rem;color:rgba(255,255,255,.3);padding:40px;}
/* ENDED */
.ended-view{text-align:center;animation:fadeIn .5s ease;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<link rel="stylesheet" href="/mobile.css">
</head>
<body>
<div class="header">
  <div class="logo-wrap"><svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="sg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#2d1b69"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#sg)"/><rect x="10" y="9" width="20" height="6" rx="3" fill="white"/><rect x="10" y="17" width="20" height="6" rx="3" fill="rgba(255,255,255,0.9)"/><rect x="10" y="25" width="20" height="6" rx="3" fill="white"/><circle cx="31" cy="12" r="3" fill="#d97706"/></svg><div class="logo-text">SwoopForm PulseCheck</div></div>
  <div class="pin-badge" id="hdr-pin">----</div>
  <div class="participants-badge" id="hdr-participants">0 participants</div>
</div>
<div class="body" id="body">
  <div style="text-align:center;">
    <div style="width:44px;height:44px;border:4px solid rgba(14,165,233,.2);border-top-color:#0ea5e9;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto;"></div>
    <div style="margin-top:16px;font-size:14px;color:rgba(255,255,255,.4);">Connecting...</div>
  </div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getDatabase,ref,onValue}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83",databaseURL:"https://swoopform-default-rtdb.asia-southeast1.firebasedatabase.app/"};
const app=initializeApp(FB);const db=getDatabase(app);
const COLORS=['#0ea5e9','#7c3aed','#10b981','#f59e0b','#ef4444','#ec4899'];
const WC_SIZES=[3,2.4,2,1.7,1.4,1.2,1.1,1,0.9,0.85];
const params=new URLSearchParams(window.location.search);
const sessionId=params.get('session');
let curSlide=-1;

if(!sessionId){
  document.getElementById('body').innerHTML='<div style="text-align:center;"><div style="font-size:3rem;margin-bottom:12px;">😕</div><div style="font-size:1.2rem;font-weight:700;">No session ID in URL</div></div>';
}else{
  onValue(ref(db,'livePollSessions/'+sessionId),function(snap){
    if(!snap.exists())return;
    const s=snap.val();
    document.getElementById('hdr-pin').textContent=s.code||'----';
    if(s.status==='waiting'||s.currentSlide<0){renderWaiting(s);}
    else if(s.status==='active'&&s.currentSlide!==curSlide){curSlide=s.currentSlide;renderSlide(s);}
    else if(s.status==='ended'){renderEnded();}
  });
  onValue(ref(db,'livePollParticipants/'+sessionId),function(snap){
    const names=[];if(snap.exists())snap.forEach(function(c){names.push(c.val().name||'?');});
    document.getElementById('hdr-participants').textContent=names.length+' participant'+(names.length!==1?'s':'');
    const chipsWrap=document.getElementById('participants-chips-wrap');
    if(chipsWrap)chipsWrap.innerHTML=names.map(function(n){return '<div class="p-chip">'+eh(n)+'</div>';}).join('');
  });
}

function renderWaiting(s){
  document.getElementById('body').innerHTML=
    '<div class="wait-view">'
    +'<div style="font-size:1.1rem;color:rgba(255,255,255,.4);margin-bottom:8px;">Join at swoopform.com/livepoll/join · PIN</div>'
    +'<div class="pin-mega">'+s.code+'</div>'
    +'<div class="join-at">swoopform.com/livepoll/join</div>'
    +'<div class="participants-chips" id="participants-chips-wrap"></div>'
    +'</div>';
}

function renderSlide(s){
  const slide=s.slides[s.currentSlide];
  const total=s.slides.length;
  const wrapper=document.createElement('div');
  wrapper.className='slide-view';
  wrapper.innerHTML=
    '<div class="slide-num">Slide '+(s.currentSlide+1)+' of '+total+'</div>'
    +'<div class="slide-q">'+eh(slide.question)+'</div>'
    +'<div id="results-body"><div class="waiting-big">Waiting for responses...</div></div>'
    +'<div class="resp-count-big" id="resp-count-big">0 responses</div>';
  document.getElementById('body').innerHTML='';
  document.getElementById('body').appendChild(wrapper);
  onValue(ref(db,'livePollResponses/'+sessionId+'/'+s.currentSlide),function(snap){
    const resps=[];if(snap.exists())snap.forEach(function(c){resps.push(c.val().answer);});
    const rb=document.getElementById('results-body');const rc=document.getElementById('resp-count-big');
    if(rc)rc.textContent=resps.length+' response'+(resps.length!==1?'s':'');
    if(!rb)return;
    if(!resps.length){rb.innerHTML='<div class="waiting-big">Waiting for responses...</div>';return;}
    if(slide.type==='mcq'){
      const counts={};(slide.options||[]).forEach(function(o){counts[o]=0;});
      resps.forEach(function(r){if(counts[r]!==undefined)counts[r]++;});
      const max=Math.max(...Object.values(counts),1);
      rb.innerHTML='<div class="mcq-bars">'+( slide.options||[]).map(function(o,i){
        const pct=Math.round((counts[o]||0)/max*100);
        return '<div class="mcq-bar-row"><div class="mcq-bar-label">'+eh(o)+'</div>'
          +'<div class="mcq-bar-track"><div class="mcq-bar-fill" style="background:'+COLORS[i]+';width:'+pct+'%"></div></div>'
          +'<div class="mcq-bar-cnt">'+(counts[o]||0)+'</div></div>';
      }).join('')+'</div>';
    }else if(slide.type==='wordcloud'){
      const freq={};resps.forEach(function(r){const w=(r||'').trim().toLowerCase();if(w)freq[w]=(freq[w]||0)+1;});
      const sorted=Object.entries(freq).sort(function(a,b){return b[1]-a[1];}).slice(0,25);
      rb.innerHTML='<div class="wc-wrap">'+sorted.map(function(entry,i){
        const sz=WC_SIZES[Math.min(i,WC_SIZES.length-1)];
        return '<div class="wc-word" style="font-size:'+sz+'rem;background:'+COLORS[i%COLORS.length]+'22;border:1px solid '+COLORS[i%COLORS.length]+'44;color:'+COLORS[i%COLORS.length]+';padding:'+(6+Math.round(sz*4))+'px '+(12+Math.round(sz*6))+'px;">'+eh(entry[0])+'</div>';
      }).join('')+'</div>';
    }else{
      rb.innerHTML='<div class="ot-wrap">'+resps.slice(-6).reverse().map(function(r){return '<div class="ot-item">'+eh(r)+'</div>';}).join('')+'</div>';
    }
  });
}

function renderEnded(){
  document.getElementById('body').innerHTML=
    '<div class="ended-view">'
    +'<div style="font-size:5rem;margin-bottom:20px;">🎉</div>'
    +'<div style="font-weight:800;font-size:clamp(2rem,5vw,3.5rem);letter-spacing:-.04em;margin-bottom:12px;">Session Complete!</div>'
    +'<div style="font-size:1.2rem;color:rgba(255,255,255,.4);">Thank you for participating</div>'
    +'<div style="margin-top:24px;font-size:1rem;color:rgba(255,255,255,.2);">Powered by SwoopForm</div>'
    +'</div>';
}
function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
</script>
</body>
</html>
