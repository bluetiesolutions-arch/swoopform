<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join PulseCheck — SwoopForm</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:linear-gradient(135deg,#0c1a2e,#0f3460,#0c1a2e);background-attachment:fixed;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.card{background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1.5px solid rgba(255,255,255,.12);border-radius:24px;padding:36px;width:100%;max-width:440px;text-align:center;animation:slideUp .4s ease both;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{width:52px;height:52px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.3rem;color:#fff;margin:0 auto 16px;}
.title{font-weight:800;font-size:1.6rem;letter-spacing:-.03em;margin-bottom:6px;}
.sub{font-size:14px;color:rgba(255,255,255,.45);margin-bottom:28px;}
.pin-wrap{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.pin-d{width:64px;height:74px;border-radius:14px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-weight:800;font-size:2.2rem;text-align:center;outline:none;transition:border-color .2s;caret-color:transparent;font-family:'Sora',sans-serif;}
.pin-d:focus{border-color:#0ea5e9;}
.name-inp{width:100%;padding:13px 18px;border-radius:12px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:#fff;font-size:15px;font-family:'Sora',sans-serif;outline:none;text-align:center;margin-bottom:16px;transition:border-color .2s;}
.name-inp:focus{border-color:#0ea5e9;}
.name-inp::placeholder{color:rgba(255,255,255,.28);}
.join-btn{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:#fff;font-size:15px;font-weight:700;font-family:'Sora',sans-serif;cursor:pointer;transition:all .2s;}
.join-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(14,165,233,.4);}
.join-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
.err{font-size:13px;color:#ef4444;margin-bottom:12px;display:none;}
/* WAITING */
.wait-card{display:none;text-align:center;}
.wait-emoji{font-size:3.5rem;margin-bottom:16px;animation:bounce 1.2s ease infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.wait-name{font-weight:800;font-size:1.15rem;color:#0ea5e9;background:rgba(14,165,233,.15);border-radius:100px;padding:8px 28px;display:inline-block;margin-bottom:16px;}
.wait-title{font-weight:800;font-size:1.4rem;margin-bottom:6px;}
.wait-sub{font-size:14px;color:rgba(255,255,255,.4);}
.spinner{width:32px;height:32px;border:3px solid rgba(14,165,233,.2);border-top-color:#0ea5e9;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto 0;}
@keyframes spin{to{transform:rotate(360deg)}}
/* RESPOND */
.resp-card{display:none;width:100%;max-width:500px;}
.slide-title{font-weight:800;font-size:1.3rem;text-align:center;margin-bottom:24px;line-height:1.35;}
.mcq-opts{display:flex;flex-direction:column;gap:10px;}
.mcq-opt{padding:14px 18px;border-radius:12px;border:none;color:#fff;font-size:14px;font-weight:700;font-family:'Sora',sans-serif;cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:10px;}
.mcq-opt:hover:not(.done){transform:scale(1.02);}
.mcq-opt.done{cursor:default;transform:none;}
.mcq-opt.selected{box-shadow:0 0 0 3px #fff;}
.wc-inp{width:100%;padding:14px 18px;border-radius:12px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:16px;font-family:'Sora',sans-serif;outline:none;text-align:center;margin-bottom:12px;}
.wc-inp:focus{border-color:#0ea5e9;}
.wc-inp::placeholder{color:rgba(255,255,255,.3);}
.ot-inp{width:100%;padding:14px 18px;border-radius:12px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:14px;font-family:'Sora',sans-serif;outline:none;margin-bottom:12px;min-height:100px;resize:vertical;}
.ot-inp:focus{border-color:#0ea5e9;}
.ot-inp::placeholder{color:rgba(255,255,255,.3);}
.submit-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:#fff;font-size:15px;font-weight:700;font-family:'Sora',sans-serif;cursor:pointer;transition:all .2s;}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;}
.submitted-msg{text-align:center;padding:20px;animation:popIn .3s ease both;}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
/* ENDED */
.ended-card{display:none;text-align:center;}
@media(max-width:420px){.pin-d{width:52px;height:62px;font-size:1.8rem;}}
</style>
</head>
<body>
<!-- JOIN -->
<div class="card" id="join-card">
  <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><defs><linearGradient id="sg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#2d1b69"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#sg)"/><rect x="10" y="9" width="20" height="6" rx="3" fill="white"/><rect x="10" y="17" width="20" height="6" rx="3" fill="rgba(255,255,255,0.9)"/><rect x="10" y="25" width="20" height="6" rx="3" fill="white"/><circle cx="31" cy="12" r="3" fill="#d97706"/></svg>
  <div class="title">📡 Join Session</div>
  <div class="sub">Enter the 4-digit PIN from your host</div>
  <div class="pin-wrap">
    <input class="pin-d" id="p0" maxlength="1" type="tel" oninput="pi(0)" onkeydown="pb(event,0)">
    <input class="pin-d" id="p1" maxlength="1" type="tel" oninput="pi(1)" onkeydown="pb(event,1)">
    <input class="pin-d" id="p2" maxlength="1" type="tel" oninput="pi(2)" onkeydown="pb(event,2)">
    <input class="pin-d" id="p3" maxlength="1" type="tel" oninput="pi(3)" onkeydown="pb(event,3)">
  </div>
  <input class="name-inp" id="pname" placeholder="Your name (optional)" maxlength="20">
  <div class="err" id="err"></div>
  <button class="join-btn" id="join-btn" onclick="joinSession()">Join →</button>
</div>
<!-- WAITING -->
<div class="card wait-card" id="wait-card">
  <div class="wait-emoji">📡</div>
  <div class="wait-name" id="wait-name"></div>
  <div class="wait-title">You're in!</div>
  <div class="wait-sub">Waiting for the host to start...</div>
  <div class="spinner"></div>
</div>
<!-- RESPOND -->
<div class="card resp-card" id="resp-card">
  <div class="slide-title" id="slide-title"></div>
  <div id="resp-body"></div>
</div>
<!-- ENDED -->
<div class="card ended-card" id="ended-card">
  <div style="font-size:3rem;margin-bottom:16px;">🎉</div>
  <div style="font-weight:800;font-size:1.4rem;margin-bottom:8px;">Session ended!</div>
  <div style="font-size:14px;color:rgba(255,255,255,.4);margin-bottom:20px;">Thanks for participating.</div>
  <a href="/" style="color:rgba(255,255,255,.3);font-size:13px;text-decoration:none;">← SwoopForm</a>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getDatabase,ref,get,push,set,onValue}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83",databaseURL:"https://swoopform-default-rtdb.asia-southeast1.firebasedatabase.app/"};
const app=initializeApp(FB);const db=getDatabase(app);
const COLORS=['#0ea5e9','#7c3aed','#10b981','#f59e0b','#ef4444','#ec4899'];
const LETTERS=['A','B','C','D','E','F'];
let sessionId=null,participantId=null,participantName='',curSlide=-1,responded=new Set();

window.pi=function(i){const v=document.getElementById('p'+i).value.replace(/\D/g,'');document.getElementById('p'+i).value=v;if(v&&i<3)document.getElementById('p'+(i+1)).focus();};
window.pb=function(e,i){if(e.key==='Backspace'&&!document.getElementById('p'+i).value&&i>0)document.getElementById('p'+(i-1)).focus();};
function getPin(){return[0,1,2,3].map(function(i){return document.getElementById('p'+i).value;}).join('');}

window.joinSession=async function(){
  const pin=getPin();const name=document.getElementById('pname').value.trim()||'Guest';
  const err=document.getElementById('err');
  if(pin.length!==4){err.textContent='Please enter the 4-digit PIN';err.style.display='block';return;}
  err.style.display='none';
  const btn=document.getElementById('join-btn');btn.disabled=true;btn.textContent='Joining...';
  try{
    const snap=await get(ref(db,'livePollSessions'));
    let found=null;
    if(snap.exists())snap.forEach(function(c){const s=c.val();if(s.code===pin&&s.status!=='ended')found={id:c.key,...s};});
    if(!found){err.textContent='PIN not found. Check with your host.';err.style.display='block';btn.disabled=false;btn.textContent='Join →';return;}
    sessionId=found.id;participantName=name;
    const pRef=push(ref(db,'livePollParticipants/'+sessionId));
    participantId=pRef.key;
    await set(pRef,{name,joinedAt:Date.now()});
    document.getElementById('join-card').style.display='none';
    document.getElementById('wait-card').style.display='block';
    document.getElementById('wait-name').textContent=name;
    listenToSession();
  }catch(e){console.error(e);err.textContent='Something went wrong.';err.style.display='block';btn.disabled=false;btn.textContent='Join →';}
};

function listenToSession(){
  onValue(ref(db,'livePollSessions/'+sessionId),function(snap){
    if(!snap.exists())return;
    const s=snap.val();
    if(s.status==='ended'){hideAll();document.getElementById('ended-card').style.display='block';return;}
    if(s.status==='active'&&s.currentSlide!==curSlide&&s.currentSlide>=0){
      curSlide=s.currentSlide;
      const slide=s.slides[curSlide];
      hideAll();
      document.getElementById('resp-card').style.display='block';
      document.getElementById('slide-title').textContent=slide.question;
      renderSlide(slide,curSlide);
    }
  });
}

function hideAll(){
  ['wait-card','resp-card','ended-card'].forEach(function(id){document.getElementById(id).style.display='none';});
}

function renderSlide(slide,idx){
  const body=document.getElementById('resp-body');
  if(responded.has(idx)){body.innerHTML='<div class="submitted-msg"><div style="font-size:2.5rem;margin-bottom:10px;">✅</div><div style="font-weight:700;">Response submitted!</div><div style="font-size:13px;color:rgba(255,255,255,.4);margin-top:6px;">Waiting for next slide...</div></div>';return;}
  if(slide.type==='mcq'){
    body.innerHTML='<div class="mcq-opts">'+( slide.options||[]).map(function(o,i){
      return '<button class="mcq-opt" id="mopt_'+i+'" style="background:'+COLORS[i]+'" onclick="submitMCQ(\''+eh(o)+'\','+idx+')">'
        +'<span style="width:22px;height:22px;border-radius:6px;background:rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">'+LETTERS[i]+'</span>'
        +'<span>'+eh(o)+'</span></button>';
    }).join('')+'</div>';
  }else if(slide.type==='wordcloud'){
    body.innerHTML='<input class="wc-inp" id="wc-inp" placeholder="Type one word..." maxlength="30" onkeydown="if(event.key===\'Enter\')submitWord('+idx+')">'
      +'<button class="submit-btn" onclick="submitWord('+idx+')">Submit Word →</button>';
  }else{
    body.innerHTML='<textarea class="ot-inp" id="ot-inp" placeholder="Share your thoughts..." maxlength="300"></textarea>'
      +'<button class="submit-btn" onclick="submitText('+idx+')">Submit →</button>';
  }
}

window.submitMCQ=async function(answer,idx){
  if(responded.has(idx))return;responded.add(idx);
  document.querySelectorAll('.mcq-opt').forEach(function(b){b.classList.add('done');b.disabled=true;});
  const el=document.getElementById('resp-body');
  el.innerHTML='<div class="submitted-msg"><div style="font-size:2.5rem;margin-bottom:10px;">✅</div><div style="font-weight:700;">Voted for: '+eh(answer)+'</div><div style="font-size:13px;color:rgba(255,255,255,.4);margin-top:6px;">Waiting for next slide...</div></div>';
  await push(ref(db,'livePollResponses/'+sessionId+'/'+idx),{participantId,name:participantName,answer,timestamp:Date.now()});
};

window.submitWord=async function(idx){
  const val=(document.getElementById('wc-inp')?.value||'').trim();
  if(!val||responded.has(idx))return;responded.add(idx);
  document.getElementById('resp-body').innerHTML='<div class="submitted-msg"><div style="font-size:2.5rem;margin-bottom:10px;">☁️</div><div style="font-weight:700;">Word submitted!</div><div style="font-size:13px;color:rgba(255,255,255,.4);margin-top:6px;">Waiting for next slide...</div></div>';
  await push(ref(db,'livePollResponses/'+sessionId+'/'+idx),{participantId,name:participantName,answer:val,timestamp:Date.now()});
};

window.submitText=async function(idx){
  const val=(document.getElementById('ot-inp')?.value||'').trim();
  if(!val||responded.has(idx))return;responded.add(idx);
  document.getElementById('resp-body').innerHTML='<div class="submitted-msg"><div style="font-size:2.5rem;margin-bottom:10px;">💬</div><div style="font-weight:700;">Response submitted!</div><div style="font-size:13px;color:rgba(255,255,255,.4);margin-top:6px;">Waiting for next slide...</div></div>';
  await push(ref(db,'livePollResponses/'+sessionId+'/'+idx),{participantId,name:participantName,answer:val,timestamp:Date.now()});
};

function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
</script>
</body>
</html>
