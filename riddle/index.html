<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riddle — SwoopForm</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="/email_notify.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8f5ff;--white:#fff;--border:#e8e0ff;--accent:#6b3fa0;--accent2:#a855f7;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--text:#0f0e1a;--muted:#64748b;--muted2:#94a3b8;--font:'Sora',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
nav{background:var(--white);border-bottom:1.5px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.logo-mk{width:28px;height:28px;background:linear-gradient(135deg,#6b3fa0,#a855f7);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;}
.logo-nm{font-weight:800;font-size:15px;}
.riddle-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:100px;background:#ede9ff;border:1px solid #c4b5fd;color:#6b3fa0;font-size:12px;font-weight:700;}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:28px 20px;}
.riddle-card{background:var(--white);border-radius:24px;padding:36px;width:100%;max-width:580px;box-shadow:0 4px 32px rgba(107,63,160,0.1);border:1.5px solid var(--border);animation:slideUp .4s ease both;}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.welcome-emoji{font-size:4rem;text-align:center;margin-bottom:12px;animation:bounceIn .6s ease;}
@keyframes bounceIn{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.welcome-title{font-weight:800;font-size:clamp(1.3rem,3vw,1.8rem);letter-spacing:-.03em;text-align:center;margin-bottom:8px;}
.welcome-desc{font-size:14px;color:var(--muted);text-align:center;margin-bottom:12px;line-height:1.6;}
.welcome-chips{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:100px;background:#ede9ff;color:#6b3fa0;font-size:12px;font-weight:700;}
.player-form{margin-bottom:20px;}
.player-inp{width:100%;padding:12px 16px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:var(--font);outline:none;margin-bottom:10px;transition:border-color .2s;}
.player-inp:focus{border-color:var(--accent);}
.player-inp::placeholder{color:var(--muted2);}
.start-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#6b3fa0,#a855f7);color:#fff;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .2s;}
.start-btn:hover{opacity:.9;transform:translateY(-1px);}
.progress-wrap{margin-bottom:20px;}
.progress-track{height:6px;background:#ede9ff;border-radius:3px;overflow:hidden;margin-bottom:8px;}
.progress-fill{height:100%;background:linear-gradient(90deg,#6b3fa0,#a855f7);border-radius:3px;transition:width .4s ease;}
.progress-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted2);font-weight:600;}
.timer-bar{height:4px;background:#ede9ff;border-radius:2px;overflow:hidden;margin-bottom:16px;}
.timer-fill{height:100%;background:linear-gradient(90deg,#6b3fa0,#a855f7);border-radius:2px;transition:width 1s linear;}
.timer-fill.warning{background:linear-gradient(90deg,#f59e0b,#ef4444);}
.q-label{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
.q-text{font-weight:800;font-size:clamp(1rem,2.5vw,1.25rem);letter-spacing:-.02em;line-height:1.35;margin-bottom:20px;}
.options-list{display:flex;flex-direction:column;gap:9px;margin-bottom:20px;}
.opt-btn{padding:13px 18px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;text-align:left;font-size:14px;font-weight:600;font-family:var(--font);color:var(--text);transition:all .2s;display:flex;align-items:center;gap:10px;width:100%;}
.opt-btn:hover:not(.disabled){border-color:var(--accent);background:#ede9ff;}
.opt-btn.selected{border-color:var(--accent);background:#ede9ff;color:var(--accent);}
.opt-btn.correct{border-color:var(--green);background:#dcfce7;color:#166534;}
.opt-btn.wrong{border-color:var(--red);background:#fee2e2;color:#dc2626;}
.opt-btn.disabled{cursor:default;}
.opt-letter{width:26px;height:26px;border-radius:7px;background:rgba(107,63,160,.1);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.opt-btn.correct .opt-letter{background:rgba(16,185,129,.15);color:var(--green);}
.opt-btn.wrong .opt-letter{background:rgba(239,68,68,.15);color:var(--red);}
.text-inp-wrap{margin-bottom:20px;}
.text-inp{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;font-family:var(--font);outline:none;transition:border-color .2s;}
.text-inp:focus{border-color:var(--accent);}
.text-inp::placeholder{color:var(--muted2);}
.submit-q-btn{width:100%;padding:12px;border-radius:11px;border:none;background:linear-gradient(135deg,#6b3fa0,#a855f7);color:#fff;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .2s;margin-bottom:12px;}
.submit-q-btn:disabled{opacity:.4;cursor:not-allowed;}
.feedback-box{padding:12px 16px;border-radius:10px;font-size:14px;font-weight:600;margin-bottom:14px;line-height:1.5;}
.feedback-correct{background:#dcfce7;border:1px solid #86efac;color:#166534;}
.feedback-wrong{background:#fee2e2;border:1px solid #fecaca;color:#dc2626;}
.hint-btn{background:none;border:1px dashed var(--border);border-radius:8px;padding:7px 14px;color:var(--muted);font-family:var(--font);font-size:12px;cursor:pointer;transition:all .15s;margin-bottom:12px;width:100%;}
.hint-btn:hover{border-color:var(--accent);color:var(--accent);}
.hint-text{font-size:13px;color:var(--muted);margin-bottom:14px;padding:10px 14px;background:#ede9ff;border-radius:8px;line-height:1.5;}
.explanation-text{font-size:13px;color:var(--muted);margin-bottom:14px;padding:10px 14px;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;line-height:1.5;}
.next-btn{width:100%;padding:12px;border-radius:11px;border:1.5px solid var(--border);background:var(--white);color:var(--accent);font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .2s;}
.next-btn:hover{background:#ede9ff;border-color:var(--accent);}
.results-emoji{font-size:3rem;text-align:center;margin-bottom:12px;}
.results-title{font-weight:800;font-size:1.3rem;text-align:center;margin-bottom:6px;}
.results-score{font-weight:800;font-size:3rem;color:var(--accent);text-align:center;letter-spacing:-.05em;margin-bottom:4px;}
.results-meta{text-align:center;font-size:13px;color:var(--muted2);margin-bottom:20px;}
.score-bar-wrap{background:#ede9ff;border-radius:10px;height:12px;overflow:hidden;margin-bottom:20px;}
.score-bar-fill{height:100%;background:linear-gradient(90deg,#6b3fa0,#a855f7);border-radius:10px;transition:width 1s ease;}
.q-result-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
.q-result-row:last-child{border-bottom:none;}
.q-result-icon{font-size:16px;flex-shrink:0;}
.q-result-text{flex:1;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.leaderboard-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
.leaderboard-row:last-child{border-bottom:none;}
.lb-rank{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.lb-name{flex:1;font-weight:600;}
.lb-score{font-weight:800;color:var(--accent);}
.play-again-btn{width:100%;padding:12px;border-radius:11px;border:none;background:linear-gradient(135deg,#6b3fa0,#a855f7);color:#fff;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .2s;margin-top:8px;}
.play-again-btn:hover{opacity:.9;}
.sf-brand{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:20px;opacity:.4;}
.sf-logo{width:18px;height:18px;border-radius:4px;background:linear-gradient(135deg,#6b3fa0,#a855f7);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:9px;color:#fff;}
.spinner{width:28px;height:28px;border:3px solid rgba(107,63,160,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto;display:block;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.riddle-card{padding:24px 18px;border-radius:16px;}nav{padding:0 14px;}.logo-nm{display:none;}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo"><svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="sg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#2d1b69"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#sg)"/><rect x="10" y="9" width="20" height="6" rx="3" fill="white"/><rect x="10" y="17" width="20" height="6" rx="3" fill="rgba(255,255,255,0.9)"/><rect x="10" y="25" width="20" height="6" rx="3" fill="white"/><circle cx="31" cy="12" r="3" fill="#d97706"/></svg><div class="logo-nm">SwoopForm</div></a>
  <div class="riddle-badge">🧩 Riddle</div>
</nav>
<div class="stage" id="stage"><div class="spinner"></div></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,collection,query,where,getDocs,doc,getDoc,addDoc,updateDoc,increment,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);
const db=getFirestore(app);

const pathParts=window.location.pathname.split('/').filter(Boolean);
const slugFromPath=pathParts[1];
const idFromQuery=new URLSearchParams(window.location.search).get('id');
let riddle=null,riddleId=null,questions=[],currentQ=0,score=0,answers=[],answered=false;
let playerName='',playerEmail='',timerInterval=null,timeLeft=0;

async function init(){
  try{
    let data=null;
    if(slugFromPath&&slugFromPath!=='riddle'){
      const q=query(collection(db,'riddles'),where('slug','==',slugFromPath));
      const snap=await getDocs(q);
      if(!snap.empty){data={id:snap.docs[0].id,...snap.docs[0].data()};riddleId=snap.docs[0].id;}
    }
    if(!data&&idFromQuery){
      const byId=await getDoc(doc(db,'riddles',idFromQuery));
      if(byId.exists()){data={id:byId.id,...byId.data()};riddleId=byId.id;}
    }
    if(!data){showError('Riddle not found','This riddle may have been removed.');return;}
    if(data.status==='closed'||data.accepting===false){showError('Riddle closed','This riddle is no longer available.');return;}
    riddle=data;
    injectSEO(riddle);
    questions=riddle.shuffleQuestions?shuffle([...(riddle.questions||[])]):riddle.questions||[];
    showWelcome();
  }catch(e){console.error(e);showError('Something went wrong','Please try again.');}
}

function injectSEO(r){
  document.title=(r.title||'Riddle')+' — SwoopForm';
  const addMeta=function(n,c,prop){const el=document.createElement('meta');if(prop)el.setAttribute('property',n);else el.setAttribute('name',n);el.setAttribute('content',c);document.head.appendChild(el);};
  addMeta('description',r.description||'Can you solve this riddle?');
  addMeta('og:title',r.title||'Riddle',true);
}

function showWelcome(){
  const total=questions.length;
  const diff=riddle.difficulty||'Medium';
  const diffColors={Easy:'#10b981',Medium:'#f59e0b',Hard:'#ef4444',Expert:'#7c3aed'};
  const color=diffColors[diff]||'#6b3fa0';
  const playerFields=(riddle.collectName!==false)?'<input class="player-inp" id="player-name" placeholder="Your name">':''
    +(riddle.collectEmail?'<input class="player-inp" id="player-email" type="email" placeholder="your@email.com">':'');

  render('<div class="welcome-emoji">'+(riddle.emoji||'🧩')+'</div>'
    +'<div class="welcome-title">'+eh(riddle.title||'Riddle Challenge')+'</div>'
    +(riddle.description?'<div class="welcome-desc">'+eh(riddle.description)+'</div>':'')
    +'<div class="welcome-chips">'
    +'<span class="chip">❓ '+total+' question'+(total!==1?'s':'')+'</span>'
    +'<span class="chip" style="background:'+color+'22;color:'+color+';">'+diff+'</span>'
    +(riddle.category?'<span class="chip">📚 '+riddle.category+'</span>':'')
    +(riddle.timerPerQuestion?'<span class="chip">⏱ '+riddle.timerPerQuestion+'s per question</span>':'')
    +'</div>'
    +(playerFields?'<div class="player-form">'+playerFields+'</div>':'')
    +'<button class="start-btn" onclick="startRiddle()">Start Riddle 🚀</button>'
    +'<div class="sf-brand"><svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="sg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#2d1b69"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#sg)"/><rect x="10" y="9" width="20" height="6" rx="3" fill="white"/><rect x="10" y="17" width="20" height="6" rx="3" fill="rgba(255,255,255,0.9)"/><rect x="10" y="25" width="20" height="6" rx="3" fill="white"/><circle cx="31" cy="12" r="3" fill="#d97706"/></svg><span style="font-size:11px;color:var(--muted2);">Powered by SwoopForm</span></div>');
}

window.startRiddle=function(){
  const nameInp=document.getElementById('player-name');
  const emailInp=document.getElementById('player-email');
  if(riddle.collectName!==false&&nameInp&&!nameInp.value.trim()){nameInp.style.borderColor='var(--red)';return;}
  playerName=nameInp?nameInp.value.trim():'';
  playerEmail=emailInp?emailInp.value.trim():'';
  currentQ=0;score=0;answers=[];answered=false;
  showQuestion(0);
};

function showQuestion(idx){
  currentQ=idx;answered=false;
  const q=questions[idx];if(!q)return;
  const total=questions.length;
  const pct=Math.round((idx/total)*100);
  const letters=['A','B','C','D','E','F'];
  const opts=riddle.shuffleOptions&&q.type==='mcq'?shuffle([...q.options||[]]):q.options||[];

  let questionHtml='';
  if(q.type==='mcq'||q.type==='truefalse'){
    questionHtml='<div class="options-list" id="opts-list">'
      +opts.map(function(opt,i){return '<button class="opt-btn" id="opt_'+i+'" onclick="selectOpt('+i+',\''+opt.replace(/'/g,"\\'")+'\')">'
        +'<span class="opt-letter">'+letters[i]+'</span>'+eh(opt)+'</button>';}).join('')
      +'</div>';
  }else{
    questionHtml='<div class="text-inp-wrap">'
      +'<input class="text-inp" id="text-ans" placeholder="Type your answer..." onkeydown="if(event.key===\'Enter\')submitText()">'
      +'</div>'
      +'<button class="submit-q-btn" id="submit-text-btn" onclick="submitText()">Submit Answer</button>';
  }

  const timerHtml=riddle.timerPerQuestion?'<div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>':'';
  const hintHtml=riddle.showHints&&q.hint?'<button class="hint-btn" id="hint-btn" onclick="showHint()">💡 Show hint</button>':'';

  render('<div class="progress-wrap">'
    +'<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>'
    +'<div class="progress-meta"><span>Question '+(idx+1)+' of '+total+'</span><span>⭐ '+score+'/'+idx+'</span></div>'
    +'</div>'
    +timerHtml
    +'<div class="q-label">Question '+(idx+1)+'</div>'
    +'<div class="q-text">'+eh(q.question||'')+'</div>'
    +questionHtml
    +hintHtml
    +'<div id="feedback-area"></div>');

  if(riddle.timerPerQuestion)startTimer(riddle.timerPerQuestion,q);
}

function startTimer(seconds,q){
  clearInterval(timerInterval);timeLeft=seconds;
  const fill=document.getElementById('timer-fill');
  timerInterval=setInterval(function(){
    timeLeft--;
    if(fill){
      fill.style.width=(timeLeft/seconds*100)+'%';
      if(timeLeft<=seconds*0.3)fill.classList.add('warning');
    }
    if(timeLeft<=0){
      clearInterval(timerInterval);
      if(!answered)timeUp(q);
    }
  },1000);
}

function timeUp(q){
  answered=true;
  answers.push({question:q.question,correct:false,userAnswer:'(Time up)',correctAnswer:getCorrectAnswer(q)});
  const fb=document.getElementById('feedback-area');
  if(fb)fb.innerHTML='<div class="feedback-box feedback-wrong">⏱ Time\'s up! '+(riddle.showFeedback?'The correct answer was: '+eh(getCorrectAnswer(q)):'')+'</div>'
    +(q.explanation&&riddle.showFeedback?'<div class="explanation-text">💡 '+eh(q.explanation)+'</div>':'')
    +'<button class="next-btn" onclick="nextQuestion()">'+(currentQ<questions.length-1?'Next Question →':'See Results →')+'</button>';
  document.querySelectorAll('.opt-btn').forEach(function(b){b.classList.add('disabled');b.disabled=true;});
  const sub=document.getElementById('submit-text-btn');if(sub)sub.disabled=true;
}

window.selectOpt=function(idx,val){
  if(answered)return;
  clearInterval(timerInterval);answered=true;
  const q=questions[currentQ];
  const opts=riddle.shuffleOptions&&q.type==='mcq'?shuffle([...q.options]):q.options||[];
  const correctOpt=opts[q.correctIndex]||opts[0];
  const isCorrect=val===correctOpt;
  if(isCorrect)score++;
  answers.push({question:q.question,correct:isCorrect,userAnswer:val,correctAnswer:correctOpt});
  document.querySelectorAll('.opt-btn').forEach(function(b,i){
    b.classList.add('disabled');b.disabled=true;
    if(opts[i]===correctOpt)b.classList.add('correct');
    else if(i===idx&&!isCorrect)b.classList.add('wrong');
  });
  const fb=document.getElementById('feedback-area');
  if(fb&&riddle.showFeedback){
    fb.innerHTML='<div class="feedback-box '+(isCorrect?'feedback-correct':'feedback-wrong')+'">'
      +(isCorrect?'✅ Correct!':'❌ Wrong! The answer is: '+eh(correctOpt))+'</div>'
      +(q.explanation?'<div class="explanation-text">💡 '+eh(q.explanation)+'</div>':'')
      +'<button class="next-btn" onclick="nextQuestion()">'+(currentQ<questions.length-1?'Next Question →':'See Results →')+'</button>';
  }else if(fb){
    fb.innerHTML='<button class="next-btn" onclick="nextQuestion()">'+(currentQ<questions.length-1?'Next Question →':'See Results →')+'</button>';
  }
  const hb=document.getElementById('hint-btn');if(hb)hb.style.display='none';
};

window.submitText=function(){
  if(answered)return;
  const inp=document.getElementById('text-ans');if(!inp||!inp.value.trim())return;
  clearInterval(timerInterval);answered=true;
  const q=questions[currentQ];
  const userAns=inp.value.trim().toLowerCase();
  const correctAns=(q.answer||'').toLowerCase();
  const isCorrect=userAns===correctAns||userAns.includes(correctAns)||correctAns.includes(userAns);
  if(isCorrect)score++;
  answers.push({question:q.question,correct:isCorrect,userAnswer:inp.value.trim(),correctAnswer:q.answer||''});
  inp.style.borderColor=isCorrect?'var(--green)':'var(--red)';
  const sub=document.getElementById('submit-text-btn');if(sub)sub.disabled=true;
  const fb=document.getElementById('feedback-area');
  if(fb){
    fb.innerHTML='<div class="feedback-box '+(isCorrect?'feedback-correct':'feedback-wrong')+'">'
      +(isCorrect?'✅ Correct!':'❌ The answer was: '+eh(q.answer||''))+'</div>'
      +(q.explanation?'<div class="explanation-text">💡 '+eh(q.explanation)+'</div>':'')
      +'<button class="next-btn" onclick="nextQuestion()">'+(currentQ<questions.length-1?'Next Question →':'See Results →')+'</button>';
  }
};

window.showHint=function(){
  const q=questions[currentQ];if(!q||!q.hint)return;
  const hb=document.getElementById('hint-btn');if(hb)hb.outerHTML='<div class="hint-text">💡 '+eh(q.hint)+'</div>';
};

window.nextQuestion=function(){
  clearInterval(timerInterval);
  if(currentQ<questions.length-1)showQuestion(currentQ+1);
  else showResults();
};

async function showResults(){
  const total=questions.length;
  const pct=Math.round((score/total)*100);
  const msgs=riddle.messages||{};
  const msg=pct===100?(msgs.perfect||'🎉 Perfect score!'):pct>=70?(msgs.good||'🌟 Great job!'):pct>=40?(msgs.avg||'👍 Not bad!'):( msgs.low||'😅 Keep practising!');
  const emoji=pct===100?'🏆':pct>=70?'🌟':pct>=40?'👍':'😅';

  // Save response
  try{
    const ownerId=riddleData.userId;
    if(ownerId){
      const rl=await checkResponseLimit(db,ownerId);
      if(!rl.allowed){showResponseLimitError(rl.count,rl.limit);return;}
    }
    await addDoc(collection(db,'riddleResponses'),{ownerId:typeof ownerId!=='undefined'?ownerId:(formData?.userId||pollData?.userId||votingData?.userId||pledgeData?.userId||riddleData?.userId||surveyData?.userId||''),
      riddleId,riddleTitle:riddle.title,playerName,playerEmail,
      score,total,pct,answers,submittedAt:serverTimestamp()
    });
    await updateDoc(doc(db,'riddles',riddleId),{responseCount:increment(1)});
  }catch(e){console.error(e);}

  // Load leaderboard
  let lbHtml='';
  if(riddle.showLeaderboard){
    try{
      const lbSnap=await getDocs(query(collection(db,'riddleResponses'),where('riddleId','==',riddleId)));
      const entries=lbSnap.docs.map(function(d){return d.data();}).filter(function(r){return r.playerName;}).sort(function(a,b){return b.pct-a.pct;}).slice(0,5);
      if(entries.length){
        const rankEmojis=['🥇','🥈','🥉'];
        const rankColors=['#f59e0b','#9ca3af','#b45309'];
        lbHtml='<div style="margin-top:20px;border-top:1px solid var(--border);padding-top:16px;">'
          +'<div style="font-size:13px;font-weight:700;margin-bottom:12px;">🏆 Leaderboard</div>'
          +entries.map(function(e,i){
            const isMe=e.playerName===playerName;
            return '<div class="leaderboard-row" style="'+(isMe?'background:#ede9ff;border-radius:8px;padding:10px;margin:-2px -4px;':'')+'"><div class="lb-rank" style="background:'+(rankColors[i]||'var(--bg)')+';color:'+(i<3?'#fff':'var(--muted)')+';">'+(rankEmojis[i]||i+1)+'</div><div class="lb-name">'+eh(e.playerName)+(isMe?' (you)':'')+'</div><div class="lb-score">'+e.pct+'%</div></div>';
          }).join('')
          +'</div>';
      }
    }catch(e){console.error(e);}
  }

  render('<div class="results-emoji">'+emoji+'</div>'
    +'<div class="results-title">'+eh(msg)+'</div>'
    +'<div class="results-score">'+score+'/'+total+'</div>'
    +'<div class="results-meta">'+(riddle.showPct?pct+'% score · ':'')+questions.length+' questions</div>'
    +'<div class="score-bar-wrap"><div class="score-bar-fill" style="width:'+pct+'%"></div></div>'
    +'<div>'+answers.map(function(a,i){return '<div class="q-result-row">'
      +'<span class="q-result-icon">'+(a.correct?'✅':'❌')+'</span>'
      +'<span class="q-result-text">'+eh((a.question||'').substring(0,50))+'</span>'
      +(a.correct?'':'<span style="font-size:11px;color:var(--red);flex-shrink:0;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+eh(a.correctAnswer)+'</span>')
      +'</div>';}).join('')+'</div>'
    +lbHtml
    +'<button class="play-again-btn" onclick="window.location.reload()">🔄 Play Again</button>'
    +'<div class="sf-brand"><svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="sg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#2d1b69"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#sg)"/><rect x="10" y="9" width="20" height="6" rx="3" fill="white"/><rect x="10" y="17" width="20" height="6" rx="3" fill="rgba(255,255,255,0.9)"/><rect x="10" y="25" width="20" height="6" rx="3" fill="white"/><circle cx="31" cy="12" r="3" fill="#d97706"/></svg><span style="font-size:11px;color:var(--muted2);">Powered by SwoopForm</span></div>');
}

function render(html){document.getElementById('stage').innerHTML='<div class="riddle-card">'+html+'</div>';}
function getCorrectAnswer(q){if(q.type==='mcq'||q.type==='truefalse')return(q.options||[])[q.correctIndex]||'';return q.answer||'';}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function showError(title,msg){document.getElementById('stage').innerHTML='<div class="riddle-card" style="text-align:center;"><div style="font-size:48px;margin-bottom:16px;">🧩</div><div style="font-weight:800;font-size:18px;margin-bottom:8px;">'+title+'</div><p style="color:var(--muted);font-size:14px;">'+msg+'</p><br><a href="/" style="color:var(--accent);font-weight:600;text-decoration:none;">← SwoopForm</a></div>';}
init();

async function checkResponseLimit(db, ownerId){
  try{
    const {collection,query,where,getDocs,Timestamp}=await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    // Get start of current month
    const now=new Date();
    const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
    const monthTs={seconds:Math.floor(monthStart.getTime()/1000),nanoseconds:0};
    // Get owner's plan
    const {doc,getDoc}=await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    const userSnap=await getDoc(doc(db,'users',ownerId));
    const userData=userSnap.exists()?userSnap.data():{plan:'free'};
    const plan=userData.plan||'free';
    const LIMITS={free:100,starter:1000,pro:-1,business:-1,student:-1,educator:-1,ngo:-1};
    const limit=LIMITS[plan]??100;
    if(limit===-1)return{allowed:true,count:0,limit:-1};
    // Count responses this month across all response collections
    const RESP_COLS=['surveyResponses','pollResponses','votingResponses','pledgeResponses','riddleResponses'];
    let total=0;
    for(const col of RESP_COLS){
      try{
        const snap=await getDocs(query(collection(db,col),where('ownerId','==',ownerId)));
        // Filter by this month client-side (simpler than composite index)
        snap.forEach(function(d){
          const ts=d.data().createdAt?.seconds||0;
          if(ts>=monthTs.seconds)total++;
        });
      }catch(e){}
    }
    // Also check subcollection responses (assessment, feedback, lead, registration, employee, product, award, jobapp)
    const SUB_COLS=['assessments','feedbacks','leads','registrations','employees','products','awards','jobapps'];
    for(const col of SUB_COLS){
      try{
        const formsSnap=await getDocs(query(collection(db,col),where('userId','==',ownerId)));
        for(const formDoc of formsSnap.docs){
          const rSnap=await getDocs(collection(db,col,formDoc.id,'responses'));
          rSnap.forEach(function(d){
            const ts=d.data().createdAt?.seconds||0;
            if(ts>=monthTs.seconds)total++;
          });
        }
      }catch(e){}
    }
    return{allowed:total<limit,count:total,limit};
  }catch(e){return{allowed:true,count:0,limit:-1};}
}

function showResponseLimitError(count, limit){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;font-family:Sora,sans-serif;';
  overlay.innerHTML=`<div style="background:#fff;border-radius:20px;padding:32px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);">
    <div style="font-size:48px;margin-bottom:16px;">📊</div>
    <div style="font-size:20px;font-weight:800;color:#0f0e1a;margin-bottom:8px;">Form temporarily unavailable</div>
    <div style="font-size:14px;color:#64748b;margin-bottom:20px;line-height:1.6;">This form has reached its monthly response limit. The owner needs to upgrade their plan to continue collecting responses.</div>
    <div style="background:#f5f0e8;border-radius:10px;padding:14px;margin-bottom:20px;">
      <div style="font-size:13px;color:#64748b;">Monthly responses used</div>
      <div style="font-size:22px;font-weight:800;color:#e5484d;margin-top:4px;">${count} / ${limit}</div>
    </div>
    <a href="/" style="display:block;padding:12px;border-radius:10px;background:linear-gradient(135deg,#2d1b69,#7c3aed);color:#fff;font-size:14px;font-weight:700;text-decoration:none;">← Back to SwoopForm</a>
  </div>`;
  document.body.appendChild(overlay);
}
</script>
