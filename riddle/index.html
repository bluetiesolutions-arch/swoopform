<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riddle — SwoopForm</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#F8F5FF;color:#0F0E1A;min-height:100vh;display:flex;flex-direction:column}
    nav{background:#fff;border-bottom:1.5px solid #E8E0FF;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
    .logo-mk{width:28px;height:28px;background:linear-gradient(135deg,#2D1B69,#D97706);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.8rem;color:#fff}
    .logo-nm{font-family:'Syne',sans-serif;font-weight:800;font-size:0.95rem}
    .riddle-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:100px;background:#EDE9FF;border:1px solid #C4B5FD;color:#6B3FA0;font-size:0.75rem;font-weight:700}
    .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:28px 20px}
    .riddle-card{background:#fff;border-radius:24px;padding:36px;width:100%;max-width:560px;box-shadow:0 4px 32px rgba(107,63,160,0.08);border:1.5px solid #E8E0FF;animation:slideUp 0.4s ease both}
    @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    /* WELCOME SCREEN */
    .welcome-emoji{font-size:4rem;text-align:center;margin-bottom:12px;animation:bounceIn 0.6s ease}
    @keyframes bounceIn{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
    .welcome-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.3rem,3vw,1.8rem);letter-spacing:-0.03em;text-align:center;margin-bottom:8px}
    .welcome-desc{font-size:0.88rem;color:#64748B;text-align:center;margin-bottom:8px;line-height:1.6}
    .welcome-meta{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
    .welcome-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:100px;background:#EDE9FF;color:#6B3FA0;font-size:0.75rem;font-weight:700}
    .start-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#6B3FA0,#A855F7);color:#fff;font-size:1rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all 0.2s}
    .start-btn:hover{opacity:0.9;transform:translateY(-1px)}

    /* PROGRESS */
    .progress-wrap{margin-bottom:20px}
    .progress-track{height:6px;background:#EDE9FF;border-radius:3px;overflow:hidden;margin-bottom:8px}
    .progress-fill{height:100%;background:linear-gradient(90deg,#6B3FA0,#A855F7);border-radius:3px;transition:width 0.4s ease}
    .progress-meta{display:flex;justify-content:space-between;font-size:0.72rem;color:#94A3B8;font-weight:600}

    /* QUESTION */
    .q-label{font-size:0.7rem;font-weight:700;color:#6B3FA0;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px}
    .q-text{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1rem,2.5vw,1.3rem);letter-spacing:-0.02em;line-height:1.3;margin-bottom:20px}
    .options-list{display:flex;flex-direction:column;gap:9px;margin-bottom:20px}
    .opt-btn{padding:13px 18px;border-radius:12px;border:1.5px solid #E8E0FF;background:#F8F5FF;cursor:pointer;text-align:left;font-size:0.9rem;font-weight:600;font-family:'DM Sans',sans-serif;color:#0F0E1A;transition:all 0.2s;display:flex;align-items:center;gap:10px}
    .opt-btn:hover:not(.disabled){border-color:#6B3FA0;background:#EDE9FF}
    .opt-btn.selected{border-color:#6B3FA0;background:#EDE9FF;color:#6B3FA0}
    .opt-btn.correct{border-color:#10B981;background:#DCFCE7;color:#166534}
    .opt-btn.wrong{border-color:#EF4444;background:#FEE2E2;color:#DC2626}
    .opt-btn.disabled{cursor:default}
    .opt-letter{width:26px;height:26px;border-radius:7px;background:rgba(107,63,160,0.1);color:#6B3FA0;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;flex-shrink:0}
    .opt-btn.correct .opt-letter{background:rgba(16,185,129,0.15);color:#10B981}
    .opt-btn.wrong .opt-letter{background:rgba(239,68,68,0.15);color:#EF4444}
    .text-inp-wrap{margin-bottom:20px}
    .text-inp{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid #E8E0FF;background:#F8F5FF;color:#0F0E1A;font-size:0.95rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s}
    .text-inp:focus{border-color:#6B3FA0}
    .text-inp::placeholder{color:#C4B9D8}
    .submit-q-btn{width:100%;padding:12px;border-radius:11px;border:none;background:linear-gradient(135deg,#6B3FA0,#A855F7);color:#fff;font-size:0.9rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;margin-bottom:12px}
    .submit-q-btn:hover:not(:disabled){opacity:0.9}
    .submit-q-btn:disabled{opacity:0.4;cursor:not-allowed}

    /* FEEDBACK */
    .feedback-box{padding:12px 16px;border-radius:10px;font-size:0.85rem;font-weight:600;margin-bottom:14px;line-height:1.5}
    .feedback-correct{background:#DCFCE7;border:1px solid #86EFAC;color:#166534}
    .feedback-wrong{background:#FEE2E2;border:1px solid #FECACA;color:#DC2626}
    .hint-text{font-size:0.78rem;color:#64748B;margin-bottom:14px;padding:8px 14px;background:#EDE9FF;border-radius:8px;line-height:1.5}
    .next-btn{width:100%;padding:12px;border-radius:11px;border:1.5px solid #E8E0FF;background:#fff;color:#6B3FA0;font-size:0.88rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s}
    .next-btn:hover{background:#EDE9FF;border-color:#6B3FA0}

    /* RESULTS */
    .results-emoji{font-size:3rem;text-align:center;margin-bottom:12px}
    .results-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;text-align:center;margin-bottom:6px}
    .results-score{font-family:'Syne',sans-serif;font-weight:800;font-size:3rem;color:#6B3FA0;text-align:center;letter-spacing:-0.05em;margin-bottom:4px}
    .results-meta{text-align:center;font-size:0.82rem;color:#94A3B8;margin-bottom:20px}
    .score-bar-wrap{background:#EDE9FF;border-radius:10px;height:12px;overflow:hidden;margin-bottom:20px}
    .score-bar-fill{height:100%;background:linear-gradient(90deg,#6B3FA0,#A855F7);border-radius:10px;transition:width 1s ease}
    .q-result-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #E8E0FF;font-size:0.82rem}
    .q-result-row:last-child{border-bottom:none}
    .q-result-icon{font-size:1rem;flex-shrink:0}
    .q-result-text{flex:1;color:#64748B;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .play-again-btn{width:100%;padding:12px;border-radius:11px;border:none;background:linear-gradient(135deg,#6B3FA0,#A855F7);color:#fff;font-size:0.88rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;margin-top:4px}
    .play-again-btn:hover{opacity:0.9}

    .sf-brand{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:20px;opacity:0.4}
    .sf-brand-logo{width:18px;height:18px;border-radius:4px;background:linear-gradient(135deg,#2D1B69,#D97706);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.55rem;color:#fff}
    .sf-brand-text{font-size:0.7rem;color:#94A3B8}
    .spinner{width:28px;height:28px;border:3px solid rgba(107,63,160,0.2);border-top-color:#6B3FA0;border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto;display:block}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:600px){.riddle-card{padding:24px 18px;border-radius:16px}nav{padding:0 14px}.logo-nm{display:none}}
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo"><div class="logo-mk">S</div><div class="logo-nm">SwoopForm</div></a>
  <div class="riddle-badge">🧩 Riddle</div>
</nav>
<div class="stage" id="stage"><div class="spinner"></div></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,collection,query,where,getDocs,doc,getDoc,addDoc,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);const db=getFirestore(app);

const pathParts=window.location.pathname.split('/').filter(Boolean);
const slugFromPath=pathParts[1];
const idFromQuery=new URLSearchParams(window.location.search).get('id');
const LETTERS=['A','B','C','D','E'];
let riddle=null,riddleId=null,currentQ=0,score=0,answers=[],answered=false;

async function init(){
  try{
    let data=null;
    if(slugFromPath&&slugFromPath!=='riddle'){
      const q=query(collection(db,'riddles'),where('slug','==',slugFromPath));
      const snap=await getDocs(q);
      if(!snap.empty){data={id:snap.docs[0].id,...snap.docs[0].data()};riddleId=snap.docs[0].id}
    }
    if(!data&&idFromQuery){const byId=await getDoc(doc(db,'riddles',idFromQuery));if(byId.exists()){data={id:byId.id,...byId.data()};riddleId=byId.id}}
    if(!data){showError('Riddle not found','This riddle may have been removed.');return}
    if(data.status==='closed'){showError('Riddle closed','This riddle is no longer available.');return}
    riddle=data;
    injectSEO(riddle);
    showWelcome();
  }catch(e){console.error(e);showError('Something went wrong','Please try again.')}
}

function injectSEO(r){
  document.title=(r.title||'Riddle')+' — SwoopForm';
  const addMeta=(n,c,prop)=>{const el=document.createElement('meta');if(prop)el.setAttribute('property',n);else el.setAttribute('name',n);el.setAttribute('content',c);document.head.appendChild(el)};
  addMeta('description',r.description||'Can you solve this riddle?');addMeta('og:title',r.title||'Riddle',true);addMeta('twitter:card','summary');
}

function showWelcome(){
  const qs=riddle.questions||[];
  document.getElementById('stage').innerHTML=`<div class="riddle-card">
    <div class="welcome-emoji">${riddle.emoji||'🧩'}</div>
    <div class="welcome-title">${eh(riddle.title||'Riddle')}</div>
    ${riddle.description?`<div class="welcome-desc">${eh(riddle.description)}</div>`:''}
    <div class="welcome-meta">
      <span class="welcome-chip">❓ ${qs.length} question${qs.length!==1?'s':''}</span>
      <span class="welcome-chip">🎯 Scored</span>
    </div>
    <button class="start-btn" onclick="startRiddle()">Start Riddle →</button>
    <div class="sf-brand"><div class="sf-brand-logo">S</div><div class="sf-brand-text">Powered by SwoopForm</div></div>
  </div>`;
}

window.startRiddle=function(){currentQ=0;score=0;answers=[];showQuestion()}

function showQuestion(){
  const qs=riddle.questions||[];
  if(currentQ>=qs.length){showResults();return}
  const q=qs[currentQ];answered=false;
  const pct=Math.round((currentQ/qs.length)*100);
  const isText=q.type==='text';
  document.getElementById('stage').innerHTML=`<div class="riddle-card">
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:${pct}%"></div></div>
      <div class="progress-meta"><span>Question ${currentQ+1} of ${qs.length}</span><span>${score} correct</span></div>
    </div>
    <div class="q-label">Riddle ${currentQ+1}</div>
    <div class="q-text">${eh(q.question||'Untitled')}</div>
    ${isText?`
      <div class="text-inp-wrap"><input class="text-inp" id="text-ans" placeholder="Type your answer..." onkeydown="if(event.key==='Enter')submitTextAnswer()"></div>
      <div id="feedback-area"></div>
      <button class="submit-q-btn" id="submit-btn" onclick="submitTextAnswer()">Submit answer</button>
    `:`
      <div class="options-list" id="opts-list">
        ${(q.options||[]).map((o,i)=>`<button class="opt-btn" id="opt-${i}" onclick="selectOption(${i})">${isText?'':''}<div class="opt-letter">${LETTERS[i]}</div>${eh(o)}</button>`).join('')}
      </div>
      <div id="feedback-area"></div>
    `}
    ${q.hint?`<div class="hint-text">💡 Hint: ${eh(q.hint)}</div>`:''}
  </div>`;
  if(isText)setTimeout(()=>document.getElementById('text-ans')?.focus(),100);
}

window.selectOption=function(i){
  if(answered)return;
  answered=true;
  const q=riddle.questions[currentQ];
  const isCorrect=i===q.correctIndex;
  if(isCorrect)score++;
  answers.push({qi:currentQ,selected:i,correct:isCorrect,type:'mcq'});
  // Style options
  const opts=document.querySelectorAll('.opt-btn');
  opts.forEach((btn,idx)=>{
    btn.classList.add('disabled');
    if(idx===q.correctIndex)btn.classList.add('correct');
    else if(idx===i&&!isCorrect)btn.classList.add('wrong');
  });
  // Show feedback
  const fb=document.getElementById('feedback-area');
  if(fb){fb.innerHTML=`<div class="feedback-box ${isCorrect?'feedback-correct':'feedback-wrong'}">${isCorrect?'✅ Correct!':'❌ Not quite. The correct answer is: <strong>'+eh(q.options[q.correctIndex]||'')+'</strong>'}</div>`}
  // Auto advance or show next button
  if(currentQ<(riddle.questions||[]).length-1){
    const nb=document.createElement('button');nb.className='next-btn';nb.textContent='Next question →';nb.onclick=()=>{currentQ++;showQuestion()};
    const area=document.getElementById('feedback-area');if(area)area.appendChild(nb);
  } else {
    const nb=document.createElement('button');nb.className='next-btn';nb.textContent='See results →';nb.onclick=()=>showResults();
    const area=document.getElementById('feedback-area');if(area)area.appendChild(nb);
  }
}

window.submitTextAnswer=function(){
  if(answered)return;
  const inp=document.getElementById('text-ans');if(!inp)return;
  const userAns=inp.value.trim().toLowerCase();
  if(!userAns)return;
  answered=true;
  const q=riddle.questions[currentQ];
  const correctAns=(q.answer||'').trim().toLowerCase();
  const accepted=(q.acceptedAnswers||[]).map(a=>a.toLowerCase());
  const isCorrect=userAns===correctAns||accepted.includes(userAns);
  if(isCorrect)score++;
  answers.push({qi:currentQ,userAnswer:inp.value.trim(),correct:isCorrect,type:'text'});
  inp.disabled=true;inp.style.borderColor=isCorrect?'#10B981':'#EF4444';inp.style.background=isCorrect?'#DCFCE7':'#FEE2E2';
  const submitBtn=document.getElementById('submit-btn');if(submitBtn)submitBtn.disabled=true;
  const fb=document.getElementById('feedback-area');
  if(fb){
    fb.innerHTML=`<div class="feedback-box ${isCorrect?'feedback-correct':'feedback-wrong'}">${isCorrect?'✅ Correct!':'❌ Not quite. The answer was: <strong>'+eh(q.answer)+'</strong>'}</div>`;
    const nb=document.createElement('button');nb.className='next-btn';nb.textContent=currentQ<(riddle.questions||[]).length-1?'Next question →':'See results →';
    nb.onclick=()=>{if(currentQ<(riddle.questions||[]).length-1){currentQ++;showQuestion()}else showResults()};
    fb.appendChild(nb);
  }
}

async function showResults(){
  const total=riddle.questions?.length||0;
  const pct=total>0?Math.round((score/total)*100):0;
  const emoji=pct===100?'🏆':pct>=70?'🎉':pct>=40?'👍':'💪';
  const msg=pct===100?'Perfect score!':pct>=70?'Well done!':pct>=40?'Good effort!':'Keep practising!';
  document.getElementById('stage').innerHTML=`<div class="riddle-card">
    <div class="results-emoji">${emoji}</div>
    <div class="results-title">${msg}</div>
    <div class="results-score">${score}/${total}</div>
    <div class="results-meta">${pct}% correct</div>
    <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${pct}%"></div></div>
    <div style="margin-bottom:16px">${answers.map((a,i)=>{const q=riddle.questions[a.qi];return`<div class="q-result-row"><div class="q-result-icon">${a.correct?'✅':'❌'}</div><div class="q-result-text" title="${eh(q?.question||'')}">${eh((q?.question||'Untitled').slice(0,50))}</div></div>`}).join('')}</div>
    <button class="play-again-btn" onclick="startRiddle()">Play again</button>
    <div class="sf-brand"><div class="sf-brand-logo">S</div><div class="sf-brand-text">Powered by SwoopForm</div></div>
  </div>`;
  // Save response
  try{await addDoc(collection(db,'riddleResponses'),{riddleId,riddleSlug:slugFromPath||idFromQuery,score,total,pct,answers,submittedAt:serverTimestamp()})}catch(e){}
}

function showError(title,msg){document.getElementById('stage').innerHTML=`<div class="riddle-card" style="text-align:center"><div style="font-size:2.5rem;margin-bottom:12px">🧩</div><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;margin-bottom:6px">${title}</div><p style="color:#64748B;font-size:0.85rem">${msg}</p><br><a href="/" style="color:#6B3FA0;font-weight:600;text-decoration:none">← SwoopForm</a></div>`}
function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}

init();
</script>
</body>
</html>
