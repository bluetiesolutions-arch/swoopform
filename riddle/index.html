<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riddle — SwoopForm</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#1A0533 0%,#2D1B69 50%,#1A0533 100%);background-attachment:fixed;color:#fff;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
    nav{background:rgba(255,255,255,0.06);border-bottom:1px solid rgba(255,255,255,0.08);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
    .nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
    .logo-mk{width:28px;height:28px;background:linear-gradient(135deg,#2D1B69,#D97706);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.8rem;color:#fff}
    .logo-nm{font-family:'Syne',sans-serif;font-weight:800;font-size:0.95rem;color:#fff}
    .riddle-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:100px;background:rgba(139,92,246,0.2);border:1px solid rgba(139,92,246,0.4);color:#C4B5FD;font-size:0.75rem;font-weight:700}
    .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative}
    .confetti-container{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden}
    .confetti-piece{position:absolute;width:10px;height:10px;top:-20px;animation:confetti-fall linear forwards}
    @keyframes confetti-fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

    /* WELCOME */
    .welcome-card{background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);border:1.5px solid rgba(255,255,255,0.1);border-radius:24px;padding:40px;width:100%;max-width:560px;text-align:center;animation:slideUp 0.5s ease both}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .welcome-emoji{font-size:3.5rem;margin-bottom:16px;animation:wiggle 1s ease infinite}
    @keyframes wiggle{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
    .welcome-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.4rem,4vw,2rem);letter-spacing:-0.03em;margin-bottom:8px}
    .welcome-sub{font-size:0.88rem;color:rgba(255,255,255,0.5);margin-bottom:24px;line-height:1.6}
    .welcome-meta{display:flex;gap:16px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
    .welcome-meta-item{display:flex;align-items:center;gap:6px;font-size:0.78rem;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.06);padding:5px 12px;border-radius:100px}
    .start-riddle-btn{width:100%;padding:16px;border-radius:14px;border:none;background:linear-gradient(135deg,#7C3AED,#A855F7);color:#fff;font-size:1rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all 0.2s;letter-spacing:0.01em}
    .start-riddle-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,0.4)}

    /* RIDDLE CARD */
    .riddle-card{background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);border:1.5px solid rgba(255,255,255,0.1);border-radius:24px;padding:36px;width:100%;max-width:580px;animation:slideUp 0.4s ease both}
    .riddle-progress{display:flex;align-items:center;gap:10px;margin-bottom:24px}
    .riddle-progress-track{flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
    .riddle-progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#7C3AED,#A855F7);transition:width 0.5s ease}
    .riddle-progress-txt{font-size:0.75rem;color:rgba(255,255,255,0.4);font-weight:600;white-space:nowrap}
    .riddle-question-num{font-size:0.72rem;font-weight:700;color:#A855F7;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px}
    .riddle-question{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.2rem,3vw,1.6rem);letter-spacing:-0.03em;line-height:1.3;margin-bottom:8px}
    .riddle-hint{font-size:0.82rem;color:rgba(255,255,255,0.4);margin-bottom:24px;display:flex;align-items:center;gap:6px}
    .hint-btn{background:none;border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:rgba(255,255,255,0.4);font-size:0.72rem;font-family:'DM Sans',sans-serif;cursor:pointer;padding:3px 8px;transition:all 0.2s}
    .hint-btn:hover{border-color:rgba(255,255,255,0.3);color:#fff}
    .riddle-options{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
    .riddle-option{padding:14px 18px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:12px;font-size:0.92rem;font-weight:600}
    .riddle-option:hover{border-color:#A855F7;background:rgba(168,85,247,0.1);transform:translateX(4px)}
    .riddle-option.correct{border-color:#10B981;background:rgba(16,185,129,0.15);animation:correctPulse 0.4s ease}
    .riddle-option.wrong{border-color:#EF4444;background:rgba(239,68,68,0.1);animation:shake 0.3s ease}
    @keyframes correctPulse{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    .riddle-option.answered{cursor:default;transform:none!important}
    .riddle-option-letter{width:28px;height:28px;border-radius:7px;border:1.5px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;flex-shrink:0;color:rgba(255,255,255,0.4)}
    .riddle-option.correct .riddle-option-letter{background:#10B981;border-color:#10B981;color:#fff}
    .riddle-option.wrong .riddle-option-letter{background:#EF4444;border-color:#EF4444;color:#fff}
    .riddle-next-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#7C3AED,#A855F7);color:#fff;font-size:0.95rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all 0.2s;display:none}
    .riddle-next-btn:hover{opacity:0.9;transform:translateY(-1px)}
    .riddle-text-input{width:100%;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-size:1rem;font-family:'DM Sans',sans-serif;padding:14px 18px;outline:none;transition:border-color 0.2s;margin-bottom:12px}
    .riddle-text-input:focus{border-color:#A855F7}
    .riddle-text-input::placeholder{color:rgba(255,255,255,0.2)}
    .riddle-submit-text{width:100%;padding:14px;border-radius:12px;border:none;background:rgba(168,85,247,0.3);color:#fff;font-size:0.95rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;margin-bottom:12px}
    .riddle-submit-text:hover{background:rgba(168,85,247,0.5)}
    .feedback-msg{text-align:center;font-size:1.2rem;margin:8px 0;display:none;animation:popIn 0.3s ease both}
    @keyframes popIn{0%{transform:scale(0)}70%{transform:scale(1.1)}100%{transform:scale(1)}}

    /* RESULTS */
    .results-screen{width:100%;max-width:580px;animation:slideUp 0.5s ease both}
    .results-emoji-screen{text-align:center;padding:20px 0 32px}
    .results-big-emoji{font-size:6rem;margin-bottom:16px;display:block;animation:bounceIn 0.6s ease both}
    @keyframes bounceIn{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
    .results-reaction-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;letter-spacing:-0.03em;margin-bottom:8px}
    .results-reaction-sub{font-size:0.9rem;color:rgba(255,255,255,0.5);margin-bottom:24px;line-height:1.6}
    .results-emotions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
    .emotion-btn{padding:10px 16px;border-radius:100px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);font-size:1rem;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;color:#fff}
    .emotion-btn:hover{transform:scale(1.1);border-color:rgba(255,255,255,0.3)}
    .emotion-btn.active{transform:scale(1.15);border-color:#A855F7;background:rgba(168,85,247,0.2)}
    .score-reveal{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:20px;padding:28px;text-align:center;margin-bottom:24px}
    .score-big{font-family:'Syne',sans-serif;font-weight:800;font-size:4rem;letter-spacing:-0.05em;margin-bottom:4px}
    .score-out-of{font-size:0.85rem;color:rgba(255,255,255,0.4);margin-bottom:12px}
    .score-bar{height:10px;background:rgba(255,255,255,0.08);border-radius:5px;overflow:hidden;margin-bottom:16px}
    .score-bar-fill{height:100%;border-radius:5px;transition:width 1s ease}
    .score-breakdown{display:flex;justify-content:center;gap:24px;flex-wrap:wrap}
    .score-breakdown-item{text-align:center}
    .score-breakdown-val{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem}
    .score-breakdown-lbl{font-size:0.7rem;color:rgba(255,255,255,0.35);margin-top:2px}
    .play-again-btn{width:100%;padding:16px;border-radius:14px;border:none;background:linear-gradient(135deg,#7C3AED,#A855F7);color:#fff;font-size:1rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all 0.2s;margin-bottom:12px;letter-spacing:0.01em}
    .play-again-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,0.4)}
    .share-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
    .share-btn-r{padding:10px 16px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:0.82rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
    .share-btn-r:hover{border-color:#A855F7;background:rgba(168,85,247,0.15)}
    .sf-brand{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:20px;opacity:0.3}
    .sf-brand-logo{width:18px;height:18px;border-radius:4px;background:linear-gradient(135deg,#2D1B69,#D97706);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.55rem;color:#fff}
    .sf-brand-text{font-size:0.7rem;color:rgba(255,255,255,0.5)}
    .loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px}
    .spinner{width:32px;height:32px;border:3px solid rgba(168,85,247,0.2);border-top-color:#A855F7;border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:600px){.riddle-card,.welcome-card,.results-screen{padding:24px 18px;border-radius:16px}.stage{padding:20px 14px}nav{padding:0 14px}.logo-nm{display:none}}
  </style>
</head>
<body>
<div class="confetti-container" id="confetti"></div>
<nav>
  <a href="/" class="nav-logo"><div class="logo-mk">S</div><div class="logo-nm">SwoopForm</div></a>
  <div class="riddle-badge">🧩 Riddle</div>
</nav>
<div class="stage" id="stage">
  <div class="loading"><div class="spinner"></div></div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,collection,query,where,getDocs,doc,getDoc,addDoc,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);
const db=getFirestore(app);

const pathParts=window.location.pathname.split('/').filter(Boolean);
const slug=pathParts[1];
let riddle=null,riddleId=null,currentQ=0,score=0,correct=0,wrong=0,answered=false,showingEmoji=true;

const EMOTIONS=[
  {emoji:'🤗',label:'Amazing!'},
  {emoji:'😍',label:'Loved it'},
  {emoji:'🎉',label:'Celebrate'},
  {emoji:'😅',label:'Phew!'},
  {emoji:'🤔',label:'Tricky'},
  {emoji:'😂',label:'LOL'},
];

function getReaction(pct){
  if(pct===100)return{emoji:'🏆',title:'Perfect Score!',sub:'You got every single answer right. You are a riddle master!',color:'#F59E0B'};
  if(pct>=80)return{emoji:'🤩',title:'Brilliant!',sub:'Almost perfect! You clearly have a great mind for riddles.',color:'#10B981'};
  if(pct>=60)return{emoji:'😎',title:'Well done!',sub:"You got most of them right. Not bad at all!",color:'#3B82F6'};
  if(pct>=40)return{emoji:'🤗',title:'Good try!',sub:"You solved half the riddles. Keep practicing!",color:'#8B5CF6'};
  if(pct>=20)return{emoji:'😅',title:'Keep going!',sub:"Riddles can be tricky. Give it another shot!",color:'#F97316'};
  return{emoji:'💪',title:"Don't give up!",sub:'Everyone starts somewhere. Try again and see how much better you do!',color:'#EF4444'};
}

async function init(){
  if(!slug){showError();return}
  try{
    let data=null;
    const q=query(collection(db,'riddles'),where('slug','==',slug));
    const snap=await getDocs(q);
    if(!snap.empty){data={id:snap.docs[0].id,...snap.docs[0].data()};riddleId=snap.docs[0].id}
    else{const byId=await getDoc(doc(db,'riddles',slug));if(byId.exists()){data={id:byId.id,...byId.data()};riddleId=byId.id}}
    if(!data){showError();return}
    riddle=data;
    document.title=(riddle.title||'Riddle')+' — SwoopForm';
    showWelcome();
  }catch(e){console.error(e);showError()}
}

function showWelcome(){
  const qCount=riddle.questions?.length||0;
  document.getElementById('stage').innerHTML=`<div class="welcome-card">
    <div class="welcome-emoji">${riddle.emoji||'🧩'}</div>
    <div class="welcome-title">${riddle.title||'Riddle Time!'}</div>
    <div class="welcome-sub">${riddle.description||'Can you solve all the riddles? Put your brain to the test!'}</div>
    <div class="welcome-meta">
      <div class="welcome-meta-item">🧩 ${qCount} riddle${qCount!==1?'s':''}</div>
      <div class="welcome-meta-item">🏆 Score tracked</div>
      ${riddle.timeLimit?`<div class="welcome-meta-item">⏱ ${riddle.timeLimit}s each</div>`:''}
    </div>
    <button class="start-riddle-btn" onclick="startRiddle()">🚀 Start Riddle</button>
  </div>`;
}

window.startRiddle=function(){currentQ=0;score=0;correct=0;wrong=0;renderQuestion()}

function renderQuestion(){
  const q=riddle.questions[currentQ];const total=riddle.questions.length;answered=false;
  const pct=Math.round((currentQ/total)*100);
  const letters=['A','B','C','D','E'];
  let optionsHtml='';
  if(q.type==='mcq'||!q.type){
    optionsHtml=`<div class="riddle-options" id="riddle-options">${(q.options||[]).map((o,i)=>`<div class="riddle-option" id="opt-${i}" onclick="checkAnswer(${i})"><div class="riddle-option-letter">${letters[i]}</div><span>${o}</span></div>`).join('')}</div>`;
  } else {
    optionsHtml=`<input class="riddle-text-input" id="text-ans" placeholder="Type your answer..." onkeydown="if(event.key==='Enter')checkTextAnswer()"><button class="riddle-submit-text" onclick="checkTextAnswer()">Submit answer →</button>`;
  }
  document.getElementById('stage').innerHTML=`<div class="riddle-card">
    <div class="riddle-progress">
      <div class="riddle-progress-track"><div class="riddle-progress-fill" style="width:${pct}%"></div></div>
      <div class="riddle-progress-txt">${currentQ+1}/${total}</div>
    </div>
    <div class="riddle-question-num">Riddle ${currentQ+1}</div>
    <div class="riddle-question">${q.question||'Untitled riddle'}</div>
    ${q.hint?`<div class="riddle-hint"><button class="hint-btn" onclick="revealHint()">💡 Show hint</button><span id="hint-text" style="display:none">${q.hint}</span></div>`:''}
    <div class="feedback-msg" id="feedback-msg"></div>
    ${optionsHtml}
    <button class="riddle-next-btn" id="next-btn" onclick="nextQuestion()">${currentQ===total-1?'See my results 🎉':'Next riddle →'}</button>
  </div>`;
  setTimeout(()=>{const ti=document.getElementById('text-ans');if(ti)ti.focus()},100);
}

window.checkAnswer=function(i){
  if(answered)return;answered=true;
  const q=riddle.questions[currentQ];const correct2=q.correctIndex??0;
  const opts=document.querySelectorAll('.riddle-option');
  opts.forEach(o=>o.classList.add('answered'));
  const fb=document.getElementById('feedback-msg');
  if(i===correct2){
    opts[i].classList.add('correct');
    score++;correct++;
    if(fb){fb.textContent='✓ Correct! '+（q.explanation||'Well done!');fb.style.color='#10B981';fb.style.display='block'}
    launchMiniConfetti();
  } else {
    opts[i].classList.add('wrong');
    if(correct2<opts.length)opts[correct2].classList.add('correct');
    wrong++;
    if(fb){fb.textContent='✗ The answer was: '+(q.options?.[correct2]||'');fb.style.color='#EF4444';fb.style.display='block'}
  }
  const btn=document.getElementById('next-btn');if(btn)btn.style.display='block';
}

window.checkTextAnswer=function(){
  if(answered)return;
  const inp=document.getElementById('text-ans');if(!inp)return;
  const userAns=inp.value.trim().toLowerCase();
  const q=riddle.questions[currentQ];
  const correctAns=(q.answer||'').toLowerCase();
  const acceptedAnswers=[correctAns,...(q.acceptedAnswers||[]).map(a=>a.toLowerCase())];
  const isCorrect=acceptedAnswers.some(a=>userAns===a||userAns.includes(a)||a.includes(userAns));
  answered=true;inp.disabled=true;
  const fb=document.getElementById('feedback-msg');
  if(isCorrect){
    score++;correct++;inp.style.borderColor='#10B981';
    if(fb){fb.textContent='✓ Correct! '+（q.explanation||'');fb.style.color='#10B981';fb.style.display='block'}
    launchMiniConfetti();
  } else {
    inp.style.borderColor='#EF4444';wrong++;
    if(fb){fb.textContent='✗ The answer was: '+q.answer;fb.style.color='#EF4444';fb.style.display='block'}
  }
  const btn=document.getElementById('next-btn');if(btn)btn.style.display='block';
}

window.nextQuestion=function(){
  currentQ++;
  if(currentQ>=riddle.questions.length)showResults();
  else renderQuestion();
}

window.revealHint=function(){
  const hint=document.getElementById('hint-text');
  const btn=document.querySelector('.hint-btn');
  if(hint){hint.style.display='inline';if(btn)btn.style.display='none'}
}

function showResults(){
  const total=riddle.questions.length;
  const pct=total>0?Math.round((score/total)*100):0;
  const reaction=getReaction(pct);
  // Save to Firestore
  try{addDoc(collection(db,'riddleResponses'),{riddleId,riddleSlug:slug,score,correct,wrong,total,pct,submittedAt:serverTimestamp()})}catch(e){}
  // Phase 1: Emoji reaction
  document.getElementById('stage').innerHTML=`<div class="results-screen">
    <div class="results-emoji-screen">
      <span class="results-big-emoji" id="big-emoji">${reaction.emoji}</span>
      <div class="results-reaction-title" style="color:${reaction.color}">${reaction.title}</div>
      <div class="results-reaction-sub">${reaction.sub}</div>
      <div class="results-emotions">
        ${EMOTIONS.map((e,i)=>`<button class="emotion-btn" id="emo-${i}" onclick="selectEmotion(${i})" title="${e.label}">${e.emoji} ${e.label}</button>`).join('')}
      </div>
      <button class="play-again-btn" onclick="showScoreReveal()">See my score →</button>
    </div>
  </div>`;
  if(pct===100)launchFullConfetti();
}

window.selectEmotion=function(i){
  document.querySelectorAll('.emotion-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('emo-'+i)?.classList.add('active');
}

window.showScoreReveal=function(){
  const total=riddle.questions.length;const pct=Math.round((score/total)*100);const reaction=getReaction(pct);
  const barColor=pct>=80?'#10B981':pct>=60?'#3B82F6':pct>=40?'#F59E0B':'#EF4444';
  document.getElementById('stage').innerHTML=`<div class="results-screen">
    <div class="score-reveal" style="animation:slideUp 0.5s ease both">
      <div style="font-size:2.5rem;margin-bottom:12px">${reaction.emoji}</div>
      <div class="score-big" style="color:${barColor}">${score}<span style="font-size:1.5rem;color:rgba(255,255,255,0.3)">/${total}</span></div>
      <div class="score-out-of">${pct}% correct</div>
      <div class="score-bar"><div class="score-bar-fill" style="width:0%;background:${barColor}" id="score-bar-fill"></div></div>
      <div class="score-breakdown">
        <div class="score-breakdown-item"><div class="score-breakdown-val" style="color:#10B981">${correct}</div><div class="score-breakdown-lbl">Correct</div></div>
        <div class="score-breakdown-item"><div class="score-breakdown-val" style="color:#EF4444">${wrong}</div><div class="score-breakdown-lbl">Wrong</div></div>
        <div class="score-breakdown-item"><div class="score-breakdown-val">${total}</div><div class="score-breakdown-lbl">Total</div></div>
      </div>
    </div>
    <button class="play-again-btn" onclick="playAgain()">🔄 Play again</button>
    <div class="share-row">
      <a class="share-btn-r" href="https://wa.me/?text=${encodeURIComponent('I scored '+score+'/'+total+' on this riddle! Can you beat me? https://swoopform.com/engage/'+slug)}" target="_blank">💬 Challenge a friend</a>
      <button class="share-btn-r" onclick="navigator.clipboard.writeText('https://swoopform.com/engage/'+slug).then(()=>this.textContent='✓ Copied!')">🔗 Copy link</button>
    </div>
    <div class="sf-brand"><div class="sf-brand-logo">S</div><div class="sf-brand-text">Powered by SwoopForm</div></div>
  </div>`;
  setTimeout(()=>{const bar=document.getElementById('score-bar-fill');if(bar)bar.style.width=pct+'%'},100);
  if(pct===100)launchFullConfetti();
}

window.playAgain=function(){currentQ=0;score=0;correct=0;wrong=0;answered=false;showWelcome()}

function launchMiniConfetti(){
  const container=document.getElementById('confetti');if(!container)return;
  const colors=['#A855F7','#10B981','#F59E0B','#EF4444','#3B82F6'];
  for(let i=0;i<15;i++){
    const piece=document.createElement('div');piece.className='confetti-piece';
    piece.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${1+Math.random()*1}s;animation-delay:${Math.random()*0.3}s`;
    container.appendChild(piece);
    setTimeout(()=>piece.remove(),2000);
  }
}

function launchFullConfetti(){
  const container=document.getElementById('confetti');if(!container)return;
  const colors=['#A855F7','#10B981','#F59E0B','#EF4444','#3B82F6','#EC4899','#14B8A6'];
  for(let i=0;i<80;i++){
    setTimeout(()=>{
      const piece=document.createElement('div');piece.className='confetti-piece';
      piece.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};width:${8+Math.random()*10}px;height:${8+Math.random()*10}px;animation-duration:${2+Math.random()*2}s;animation-delay:0s`;
      container.appendChild(piece);setTimeout(()=>piece.remove(),5000);
    },i*30);
  }
}

function showError(){document.getElementById('stage').innerHTML=`<div class="welcome-card" style="text-align:center"><div style="font-size:3rem;margin-bottom:16px">🧩</div><h2 style="font-family:Syne,sans-serif;font-weight:800;margin-bottom:8px">Riddle not found</h2><p style="color:rgba(255,255,255,0.4);font-size:0.88rem">This riddle may have been removed.</p><br><a href="/" style="color:#A855F7;font-weight:600;text-decoration:none">← SwoopForm</a></div>`}

init();
</script>
