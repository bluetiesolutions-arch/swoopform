<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riddle Results — SwoopForm</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#1A0533,#2D1B69,#1A0533);background-attachment:fixed;color:#fff;min-height:100vh}
    nav{background:rgba(255,255,255,0.06);border-bottom:1px solid rgba(255,255,255,0.08);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
    .logo-mk{width:28px;height:28px;background:linear-gradient(135deg,#2D1B69,#D97706);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.8rem;color:#fff}
    .logo-nm{font-family:'Syne',sans-serif;font-weight:800;font-size:0.95rem}
    .nav-btn{padding:7px 14px;border-radius:8px;border:1.5px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.5);font-size:0.82rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .nav-btn:hover{border-color:#A855F7;color:#A855F7}
    .main{max-width:800px;margin:0 auto;padding:32px 20px}
    .page-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;letter-spacing:-0.03em;margin-bottom:4px}
    .page-sub{font-size:0.85rem;color:rgba(255,255,255,0.4);margin-bottom:28px}
    .card{background:rgba(255,255,255,0.06);border-radius:14px;border:1px solid rgba(255,255,255,0.08);padding:24px;margin-bottom:16px}
    .card-t{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;margin-bottom:16px}
    .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
    .stat-box{background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);border-radius:12px;padding:16px;text-align:center}
    .stat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;color:#A855F7;margin-bottom:2px}
    .stat-lbl{font-size:0.7rem;color:rgba(255,255,255,0.35);font-weight:600}
    .score-dist{display:flex;flex-direction:column;gap:8px}
    .score-dist-row{display:flex;align-items:center;gap:10px}
    .score-dist-label{font-size:0.8rem;width:80px;flex-shrink:0;color:rgba(255,255,255,0.6)}
    .score-dist-bar{flex:1;height:24px;background:rgba(255,255,255,0.05);border-radius:6px;overflow:hidden}
    .score-dist-fill{height:100%;background:linear-gradient(90deg,#7C3AED,#A855F7);border-radius:6px;transition:width 0.6s ease}
    .score-dist-count{font-size:0.78rem;color:rgba(255,255,255,0.4);width:30px;text-align:right;flex-shrink:0}
    .q-stat{padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
    .q-stat:last-child{border-bottom:none}
    .q-stat-text{font-size:0.88rem;font-weight:600;margin-bottom:6px}
    .q-stat-bar{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;margin-bottom:4px}
    .q-stat-fill{height:100%;border-radius:4px;transition:width 0.6s ease}
    .q-stat-meta{font-size:0.72rem;color:rgba(255,255,255,0.35)}
    .spinner{width:28px;height:28px;border:3px solid rgba(168,85,247,0.15);border-top-color:#A855F7;border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto;display:block}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:600px){.stat-row{grid-template-columns:repeat(2,1fr)}nav{padding:0 14px}.logo-nm{display:none}}
  </style>
</head>
<body>
<nav>
  <a href="/dashboard" class="nav-logo"><div class="logo-mk">S</div><div class="logo-nm">SwoopForm</div></a>
  <a href="/dashboard" class="nav-btn">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">🧩 Riddle Results</div>
  <div class="page-sub" id="riddle-sub">Loading...</div>
  <div id="content"><div class="spinner"></div></div>
</div>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getAuth,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import{getFirestore,doc,getDoc,collection,query,where,getDocs,orderBy}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);const auth=getAuth(app);const db=getFirestore(app);
const id=new URLSearchParams(window.location.search).get('id');
onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='/login';return}
  const snap=await getDoc(doc(db,'riddles',id));
  if(!snap.exists()||snap.data().userId!==u.uid){document.getElementById('content').innerHTML='<p>Not found or access denied.</p>';return}
  const riddle={id:snap.id,...snap.data()};
  document.getElementById('riddle-sub').textContent=riddle.title;
  const rSnap=await getDocs(query(collection(db,'riddleResponses'),where('riddleId','==',id),orderBy('submittedAt','desc')));
  const responses=rSnap.docs.map(d=>d.data());
  const total=responses.length;
  const avgScore=total>0?Math.round(responses.reduce((s,r)=>s+(r.pct||0),0)/total):0;
  const perfect=responses.filter(r=>r.pct===100).length;
  const avgTime=total>0?Math.round(responses.reduce((s,r)=>s+(r.total||0),0)/total):0;
  // Score distribution
  const buckets={'0-20':0,'21-40':0,'41-60':0,'61-80':0,'81-100':0};
  responses.forEach(r=>{const p=r.pct||0;if(p<=20)buckets['0-20']++;else if(p<=40)buckets['21-40']++;else if(p<=60)buckets['41-60']++;else if(p<=80)buckets['61-80']++;else buckets['81-100']++});
  const maxBucket=Math.max(...Object.values(buckets),1);
  document.getElementById('content').innerHTML=`
    <div class="stat-row">
      <div class="stat-box"><div class="stat-val">${total}</div><div class="stat-lbl">Plays</div></div>
      <div class="stat-box"><div class="stat-val">${avgScore}%</div><div class="stat-lbl">Avg score</div></div>
      <div class="stat-box"><div class="stat-val">${perfect}</div><div class="stat-lbl">Perfect scores</div></div>
      <div class="stat-box"><div class="stat-val">${(riddle.questions||[]).length}</div><div class="stat-lbl">Questions</div></div>
    </div>
    <div class="card">
      <div class="card-t">Score distribution</div>
      <div class="score-dist">${Object.entries(buckets).map(([range,count])=>`<div class="score-dist-row"><div class="score-dist-label">${range}%</div><div class="score-dist-bar"><div class="score-dist-fill" style="width:${(count/maxBucket)*100}%"></div></div><div class="score-dist-count">${count}</div></div>`).join('')}</div>
    </div>
    ${total>0?`<div class="card"><div class="card-t">Question performance</div>${(riddle.questions||[]).map((q,i)=>{const correct=responses.filter(r=>r.score>=i+1).length;const pct=total>0?Math.round((correct/total)*100):0;return`<div class="q-stat"><div class="q-stat-text">Q${i+1}: ${eh(q.question||'Untitled').slice(0,80)}</div><div class="q-stat-bar"><div class="q-stat-fill" style="width:${pct}%;background:${pct>=70?'#10B981':pct>=40?'#F59E0B':'#EF4444'}"></div></div><div class="q-stat-meta">${correct}/${total} got this right (${pct}%)</div></div>`}).join('')}</div>`:'' }`;
});
function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}
</script>
</body>
</html>
