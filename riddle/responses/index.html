<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riddle Results — SwoopForm</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8f5ff;--surface:#fff;--surface2:#f0ebff;--border:#e8e0ff;--accent:#6b3fa0;--accent2:#a855f7;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--text:#0f0e1a;--muted:#64748b;--muted2:#94a3b8;--font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
nav{height:54px;background:rgba(248,245,255,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:100;gap:16px;}
.brand{font-size:15px;font-weight:700;color:var(--accent);}
.nav-sep{width:1px;height:18px;background:var(--border);}
.nav-crumb{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;}
.nav-crumb a{color:var(--accent);text-decoration:none;}
.nav-right{margin-left:auto;display:flex;gap:10px;}
.btn{padding:7px 14px;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:none;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-accent{background:var(--accent);color:#fff;font-weight:600;}
.layout{display:flex;height:calc(100vh - 54px);}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);padding:8px 10px 6px;}
.sidebar-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--muted);transition:all .15s;border:none;background:none;width:100%;font-family:var(--font);}
.sidebar-item:hover{background:var(--surface2);color:var(--text);}
.sidebar-item.active{background:#ede9ff;color:var(--accent);}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.topbar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--surface);}
.topbar-title{font-size:16px;font-weight:700;}
.topbar-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.topbar-right{margin-left:auto;display:flex;gap:10px;align-items:center;}
.stats-row{display:flex;gap:1px;background:var(--border);flex-shrink:0;}
.stat-card{flex:1;background:var(--surface);padding:14px 20px;display:flex;align-items:center;gap:10px;}
.stat-val{font-size:20px;font-weight:700;font-family:var(--mono);}
.stat-label{font-size:11px;color:var(--muted);margin-top:1px;}
.content-area{flex:1;overflow-y:auto;padding:24px;}
.filter-bar{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface2);}
.search-wrap{position:relative;flex:1;max-width:300px;}
.search-wrap input{width:100%;padding:8px 12px 8px 34px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;}
.search-wrap input:focus{border-color:var(--accent);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);}
.sort-select{padding:7px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:var(--font);font-size:12px;outline:none;cursor:pointer;}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--surface2);border-bottom:1px solid var(--border);position:sticky;top:0;}
th{padding:10px 16px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:left;}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
tbody tr:hover{background:#f5f0ff;}
td{padding:12px 16px;font-size:12px;vertical-align:middle;}
.score-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.score-high{background:rgba(16,185,129,.1);color:var(--green);}
.score-mid{background:rgba(245,158,11,.1);color:var(--yellow);}
.score-low{background:rgba(239,68,68,.1);color:var(--red);}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.chart-card.half{display:inline-block;width:calc(50% - 8px);}
.chart-title{font-size:13px;font-weight:600;margin-bottom:16px;}
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.chart-card.full{grid-column:1/-1;}
.big-num{font-size:48px;font-weight:800;font-family:var(--mono);text-align:center;color:var(--accent);margin:8px 0;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-label{font-size:12px;color:var(--muted);width:100px;flex-shrink:0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-wrap{flex:1;height:28px;background:var(--surface2);border-radius:6px;overflow:hidden;position:relative;}
.bar-fill{height:100%;border-radius:6px;}
.bar-val{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;font-family:var(--mono);}
.q-perf-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.q-perf-row:last-child{border-bottom:none;}
.q-perf-text{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.q-perf-bar{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.q-perf-fill{height:100%;border-radius:4px;transition:width .6s;}
.q-perf-pct{font-size:12px;font-weight:700;font-family:var(--mono);min-width:36px;text-align:right;}
.lb-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface2);border-radius:10px;margin-bottom:8px;}
.lb-row.top{background:#ede9ff;border:1px solid rgba(107,63,160,.2);}
.lb-rank{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.lb-name{font-size:14px;font-weight:700;flex:1;}
.lb-score{font-size:16px;font-weight:800;font-family:var(--mono);color:var(--accent);}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:150;display:none;}
.drawer-overlay.open{display:block;}
.drawer{position:fixed;top:0;right:-560px;width:560px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:160;transition:right .3s;display:flex;flex-direction:column;overflow:hidden;}
.drawer.open{right:0;}
.drawer-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.drawer-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
.drawer-body{flex:1;overflow-y:auto;padding:20px 24px;}
.ans-row{display:flex;align-items:flex-start;gap:10px;padding:10px;background:var(--surface2);border-radius:8px;margin-bottom:8px;}
.ans-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.ans-q{font-size:12px;color:var(--muted);margin-bottom:3px;}
.ans-val{font-size:13px;font-weight:600;}
.ans-correct{font-size:11px;color:var(--red);margin-top:2px;}
.empty-state{text-align:center;padding:80px 40px;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;}
.spinner{width:32px;height:32px;border:3px solid rgba(107,63,160,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:24px;background:var(--text);color:#fff;padding:10px 16px;border-radius:9px;font-size:12px;z-index:400;display:none;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted);">Loading results...</div>
</div>

<div id="main-wrap" style="display:none;">
<nav>
  <div class="brand">SwoopForm</div>
  <div class="nav-sep"></div>
  <div class="nav-crumb"><a href="/dashboard/">Dashboard</a> › <span id="nav-title">Riddle Results</span></div>
  <div class="nav-right">
    <button class="btn btn-ghost" onclick="exportCSV()">⬇ Export CSV</button>
    <button class="btn btn-accent" onclick="window.open('/riddle/?id='+RID,'_blank')">🧩 Play Riddle</button>
  </div>
</nav>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-label">Views</div>
    <button class="sidebar-item active" id="sbar-lb" onclick="showView('lb',this)"><span>🏆</span> Leaderboard</button>
    <button class="sidebar-item" id="sbar-players" onclick="showView('players',this)"><span>👥</span> All Players</button>
    <button class="sidebar-item" id="sbar-analytics" onclick="showView('analytics',this)"><span>📊</span> Analytics</button>
    <div class="sidebar-label" style="margin-top:8px;">Actions</div>
    <button class="sidebar-item" onclick="exportCSV()"><span>⬇</span> Export CSV</button>
    <button class="sidebar-item" onclick="window.location.href='/riddle/create/?id='+RID"><span>✏️</span> Edit Riddle</button>
    <button class="sidebar-item" onclick="toggleAccepting()"><span>🔓</span> Toggle Riddle</button>
    <button class="sidebar-item" onclick="window.location.href='/dashboard/'"><span>🏠</span> Dashboard</button>
  </div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="top-title">Loading...</div>
        <div class="topbar-meta" id="top-meta"></div>
      </div>
      <div class="topbar-right"><span id="accepting-status"></span></div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><span style="font-size:18px;">🎮</span><div><div class="stat-val" id="stat-plays" style="color:var(--accent);">0</div><div class="stat-label">Total Plays</div></div></div>
      <div class="stat-card"><span style="font-size:18px;">⭐</span><div><div class="stat-val" id="stat-avg" style="color:var(--yellow);">0%</div><div class="stat-label">Avg Score</div></div></div>
      <div class="stat-card"><span style="font-size:18px;">🏆</span><div><div class="stat-val" id="stat-perfect" style="color:var(--green);">0</div><div class="stat-label">Perfect Scores</div></div></div>
      <div class="stat-card"><span style="font-size:18px;">📅</span><div><div class="stat-val" id="stat-today" style="color:var(--muted);">0</div><div class="stat-label">Today</div></div></div>
    </div>

    <!-- LEADERBOARD -->
    <div class="content-area" id="view-lb">
      <div id="lb-wrap"></div>
    </div>

    <!-- PLAYERS TABLE -->
    <div id="view-players" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div class="filter-bar">
        <div class="search-wrap"><span class="search-icon">🔍</span><input type="text" id="search-input" placeholder="Search by name..." oninput="applyFilters()"></div>
        <select class="sort-select" onchange="applyFilters()" id="sort-select">
          <option value="newest">Newest First</option>
          <option value="highest">Highest Score</option>
          <option value="lowest">Lowest Score</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>
      <div style="flex:1;overflow-y:auto;">
        <table id="players-table" style="display:none;">
          <thead><tr><th>#</th><th>Player</th><th>Score</th><th>Correct</th><th>Played</th><th></th></tr></thead>
          <tbody id="players-body"></tbody>
        </table>
        <div class="empty-state" id="empty-state" style="display:none;">
          <div style="font-size:48px;margin-bottom:16px;opacity:.4;">🧩</div>
          <div style="font-size:16px;font-weight:600;">No plays yet</div>
          <div style="font-size:13px;color:var(--muted);margin-top:8px;">Share your riddle to start collecting responses</div>
        </div>
      </div>
    </div>

    <!-- ANALYTICS -->
    <div class="content-area" id="view-analytics" style="display:none;">
      <div class="analytics-grid" id="analytics-grid"></div>
    </div>
  </div>
</div>
</div>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div>
      <div style="font-size:15px;font-weight:700;" id="d-name"></div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;" id="d-score"></div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">×</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getAuth,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import{getFirestore,doc,getDoc,getDocs,updateDoc,collection,query,where,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);
const auth=getAuth(app);
const db=getFirestore(app);

const params=new URLSearchParams(window.location.search);
window.RID=params.get('id');
let riddleData=null;
let allResponses=[];
let filtered=[];
const COLORS=['#6b3fa0','#10b981','#f59e0b','#ef4444','#0ea5e9','#ec4899'];

onAuthStateChanged(auth,async function(u){
  if(!u){window.location.href='/login/';return;}
  if(!RID){showFatal('No riddle ID.');return;}
  try{
    const snap=await getDoc(doc(db,'riddles',RID));
    if(!snap.exists()||snap.data().userId!==u.uid){showFatal('Not found or access denied.');return;}
    riddleData=snap.data();
    renderHeader();
    const rSnap=await getDocs(query(collection(db,'riddleResponses'),where('riddleId','==',RID)));
    allResponses=rSnap.docs.map(function(d){return Object.assign({_id:d.id},d.data());});
    allResponses.sort(function(a,b){return(b.submittedAt?.seconds||0)-(a.submittedAt?.seconds||0);});
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('main-wrap').style.display='block';
    updateStats();
    renderLeaderboard();
    applyFilters();
    renderAnalytics();
  }catch(e){console.error(e);showFatal('Failed to load.');}
});

function renderHeader(){
  const t=riddleData.title||'Riddle';
  document.getElementById('nav-title').textContent=t;
  document.getElementById('top-title').textContent=t;
  document.getElementById('top-meta').textContent=[riddleData.category,riddleData.difficulty,(riddleData.questions||[]).length+' questions'].filter(Boolean).join(' · ');
  document.title=t+' — Results';
  const acc=riddleData.accepting!==false;
  document.getElementById('accepting-status').innerHTML=acc
    ?'<span style="color:var(--green);font-size:12px;">● Accepting</span>'
    :'<span style="color:var(--red);font-size:12px;">● Closed</span>';
}

function updateStats(){
  const total=allResponses.length;
  const avgScore=total?Math.round(allResponses.reduce(function(s,r){return s+(r.pct||0);},0)/total):0;
  const perfect=allResponses.filter(function(r){return r.pct===100;}).length;
  const today=new Date().toDateString();
  const todayCount=allResponses.filter(function(r){return r.submittedAt?.seconds&&new Date(r.submittedAt.seconds*1000).toDateString()===today;}).length;
  document.getElementById('stat-plays').textContent=total;
  document.getElementById('stat-avg').textContent=avgScore+'%';
  document.getElementById('stat-perfect').textContent=perfect;
  document.getElementById('stat-today').textContent=todayCount;
}

function renderLeaderboard(){
  const sorted=[...allResponses].sort(function(a,b){return b.pct-a.pct;}).slice(0,10);
  const rankEmojis=['🥇','🥈','🥉'];
  const rankColors=['#f59e0b','#9ca3af','#b45309'];
  document.getElementById('lb-wrap').innerHTML=sorted.length===0
    ?'<div class="empty-state"><div style="font-size:48px;opacity:.4;margin-bottom:16px;">🏆</div><div style="font-size:16px;font-weight:600;">No plays yet</div></div>'
    :'<div style="font-size:14px;font-weight:700;margin-bottom:16px;">🏆 Top Players</div>'
    +sorted.map(function(r,i){
      return '<div class="lb-row'+(i===0?' top':'')+'">'
        +'<div class="lb-rank" style="background:'+(rankColors[i]||'var(--surface2)')+';color:'+(i<3?'#fff':'var(--muted)')+';">'+(rankEmojis[i]||i+1)+'</div>'
        +'<div class="lb-name">'+(r.playerName||'Anonymous')+'</div>'
        +'<div style="font-size:12px;color:var(--muted);">'+r.score+'/'+(r.total||0)+'</div>'
        +'<div class="lb-score">'+r.pct+'%</div>'
        +'</div>';
    }).join('');
}

window.applyFilters=function(){
  const q=(document.getElementById('search-input')?.value||'').toLowerCase();
  const sort=document.getElementById('sort-select')?.value||'newest';
  filtered=allResponses.filter(function(r){return !q||(r.playerName||'').toLowerCase().includes(q)||(r.playerEmail||'').toLowerCase().includes(q);});
  if(sort==='highest')filtered.sort(function(a,b){return b.pct-a.pct;});
  else if(sort==='lowest')filtered.sort(function(a,b){return a.pct-b.pct;});
  else if(sort==='name')filtered.sort(function(a,b){return(a.playerName||'').localeCompare(b.playerName||'');});
  else filtered.sort(function(a,b){return(b.submittedAt?.seconds||0)-(a.submittedAt?.seconds||0);});
  renderPlayersTable();
};

function renderPlayersTable(){
  const tbody=document.getElementById('players-body');
  const table=document.getElementById('players-table');
  const empty=document.getElementById('empty-state');
  if(filtered.length===0){table.style.display='none';empty.style.display='block';return;}
  empty.style.display='none';table.style.display='table';
  tbody.innerHTML=filtered.map(function(r,i){
    const name=r.playerName||'Anonymous';
    const pct=r.pct||0;
    const scoreClass=pct>=70?'score-high':pct>=40?'score-mid':'score-low';
    const date=r.submittedAt?.seconds?new Date(r.submittedAt.seconds*1000).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'—';
    return '<tr onclick="openDrawer(\''+r._id+'\')">'
      +'<td style="color:var(--muted);font-family:var(--mono);font-size:11px;">#'+(i+1)+'</td>'
      +'<td><div style="font-weight:600;">'+eh(name)+'</div>'+(r.playerEmail?'<div style="font-size:11px;color:var(--muted);">'+eh(r.playerEmail)+'</div>':'')+'</td>'
      +'<td><span class="score-badge '+scoreClass+'">'+pct+'%</span></td>'
      +'<td style="font-family:var(--mono);font-size:12px;">'+r.score+'/'+(r.total||0)+'</td>'
      +'<td style="color:var(--muted);font-size:11px;">'+date+'</td>'
      +'<td><button class="btn btn-ghost" onclick="event.stopPropagation();openDrawer(\''+r._id+'\')">View</button></td>'
      +'</tr>';
  }).join('');
}

window.openDrawer=function(id){
  const r=allResponses.find(function(x){return x._id===id;});if(!r)return;
  document.getElementById('d-name').textContent=r.playerName||'Anonymous';
  document.getElementById('d-score').textContent=r.pct+'% · '+r.score+'/'+(r.total||0)+' correct';
  const date=r.submittedAt?.seconds?new Date(r.submittedAt.seconds*1000).toLocaleString('en-IN'):'—';
  document.getElementById('drawer-body').innerHTML=
    '<div style="font-size:12px;color:var(--muted);margin-bottom:16px;">Played: '+date+(r.playerEmail?' · '+r.playerEmail:'')+'</div>'
    +'<div style="font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;">ANSWERS</div>'
    +(r.answers||[]).map(function(a){
      return '<div class="ans-row">'
        +'<div class="ans-icon">'+(a.correct?'✅':'❌')+'</div>'
        +'<div style="flex:1;">'
        +'<div class="ans-q">'+eh((a.question||'').substring(0,60))+'</div>'
        +'<div class="ans-val">'+eh(a.userAnswer||'—')+'</div>'
        +(!a.correct?'<div class="ans-correct">Correct: '+eh(a.correctAnswer||'')+'</div>':'')
        +'</div></div>';
    }).join('');
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
};

window.closeDrawer=function(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
};

function renderAnalytics(){
  const grid=document.getElementById('analytics-grid');
  const total=allResponses.length;

  // Summary
  const c1=document.createElement('div');c1.className='chart-card';
  const avgScore=total?Math.round(allResponses.reduce(function(s,r){return s+(r.pct||0);},0)/total):0;
  c1.innerHTML='<div class="chart-title">📊 Overview</div>'
    +'<div class="big-num">'+avgScore+'%</div>'
    +'<div style="text-align:center;font-size:13px;color:var(--muted);margin-bottom:16px;">Average Score</div>'
    +'<div style="font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:8px;">'
    +'<div style="display:flex;justify-content:space-between;"><span>Total plays</span><strong>'+total+'</strong></div>'
    +'<div style="display:flex;justify-content:space-between;"><span>Perfect scores</span><strong>'+allResponses.filter(function(r){return r.pct===100;}).length+'</strong></div>'
    +'<div style="display:flex;justify-content:space-between;"><span>Questions</span><strong>'+(riddleData.questions||[]).length+'</strong></div>'
    +'<div style="display:flex;justify-content:space-between;"><span>Difficulty</span><strong>'+(riddleData.difficulty||'Medium')+'</strong></div>'
    +'</div>';
  grid.appendChild(c1);

  // Score distribution
  const c2=document.createElement('div');c2.className='chart-card';
  const buckets={'0-20':0,'21-40':0,'41-60':0,'61-80':0,'81-100':0};
  allResponses.forEach(function(r){const p=r.pct||0;if(p<=20)buckets['0-20']++;else if(p<=40)buckets['21-40']++;else if(p<=60)buckets['41-60']++;else if(p<=80)buckets['61-80']++;else buckets['81-100']++;});
  const maxB=Math.max(...Object.values(buckets),1);
  const bColors={'0-20':'#ef4444','21-40':'#f59e0b','41-60':'#eab308','61-80':'#84cc16','81-100':'#10b981'};
  let html2='<div class="chart-title">📈 Score Distribution</div>';
  Object.entries(buckets).forEach(function(entry){
    const pct=Math.round(entry[1]/maxB*100);
    html2+='<div class="bar-row"><div class="bar-label">'+entry[0]+'%</div><div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%;background:'+bColors[entry[0]]+'"></div><span class="bar-val">'+entry[1]+'</span></div></div>';
  });
  c2.innerHTML=html2;grid.appendChild(c2);

  // Question performance
  const qs=riddleData.questions||[];
  if(qs.length&&total){
    const c3=document.createElement('div');c3.className='chart-card full';
    let html3='<div class="chart-title">❓ Question Performance</div>';
    qs.forEach(function(q,i){
      const correct=allResponses.filter(function(r){return(r.answers||[])[i]?.correct;}).length;
      const pct=Math.round(correct/total*100);
      const color=pct>=70?'#10b981':pct>=40?'#f59e0b':'#ef4444';
      html3+='<div class="q-perf-row">'
        +'<div style="font-size:11px;font-weight:700;color:var(--accent);width:24px;flex-shrink:0;">Q'+(i+1)+'</div>'
        +'<div class="q-perf-text">'+(q.question||'').substring(0,40)+'</div>'
        +'<div class="q-perf-bar"><div class="q-perf-fill" style="width:'+pct+'%;background:'+color+'"></div></div>'
        +'<div class="q-perf-pct" style="color:'+color+'">'+pct+'%</div>'
        +'</div>';
    });
    c3.innerHTML=html3;grid.appendChild(c3);
  }

  // Daily trend
  const dayCount={};
  allResponses.forEach(function(r){
    if(r.submittedAt?.seconds){
      const d=new Date(r.submittedAt.seconds*1000).toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
      dayCount[d]=(dayCount[d]||0)+1;
    }
  });
  if(Object.keys(dayCount).length>1){
    const c4=document.createElement('div');c4.className='chart-card full';
    const maxDay=Math.max(...Object.values(dayCount),1);
    let html4='<div class="chart-title">📅 Daily Plays</div>';
    Object.keys(dayCount).forEach(function(k){
      const pct=Math.round(dayCount[k]/maxDay*100);
      html4+='<div class="bar-row"><div class="bar-label">'+k+'</div><div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%;background:var(--accent)"></div><span class="bar-val">'+dayCount[k]+'</span></div></div>';
    });
    c4.innerHTML=html4;grid.appendChild(c4);
  }
}

window.showView=function(view,el){
  document.querySelectorAll('.sidebar-item').forEach(function(i){i.classList.remove('active');});
  if(el)el.classList.add('active');
  document.getElementById('view-lb').style.display=view==='lb'?'block':'none';
  document.getElementById('view-players').style.display=view==='players'?'flex':'none';
  document.getElementById('view-analytics').style.display=view==='analytics'?'block':'none';
};

window.toggleAccepting=async function(){
  const current=riddleData.accepting!==false;
  try{
    await updateDoc(doc(db,'riddles',RID),{accepting:!current,updatedAt:serverTimestamp()});
    riddleData.accepting=!current;renderHeader();
    toast(current?'Riddle closed':'Riddle reopened');
  }catch(e){toast('Error');}
};

window.exportCSV=function(){
  const qs=riddleData.questions||[];
  const headers=['Name','Email','Score','Percentage','Played',...qs.map(function(q,i){return 'Q'+(i+1);})];
  const rows=[headers];
  allResponses.forEach(function(r){
    const date=r.submittedAt?.seconds?new Date(r.submittedAt.seconds*1000).toLocaleDateString():'';
    rows.push([
      r.playerName||'',r.playerEmail||'',
      r.score+'/'+(r.total||0),r.pct+'%',date,
      ...qs.map(function(q,i){const a=(r.answers||[])[i];return a?(a.correct?'✓ '+a.userAnswer:'✗ '+a.userAnswer):''})
    ]);
  });
  const csv=rows.map(function(r){return r.map(function(v){return '"'+String(v||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='riddle-results.csv';a.click();
  toast('CSV downloaded!');
};

function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function showFatal(msg){document.getElementById('loading-screen').innerHTML='<div style="text-align:center;padding:40px;"><div style="font-size:48px;margin-bottom:16px;">🧩</div><div style="font-size:16px;font-weight:700;margin-bottom:8px;">'+msg+'</div><a href="/dashboard/" style="display:inline-block;margin-top:16px;padding:10px 20px;background:var(--accent);color:#fff;border-radius:8px;text-decoration:none;font-size:13px;">Go to Dashboard</a></div>';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(function(){t.style.display='none';},2500);}
</script>
