<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Results — SwoopForm</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--surface:#ffffff;--surface2:#f0eeea;--border:#e2ddd6;--accent:#ec4899;--green:#12a872;--yellow:#d97706;--red:#e5484d;--purple:#7c3aed;--text:#1c1c2e;--muted:#7a7a8c;--muted2:#c5c0b8;--font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
nav{height:54px;background:rgba(245,244,240,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:100;gap:16px;}
.brand{font-size:15px;font-weight:700;color:var(--accent);}
.nav-sep{width:1px;height:18px;background:var(--border);}
.nav-crumb{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;}
.nav-crumb a{color:var(--accent);text-decoration:none;}
.nav-right{margin-left:auto;display:flex;gap:10px;}
.btn{padding:7px 14px;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:none;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--muted2);color:var(--text);}
.btn-accent{background:var(--accent);color:#fff;font-weight:600;}
.layout{display:flex;height:calc(100vh - 54px);}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);padding:8px 10px 6px;}
.sidebar-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--muted);transition:all .15s;border:none;background:none;width:100%;font-family:var(--font);}
.sidebar-item:hover{background:var(--surface2);color:var(--text);}
.sidebar-item.active{background:rgba(236,72,153,0.1);color:var(--accent);}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.topbar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--surface);}
.topbar-title{font-size:16px;font-weight:700;}
.topbar-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.topbar-right{margin-left:auto;display:flex;gap:10px;align-items:center;}
.stats-row{display:flex;gap:1px;background:var(--border);flex-shrink:0;}
.stat-card{flex:1;background:var(--surface);padding:14px 20px;display:flex;align-items:center;gap:10px;}
.stat-val{font-size:20px;font-weight:700;font-family:var(--mono);}
.stat-label{font-size:11px;color:var(--muted);margin-top:1px;}
.content-area{flex:1;overflow-y:auto;}
.filter-bar{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--surface2);}
.search-wrap{position:relative;flex:1;max-width:300px;}
.search-wrap input{width:100%;padding:8px 12px 8px 34px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;}
.search-wrap input:focus{border-color:var(--accent);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);}
.sort-select{padding:7px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:var(--font);font-size:12px;outline:none;cursor:pointer;}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--surface2);border-bottom:1px solid var(--border);position:sticky;top:0;}
th{padding:10px 16px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:left;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
tbody tr:hover{background:#faf9f7;}
td{padding:12px 16px;font-size:12px;vertical-align:middle;}
.product-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;background:rgba(236,72,153,0.1);color:var(--accent);}
.tag-pill{display:inline-block;padding:2px 8px;border-radius:10px;background:var(--surface2);color:var(--muted);font-size:10px;margin:1px;}

/* ANALYTICS */
.analytics-wrap{padding:24px;}
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;}
.chart-card.full{grid-column:1/-1;}
.chart-title{font-size:13px;font-weight:600;margin-bottom:16px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-label{font-size:12px;color:var(--muted);width:120px;flex-shrink:0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-wrap{flex:1;height:28px;background:var(--surface2);border-radius:6px;overflow:hidden;position:relative;}
.bar-fill{height:100%;border-radius:6px;transition:width .6s;}
.bar-val{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;font-family:var(--mono);}

.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:150;display:none;}
.drawer-overlay.open{display:block;}
.drawer{position:fixed;top:0;right:-540px;width:540px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:160;transition:right .3s;display:flex;flex-direction:column;overflow:hidden;}
.drawer.open{right:0;}
.drawer-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.drawer-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
.drawer-body{flex:1;overflow-y:auto;padding:20px 24px;}
.detail-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.detail-row:last-child{border-bottom:none;}
.detail-key{font-size:12px;color:var(--muted);width:130px;flex-shrink:0;}
.detail-val{font-size:12px;flex:1;}
.empty-state{text-align:center;padding:80px 40px;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:24px;background:var(--text);color:#fff;padding:10px 16px;border-radius:9px;font-size:12px;z-index:400;display:none;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted);">Loading results...</div>
</div>

<div id="main-wrap" style="display:none;">
<nav>
  <div class="brand">SwoopForm</div>
  <div class="nav-sep"></div>
  <div class="nav-crumb">
    <a href="/dashboard/">Dashboard</a> ›
    <span id="nav-title">Quiz Results</span>
  </div>
  <div class="nav-right">
    <button class="btn btn-ghost" onclick="exportCSV()">⬇ Export CSV</button>
    <button class="btn btn-accent" onclick="viewQuiz()">🔗 View Quiz</button>
  </div>
</nav>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-label">Views</div>
    <button class="sidebar-item active" id="sbar-table" onclick="showView('table',this)"><span>📋</span> Responses</button>
    <button class="sidebar-item" id="sbar-analytics" onclick="showView('analytics',this)"><span>📊</span> Analytics</button>
    <div class="sidebar-label" style="margin-top:8px;">Actions</div>
    <button class="sidebar-item" onclick="exportCSV()"><span>⬇</span> Export CSV</button>
    <button class="sidebar-item" onclick="window.location.href='/product/create/?id='+PID"><span>✏️</span> Edit Quiz</button>
    <button class="sidebar-item" onclick="toggleAccepting()"><span>🔓</span> Toggle Quiz</button>
    <button class="sidebar-item" onclick="window.location.href='/dashboard/'"><span>🏠</span> Dashboard</button>
  </div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="top-title">Loading...</div>
        <div class="topbar-meta" id="top-meta"></div>
      </div>
      <div class="topbar-right">
        <span id="accepting-status"></span>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card"><span style="font-size:18px;">🎯</span><div><div class="stat-val" id="stat-total" style="color:var(--accent);">0</div><div class="stat-label">Completions</div></div></div>
      <div class="stat-card"><span style="font-size:18px;">📦</span><div><div class="stat-val" id="stat-top" style="color:var(--green);">—</div><div class="stat-label">Top Product</div></div></div>
      <div class="stat-card"><span style="font-size:18px;">📧</span><div><div class="stat-val" id="stat-emails" style="color:var(--purple);">0</div><div class="stat-label">Emails</div></div></div>
      <div class="stat-card"><span style="font-size:18px;">📅</span><div><div class="stat-val" id="stat-today" style="color:var(--yellow);">0</div><div class="stat-label">Today</div></div></div>
    </div>

    <!-- TABLE VIEW -->
    <div id="table-view" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
      <div class="filter-bar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search by product or email..." oninput="applyFilters()">
        </div>
        <select class="sort-select" onchange="applyFilters()" id="sort-select">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
        </select>
      </div>
      <div class="content-area">
        <table id="main-table" style="display:none;">
          <thead>
            <tr><th>#</th><th>Email</th><th>Top Product</th><th>Tags Collected</th><th>Submitted</th><th>Actions</th></tr>
          </thead>
          <tbody id="resp-body"></tbody>
        </table>
        <div class="empty-state" id="empty-state" style="display:none;">
          <div style="font-size:48px;margin-bottom:16px;opacity:0.4;">📭</div>
          <div style="font-size:16px;font-weight:600;margin-bottom:8px;">No completions yet</div>
          <div style="font-size:13px;color:var(--muted);">Share your quiz to start collecting responses</div>
        </div>
      </div>
    </div>

    <!-- ANALYTICS VIEW -->
    <div id="analytics-view" style="display:none;flex:1;overflow-y:auto;">
      <div class="analytics-wrap">
        <div class="analytics-grid" id="analytics-grid"></div>
      </div>
    </div>
  </div>
</div>
</div>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div style="font-size:14px;font-weight:700;">Quiz Response</div>
    <button class="drawer-close" onclick="closeDrawer()">×</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getAuth,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import{getFirestore,doc,getDoc,getDocs,updateDoc,collection,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);
const auth=getAuth(app);
const db=getFirestore(app);

const params=new URLSearchParams(window.location.search);
window.PID=params.get('id');
let pData=null;
let allResponses=[];
let filtered=[];
const COLORS=['#ec4899','#12a872','#d97706','#e5484d','#7c3aed','#0ea5e9'];

onAuthStateChanged(auth,async function(u){
  if(!u){window.location.href='/login/';return;}
  if(!PID){showFatal('No quiz ID.');return;}
  await loadData();
});

async function loadData(){
  try{
    const snap=await getDoc(doc(db,'products',PID));
    if(!snap.exists()){showFatal('Quiz not found.');return;}
    pData=snap.data();
    renderHeader();
    const rSnap=await getDocs(collection(db,'products',PID,'responses'));
    allResponses=rSnap.docs.map(function(d){return Object.assign({_id:d.id},d.data());});
    allResponses.sort(function(a,b){return(b.submittedAt&&b.submittedAt.seconds?b.submittedAt.seconds:0)-(a.submittedAt&&a.submittedAt.seconds?a.submittedAt.seconds:0);});
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('main-wrap').style.display='block';
    updateStats();
    applyFilters();
    renderAnalytics();
  }catch(e){console.error(e);showFatal('Failed to load.');}
}

function renderHeader(){
  const t=pData.title||'Product Quiz';
  document.getElementById('nav-title').textContent=t;
  document.getElementById('top-title').textContent=t;
  document.getElementById('top-meta').textContent=pData.category||'Product Recommendation';
  document.title=t+' — Results';
  const acc=pData.accepting!==false;
  document.getElementById('accepting-status').innerHTML=acc?'<span style="color:var(--green);font-size:12px;">● Accepting</span>':'<span style="color:var(--red);font-size:12px;">● Closed</span>';
}

function updateStats(){
  document.getElementById('stat-total').textContent=allResponses.length;
  const emails=allResponses.filter(function(r){return r.email&&r.email.trim();}).length;
  document.getElementById('stat-emails').textContent=emails;
  const today=new Date().toDateString();
  document.getElementById('stat-today').textContent=allResponses.filter(function(r){return r.submittedAt&&r.submittedAt.seconds&&new Date(r.submittedAt.seconds*1000).toDateString()===today;}).length;
  // Top product
  const prodCount={};
  allResponses.forEach(function(r){if(r.topProduct)prodCount[r.topProduct]=(prodCount[r.topProduct]||0)+1;});
  const top=Object.keys(prodCount).sort(function(a,b){return prodCount[b]-prodCount[a];})[0];
  document.getElementById('stat-top').textContent=top?top.substring(0,12)+(top.length>12?'...':''):'—';
}

window.applyFilters=function(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  const sort=document.getElementById('sort-select').value;
  filtered=allResponses.filter(function(r){
    const email=(r.email||'').toLowerCase();
    const prod=(r.topProduct||'').toLowerCase();
    return !q||email.includes(q)||prod.includes(q);
  });
  if(sort==='oldest')filtered.sort(function(a,b){return(a.submittedAt&&a.submittedAt.seconds?a.submittedAt.seconds:0)-(b.submittedAt&&b.submittedAt.seconds?b.submittedAt.seconds:0);});
  renderTable();
};

function renderTable(){
  const tbody=document.getElementById('resp-body');
  const table=document.getElementById('main-table');
  const empty=document.getElementById('empty-state');
  if(filtered.length===0){table.style.display='none';empty.style.display='block';return;}
  empty.style.display='none';table.style.display='table';
  tbody.innerHTML=filtered.map(function(r,i){
    const date=r.submittedAt&&r.submittedAt.seconds?new Date(r.submittedAt.seconds*1000).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'—';
    const tags=(r.tags||[]).slice(0,3).map(function(t){return '<span class="tag-pill">'+t+'</span>';}).join('');
    return '<tr onclick="openDrawer(\''+r._id+'\')">'
      +'<td style="color:var(--muted);font-size:11px;font-family:var(--mono);">#'+(i+1)+'</td>'
      +'<td style="color:var(--muted);">'+(r.email||'Anonymous')+'</td>'
      +'<td><span class="product-badge">📦 '+(r.topProduct||'—')+'</span></td>'
      +'<td>'+tags+(r.tags&&r.tags.length>3?'<span class="tag-pill">+'+( r.tags.length-3)+'</span>':'')+'</td>'
      +'<td style="color:var(--muted);font-size:11px;">'+date+'</td>'
      +'<td><button class="btn btn-ghost" onclick="event.stopPropagation();openDrawer(\''+r._id+'\')">View</button></td>'
      +'</tr>';
  }).join('');
}

window.openDrawer=function(id){
  const r=allResponses.find(function(x){return x._id===id;});
  if(!r)return;
  const qs=pData.questions||[];
  const date=r.submittedAt&&r.submittedAt.seconds?new Date(r.submittedAt.seconds*1000).toLocaleString('en-IN'):'—';
  document.getElementById('drawer-body').innerHTML=
    '<div class="detail-row"><div class="detail-key">📅 Submitted</div><div class="detail-val">'+date+'</div></div>'
    +'<div class="detail-row"><div class="detail-key">📦 Top Product</div><div class="detail-val" style="color:var(--accent);font-weight:600;">'+(r.topProduct||'—')+'</div></div>'
    +'<div class="detail-row"><div class="detail-key">📧 Email</div><div class="detail-val">'+(r.email||'Not provided')+'</div></div>'
    +'<div class="detail-row"><div class="detail-key">🏷️ Tags</div><div class="detail-val">'+(r.tags||[]).map(function(t){return '<span class="tag-pill">'+t+'</span>';}).join(' ')+'</div></div>'
    +'<div style="margin-top:16px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;">ANSWERS</div>'
    +qs.map(function(q,i){
      const ans=r.answers&&r.answers[i]!==undefined?r.answers[i]:'—';
      return '<div class="detail-row"><div class="detail-key" style="font-size:11px;">'+q.text.substring(0,30)+(q.text.length>30?'...':'')+'</div><div class="detail-val">'+(Array.isArray(ans)?ans.join(', '):String(ans))+'</div></div>';
    }).join('');
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
};

window.closeDrawer=function(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
};

function renderAnalytics(){
  const grid=document.getElementById('analytics-grid');
  grid.innerHTML='';

  // Product popularity
  const prodCount={};
  allResponses.forEach(function(r){if(r.topProduct)prodCount[r.topProduct]=(prodCount[r.topProduct]||0)+1;});
  if(Object.keys(prodCount).length){
    const card=document.createElement('div');
    card.className='chart-card full';
    let html='<div class="chart-title">📦 Product Recommendations</div>';
    Object.keys(prodCount).sort(function(a,b){return prodCount[b]-prodCount[a];}).forEach(function(k,j){
      const pct=allResponses.length?Math.round(prodCount[k]/allResponses.length*100):0;
      html+='<div class="bar-row"><div class="bar-label">'+k.substring(0,16)+'</div><div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%;background:'+COLORS[j%COLORS.length]+'"></div><span class="bar-val">'+prodCount[k]+' ('+pct+'%)</span></div></div>';
    });
    card.innerHTML=html;grid.appendChild(card);
  }

  // Tag popularity
  const tagCount={};
  allResponses.forEach(function(r){(r.tags||[]).forEach(function(t){tagCount[t]=(tagCount[t]||0)+1;});});
  if(Object.keys(tagCount).length){
    const card=document.createElement('div');
    card.className='chart-card full';
    let html='<div class="chart-title">🏷️ Most Common Tags</div>';
    Object.keys(tagCount).sort(function(a,b){return tagCount[b]-tagCount[a];}).slice(0,10).forEach(function(k,j){
      const pct=allResponses.length?Math.round(tagCount[k]/allResponses.length*100):0;
      html+='<div class="bar-row"><div class="bar-label">'+k+'</div><div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%;background:'+COLORS[j%COLORS.length]+'"></div><span class="bar-val">'+tagCount[k]+'</span></div></div>';
    });
    card.innerHTML=html;grid.appendChild(card);
  }

  // Question analytics
  const qs=pData.questions||[];
  qs.forEach(function(q,i){
    if(q.type==='single'||q.type==='multi'){
      const card=document.createElement('div');
      card.className='chart-card';
      const dist={};
      allResponses.forEach(function(r){
        const ans=r.answers&&r.answers[i];
        if(Array.isArray(ans))ans.forEach(function(a){dist[a]=(dist[a]||0)+1;});
        else if(ans)dist[ans]=(dist[ans]||0)+1;
      });
      let html='<div class="chart-title" style="font-size:12px;">'+q.text.substring(0,50)+'</div>';
      Object.keys(dist).sort(function(a,b){return dist[b]-dist[a];}).forEach(function(k,j){
        const pct=allResponses.length?Math.round(dist[k]/allResponses.length*100):0;
        html+='<div class="bar-row"><div class="bar-label" style="font-size:11px;">'+k.substring(0,14)+'</div><div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%;background:'+COLORS[j%COLORS.length]+'"></div><span class="bar-val">'+dist[k]+'</span></div></div>';
      });
      card.innerHTML=html;grid.appendChild(card);
    }
  });

  if(grid.children.length===0)grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);">Complete the quiz to see analytics here.</div>';
}

window.showView=function(view,el){
  document.querySelectorAll('.sidebar-item').forEach(function(i){i.classList.remove('active');});
  if(el)el.classList.add('active');
  document.getElementById('table-view').style.display=view==='table'?'flex':'none';
  document.getElementById('analytics-view').style.display=view==='analytics'?'block':'none';
};

window.toggleAccepting=async function(){
  const current=pData.accepting!==false;
  try{
    await updateDoc(doc(db,'products',PID),{accepting:!current,updatedAt:serverTimestamp()});
    pData.accepting=!current;renderHeader();
    toast(current?'Quiz closed':'Quiz reopened');
  }catch(e){toast('Error');}
};

window.viewQuiz=function(){window.open('/product/?id='+PID,'_blank');};

window.exportCSV=function(){
  const qs=pData.questions||[];
  const headers=['Email','Top Product','Tags','Submitted',...qs.map(function(q){return q.text;})];
  const rows=[headers];
  allResponses.forEach(function(r){
    const date=r.submittedAt&&r.submittedAt.seconds?new Date(r.submittedAt.seconds*1000).toLocaleDateString():'';
    rows.push([r.email||'',r.topProduct||'',(r.tags||[]).join('; '),date,...qs.map(function(q,i){const v=r.answers&&r.answers[i]!==undefined?r.answers[i]:'';return Array.isArray(v)?v.join('; '):String(v);})]);
  });
  const csv=rows.map(function(r){return r.map(function(v){return '"'+(v||'').toString().replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='quiz-results.csv';a.click();
  toast('CSV downloaded!');
};

function showFatal(msg){document.getElementById('loading-screen').innerHTML='<div style="text-align:center;padding:40px;"><div style="font-size:48px;margin-bottom:16px;">😕</div><div style="font-size:16px;font-weight:700;margin-bottom:8px;">'+msg+'</div><a href="/dashboard/" style="display:inline-block;margin-top:16px;padding:10px 20px;background:var(--accent);color:#fff;border-radius:8px;text-decoration:none;font-size:13px;">Go to Dashboard</a></div>';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(function(){t.style.display='none';},2500);}
</script>
