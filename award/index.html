<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Award — SwoopForm</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--white:#fff;--border:#e2ddd6;--accent:#f59e0b;--accent-light:#fffbeb;--success:#12a872;--danger:#e5484d;--text:#1c1c2e;--muted:#7a7a8c;--muted2:#c5c0b8;--font:'Sora',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
header{height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50;}
.brand{font-size:15px;font-weight:700;color:var(--accent);}
.main{max-width:600px;margin:0 auto;padding:40px 20px;}
.award-card{background:var(--white);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.award-hero{padding:32px;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;text-align:center;}
.award-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;opacity:0.8;margin-bottom:10px;}
.award-title{font-size:24px;font-weight:700;margin-bottom:10px;line-height:1.3;}
.award-question{font-size:15px;opacity:0.9;line-height:1.6;margin-bottom:12px;}
.award-meta{display:flex;justify-content:center;gap:16px;font-size:12px;opacity:0.8;flex-wrap:wrap;}
.award-body{padding:28px;}
.collect-section{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:20px;}
.collect-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;}
.collect-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field-group{margin-bottom:20px;}
.field-label{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.rank-num{width:28px;height:28px;border-radius:8px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rank-pts-badge{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--accent-light);color:#92400e;font-weight:600;margin-left:auto;}
.nom-input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;background:var(--white);color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s;}
.nom-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,0.08);}
.nom-input::placeholder{color:var(--muted2);}
.nom-input.error{border-color:var(--danger);}
.submit-btn{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px;}
.submit-btn:hover{opacity:0.9;transform:translateY(-1px);}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.leaderboard{margin-top:20px;border-top:1px solid var(--border);padding-top:20px;}
.lb-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.lb-row{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg);border-radius:10px;margin-bottom:8px;transition:all .2s;}
.lb-row.top{background:var(--accent-light);border:1px solid rgba(245,158,11,0.2);}
.lb-rank{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.lb-name{flex:1;font-size:14px;font-weight:600;}
.lb-score{font-size:14px;font-weight:800;color:var(--accent);font-family:monospace;}
.lb-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.lb-bar{height:100%;border-radius:3px;background:var(--accent);transition:width .6s;}
.thankyou{display:none;text-align:center;padding:48px 28px;}
.ty-icon{font-size:64px;margin-bottom:16px;animation:pop .5s ease;}
@keyframes pop{0%{transform:scale(0.5);opacity:0}80%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.ty-title{font-size:24px;font-weight:700;margin-bottom:10px;}
.ty-msg{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:20px;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.award-hero,.award-body{padding:20px;}.main{padding:20px 16px;}.collect-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted);">Loading award...</div>
</div>

<div id="app" style="display:none;">
  <header>
    <div class="brand">SwoopForm</div>
    <span style="font-size:12px;color:var(--muted);">Awards & Nominations</span>
  </header>
  <div class="main">
    <div class="award-card">
      <div class="award-hero">
        <div class="award-tag" id="a-tag">Award</div>
        <div class="award-title" id="a-title">Loading...</div>
        <div class="award-question" id="a-question"></div>
        <div class="award-meta">
          <span id="a-responses">0 nominations</span>
          <span id="a-deadline"></span>
        </div>
      </div>
      <div class="award-body">
        <div class="collect-section" id="collect-section" style="display:none;">
          <div class="collect-title">Your Details</div>
          <div class="collect-grid">
            <div><input class="nom-input" id="c-name" placeholder="Your name" style="font-size:13px;padding:9px 12px;"></div>
            <div><input class="nom-input" id="c-email" type="email" placeholder="your@email.com" style="font-size:13px;padding:9px 12px;"></div>
          </div>
        </div>
        <div id="nominations-wrap"></div>
        <button class="submit-btn" id="submit-btn" onclick="submitNominations()">Submit Nominations 🏆</button>
        <div class="leaderboard" id="leaderboard" style="display:none;">
          <div class="lb-title">🏆 Current Standings</div>
          <div id="lb-wrap"></div>
        </div>
      </div>
      <div class="thankyou" id="thankyou">
        <div class="ty-icon">🏆</div>
        <div class="ty-title" id="ty-title">Thank you!</div>
        <div class="ty-msg" id="ty-msg">Your nominations have been recorded.</div>
        <div class="leaderboard" id="thankyou-lb" style="padding:0;">
          <div class="lb-title">🏆 Current Standings</div>
          <div id="ty-lb-wrap"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,doc,getDoc,addDoc,updateDoc,collection,increment,onSnapshot,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);
const db=getFirestore(app);

const params=new URLSearchParams(window.location.search);
const AID=params.get('id');
let aData=null;
let scores={};

async function init(){
  if(!AID){showError('No award ID in URL.');return;}
  try{
    const snap=await getDoc(doc(db,'awards',AID));
    if(!snap.exists()){showError('Award not found.');return;}
    aData=snap.data();
    if(aData.accepting===false){showError('This award is closed.');return;}
    render();
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('app').style.display='block';
    // Live leaderboard
    onSnapshot(doc(db,'awards',AID),function(snap){
      if(snap.exists()){
        const d=snap.data();
        scores=d.scores||{};
        const rc=d.responseCount||0;
        document.getElementById('a-responses').textContent=rc+' nomination'+(rc!==1?'s':'');
        renderLeaderboard(scores,'lb-wrap');
        renderLeaderboard(scores,'ty-lb-wrap');
      }
    });
  }catch(e){console.error(e);showError('Failed to load.');}
}

function render(){
  const d=aData;
  document.title=(d.title||'Award')+' — SwoopForm';
  document.getElementById('a-tag').textContent=d.category||'Award';
  document.getElementById('a-title').textContent=d.title||'';
  document.getElementById('a-question').textContent=d.question||'';
  if(d.deadline)document.getElementById('a-deadline').textContent='Closes '+d.deadline;
  if(!d.anonymous)document.getElementById('collect-section').style.display='block';
  if(d.showLive)document.getElementById('leaderboard').style.display='block';
  document.getElementById('ty-title').textContent=d.thankYouHeading||'Thank you! 🏆';
  document.getElementById('ty-msg').textContent=d.thankYouMessage||'Your nominations have been recorded.';
  scores=d.scores||{};
  renderNominations();
  renderLeaderboard(scores,'lb-wrap');
}

function renderNominations(){
  const ranks=aData.ranks||[];
  const placeholder=aData.placeholder||'Type your nomination...';
  const rankEmojis={1:'🥇',2:'🥈',3:'🥉'};
  document.getElementById('nominations-wrap').innerHTML=ranks.map(function(r,i){
    return '<div class="field-group">'
      +'<div class="field-label">'
      +'<div class="rank-num">'+(rankEmojis[r.rank]||r.rank)+'</div>'
      +(r.label||'Rank #'+r.rank)
      +'<span class="rank-pts-badge">'+r.points+' pts</span>'
      +'</div>'
      +'<input class="nom-input" id="nom_'+i+'" placeholder="'+placeholder+'" autocomplete="off">'
      +'</div>';
  }).join('');
}

function renderLeaderboard(scores,wrapId){
  const wrap=document.getElementById(wrapId);
  if(!wrap)return;
  const entries=Object.entries(scores).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  if(entries.length===0){wrap.innerHTML='<div style="text-align:center;font-size:13px;color:var(--muted);padding:12px;">No nominations yet</div>';return;}
  const maxScore=entries[0][1]||1;
  const rankEmojis=['🥇','🥈','🥉'];
  wrap.innerHTML=entries.map(function(e,i){
    const pct=Math.round(e[1]/maxScore*100);
    return '<div class="lb-row'+(i===0?' top':'')+'">'
      +'<div class="lb-rank" style="background:'+(i===0?'#f59e0b':i===1?'#9ca3af':i===2?'#b45309':'var(--surface2)')+';color:'+(i<3?'#fff':'var(--muted)')+';">'+(rankEmojis[i]||i+1)+'</div>'
      +'<div class="lb-name">'+e[0]+'</div>'
      +'<div class="lb-bar-wrap"><div class="lb-bar" style="width:'+pct+'%"></div></div>'
      +'<div class="lb-score">'+e[1]+' pts</div>'
      +'</div>';
  }).join('');
}

window.submitNominations=async function(){
  const ranks=aData.ranks||[];
  const nominations=[];
  let valid=true;

  ranks.forEach(function(r,i){
    const inp=document.getElementById('nom_'+i);
    const val=inp?inp.value.trim():'';
    if(aData.allRequired&&!val){
      if(inp)inp.classList.add('error');
      valid=false;
    }else{
      if(inp)inp.classList.remove('error');
    }
    nominations.push({rank:r.rank,label:r.label,points:r.points,nomination:val});
  });

  if(!valid){alert('Please fill all nomination slots.');return;}
  const hasAny=nominations.some(function(n){return n.nomination;});
  if(!hasAny){alert('Please enter at least one nomination.');return;}

  // Check dupes
  if(!aData.allowDupes){
    const vals=nominations.map(function(n){return n.nomination.toLowerCase();}).filter(Boolean);
    const unique=new Set(vals);
    if(unique.size!==vals.length){alert('Duplicate nominations not allowed. Each slot must be unique.');return;}
  }

  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='Submitting...';

  try{
    const name=document.getElementById('c-name')?document.getElementById('c-name').value.trim():'';
    const email=document.getElementById('c-email')?document.getElementById('c-email').value.trim():'';

    // Calculate score updates
    const scoreUpdates={};
    nominations.forEach(function(n){
      if(n.nomination){
        const key=n.nomination.trim();
        scoreUpdates['scores.'+key]=(scoreUpdates['scores.'+key]||0)+n.points;
      }
    });

    // Build increment updates
    const updates={responseCount:increment(1),updatedAt:serverTimestamp()};
    Object.keys(scoreUpdates).forEach(function(k){updates[k]=increment(scoreUpdates[k]);});
    await updateDoc(doc(db,'awards',AID),updates);

    await addDoc(collection(db,'awards',AID,'responses'),{
      formId:AID,formTitle:aData.title,
      name,email,nominations,submittedAt:serverTimestamp()
    });

    document.getElementById('award-body')?.style;
    document.querySelector('.award-body').style.display='none';
    document.getElementById('thankyou').style.display='block';
  }catch(e){
    console.error(e);btn.disabled=false;btn.textContent='Submit Nominations 🏆';
    alert('Error: '+e.message);
  }
};

function showError(msg){document.getElementById('loading-screen').innerHTML='<div style="text-align:center;padding:40px;"><div style="font-size:48px;margin-bottom:16px;">😕</div><div style="font-size:18px;font-weight:700;margin-bottom:8px;">Oops!</div><div style="font-size:14px;color:#7a7a8c;">'+msg+'</div><a href="/dashboard/" style="display:inline-block;margin-top:20px;padding:10px 20px;background:#f59e0b;color:#fff;border-radius:8px;text-decoration:none;font-size:13px;">Go to Dashboard</a></div>';}
init();
</script>
</body>
</html>
