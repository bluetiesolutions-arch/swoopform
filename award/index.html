<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Award — SwoopForm</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="/email_notify.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--white:#fff;--border:#e2ddd6;--accent:#f59e0b;--accent-light:#fffbeb;--success:#12a872;--danger:#e5484d;--text:#1c1c2e;--muted:#7a7a8c;--muted2:#c5c0b8;--font:'Sora',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
header{height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50;}
.brand{font-size:15px;font-weight:700;color:var(--accent);}
.main{max-width:680px;margin:0 auto;padding:36px 20px;}
.award-card{background:var(--white);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.award-hero{padding:32px;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;}
.award-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;opacity:0.8;margin-bottom:8px;}
.award-title{font-size:26px;font-weight:700;margin-bottom:6px;line-height:1.3;}
.award-edition{font-size:14px;opacity:0.85;margin-bottom:8px;}
.award-desc{font-size:13px;opacity:0.8;line-height:1.6;margin-bottom:12px;}
.award-meta{display:flex;gap:16px;font-size:12px;opacity:0.8;flex-wrap:wrap;}
.award-body{padding:28px;}
.collect-section{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:24px;}
.collect-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:12px;}
.collect-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.nom-inp{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--white);font-family:var(--font);font-size:13px;color:var(--text);outline:none;transition:border-color .2s;}
.nom-inp:focus{border-color:var(--accent);}
.nom-inp::placeholder{color:var(--muted2);}
.nom-inp.error{border-color:var(--danger);}
.category-section{margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border);}
.category-section:last-of-type{border-bottom:none;}
.cat-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.cat-badge{padding:5px 14px;border-radius:20px;background:var(--accent-light);color:#92400e;font-size:12px;font-weight:700;}
.cat-name{font-size:17px;font-weight:700;}
.rank-field{margin-bottom:12px;}
.rank-label{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.rank-icon{width:26px;height:26px;border-radius:7px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rank-name{font-size:13px;font-weight:600;flex:1;}
.rank-pts-badge{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--accent-light);color:#92400e;font-weight:600;}
.submit-btn{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px;}
.submit-btn:hover{opacity:0.9;transform:translateY(-1px);}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.leaderboard-section{margin-top:28px;border-top:1px solid var(--border);padding-top:20px;display:none;}
.lb-cat-title{font-size:14px;font-weight:700;margin-bottom:12px;margin-top:20px;display:flex;align-items:center;gap:8px;}
.lb-cat-title:first-child{margin-top:0;}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:10px;margin-bottom:6px;}
.lb-row.top{background:var(--accent-light);border:1px solid rgba(245,158,11,0.2);}
.lb-rank{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.lb-name{flex:1;font-size:13px;font-weight:600;}
.lb-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.lb-bar{height:100%;border-radius:3px;background:var(--accent);}
.lb-score{font-size:13px;font-weight:800;color:var(--accent);font-family:monospace;min-width:50px;text-align:right;}
.thankyou{display:none;padding:40px 28px;}
.ty-icon{font-size:56px;margin-bottom:16px;animation:pop .5s ease;}
@keyframes pop{0%{transform:scale(0.5);opacity:0}80%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.ty-title{font-size:22px;font-weight:700;margin-bottom:8px;}
.ty-msg{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:24px;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.award-hero,.award-body{padding:20px;}.main{padding:20px 16px;}.collect-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted);">Loading award...</div>
</div>

<div id="app" style="display:none;">
  <header>
    <div class="brand">SwoopForm</div>
    <span style="font-size:12px;color:var(--muted);">Awards & Nominations</span>
  </header>
  <div class="main">
    <div class="award-card">
      <div class="award-hero">
        <div class="award-tag" id="a-tag">Award</div>
        <div class="award-title" id="a-title">Loading...</div>
        <div class="award-edition" id="a-edition"></div>
        <div class="award-desc" id="a-desc"></div>
        <div class="award-meta">
          <span id="a-responses">0 nominations</span>
          <span id="a-deadline"></span>
          <span id="a-organizer"></span>
        </div>
      </div>
      <div class="award-body" id="award-body">
        <div class="collect-section" id="collect-section" style="display:none;">
          <div class="collect-title">Your Details</div>
          <div class="collect-grid">
            <input class="nom-inp" id="c-name" placeholder="Your name">
            <input class="nom-inp" id="c-email" type="email" placeholder="your@email.com">
          </div>
        </div>
        <div id="categories-wrap"></div>
        <button class="submit-btn" id="submit-btn" onclick="submitNominations()">Submit All Nominations 🏆</button>
        <div class="leaderboard-section" id="lb-section">
          <div style="font-size:16px;font-weight:700;margin-bottom:16px;">🏆 Live Leaderboard</div>
          <div id="lb-wrap"></div>
        </div>
      </div>
      <div class="thankyou" id="thankyou">
        <div class="ty-icon">🏆</div>
        <div class="ty-title" id="ty-title">Thank you!</div>
        <div class="ty-msg" id="ty-msg"></div>
        <div style="font-size:16px;font-weight:700;margin-bottom:16px;">🏆 Current Standings</div>
        <div id="ty-lb-wrap"></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,doc,getDoc,addDoc,updateDoc,collection,increment,onSnapshot,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);
const db=getFirestore(app);

const params=new URLSearchParams(window.location.search);
const AID=params.get('id');
let aData=null;

async function init(){
  if(!AID){showError('No award ID in URL.');return;}
  try{
    const snap=await getDoc(doc(db,'awards',AID));
    if(!snap.exists()){showError('Award not found.');return;}
    aData=snap.data();
    if(aData.accepting===false){showError('This award is closed.');return;}
    render();
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('app').style.display='block';
    onSnapshot(doc(db,'awards',AID),function(snap){
      if(snap.exists()){
        aData=snap.data();
        const rc=aData.responseCount||0;
        document.getElementById('a-responses').textContent=rc+' nomination'+(rc!==1?'s':'');
        renderLeaderboard(aData.scores||{},'lb-wrap');
        renderLeaderboard(aData.scores||{},'ty-lb-wrap');
      }
    });
  }catch(e){console.error(e);showError('Failed to load.');}
}

function render(){
  const d=aData;
  document.title=(d.title||'Award')+' — SwoopForm';
  document.getElementById('a-tag').textContent=d.edition||'Award';
  document.getElementById('a-title').textContent=d.title||'';
  document.getElementById('a-edition').textContent=d.edition||'';
  document.getElementById('a-desc').textContent=d.description||'';
  if(d.deadline)document.getElementById('a-deadline').textContent='📅 Closes '+d.deadline;
  if(d.organizer)document.getElementById('a-organizer').textContent='🏢 '+d.organizer;
  if(d.collectInfo)document.getElementById('collect-section').style.display='block';
  if(d.showLive)document.getElementById('lb-section').style.display='block';
  document.getElementById('ty-title').textContent=d.thankYouHeading||'Thank you! 🏆';
  document.getElementById('ty-msg').textContent=d.thankYouMessage||'Your nominations have been recorded.';
  renderCategories(d.categories||[]);
  renderLeaderboard(d.scores||{},'lb-wrap');
}

function renderCategories(categories){
  const placeholder=aData.placeholder||'Type a name...';
  const rankEmojis={1:'🥇',2:'🥈',3:'🥉'};
  document.getElementById('categories-wrap').innerHTML=categories.map(function(cat,ci){
    return '<div class="category-section">'
      +'<div class="cat-header"><span class="cat-badge">Category '+(ci+1)+'</span><span class="cat-name">'+cat.name+'</span></div>'
      +(cat.ranks||[]).map(function(r,ri){
        return '<div class="rank-field">'
          +'<div class="rank-label">'
          +'<div class="rank-icon">'+(rankEmojis[r.rank]||r.rank)+'</div>'
          +'<span class="rank-name">'+r.label+'</span>'
          +'<span class="rank-pts-badge">'+r.points+' pts</span>'
          +'</div>'
          +'<input class="nom-inp" id="nom_'+ci+'_'+ri+'" placeholder="'+placeholder+'" autocomplete="off">'
          +'</div>';
      }).join('')
      +'</div>';
  }).join('');
}

function renderLeaderboard(scores,wrapId){
  const wrap=document.getElementById(wrapId);
  if(!wrap)return;
  const categories=aData.categories||[];
  if(Object.keys(scores).length===0){wrap.innerHTML='<div style="text-align:center;font-size:13px;color:var(--muted);padding:16px;">No nominations yet</div>';return;}
  const rankEmojis=['🥇','🥈','🥉'];
  const rankColors=['#f59e0b','#9ca3af','#b45309'];
  wrap.innerHTML=categories.map(function(cat){
    const catScores=scores[cat.id]||{};
    const entries=Object.entries(catScores).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
    if(entries.length===0)return '';
    const maxScore=entries[0][1]||1;
    return '<div class="lb-cat-title">📂 '+cat.name+'</div>'
      +entries.map(function(e,i){
        const pct=Math.round(e[1]/maxScore*100);
        return '<div class="lb-row'+(i===0?' top':'')+'">'
          +'<div class="lb-rank" style="background:'+(rankColors[i]||'var(--surface2)')+';color:'+(i<3?'#fff':'var(--muted)')+';">'+(rankEmojis[i]||i+1)+'</div>'
          +'<div class="lb-name">'+e[0]+'</div>'
          +'<div class="lb-bar-wrap"><div class="lb-bar" style="width:'+pct+'%"></div></div>'
          +'<div class="lb-score">'+e[1]+' pts</div>'
          +'</div>';
      }).join('');
  }).join('');
}

window.submitNominations=async function(){
  const categories=aData.categories||[];
  let valid=true;
  const allNominations=[];

  categories.forEach(function(cat,ci){
    const catNoms=[];
    (cat.ranks||[]).forEach(function(r,ri){
      const inp=document.getElementById('nom_'+ci+'_'+ri);
      const val=inp?inp.value.trim():'';
      if(aData.allRequired&&!val){if(inp)inp.classList.add('error');valid=false;}
      else if(inp)inp.classList.remove('error');
      catNoms.push({rank:r.rank,label:r.label,points:r.points,nomination:val});
    });

    // Check dupes within category
    if(!aData.allowDupes){
      const vals=catNoms.map(function(n){return n.nomination.toLowerCase();}).filter(Boolean);
      const unique=new Set(vals);
      if(unique.size!==vals.length){toast('Duplicate nominations not allowed in "'+cat.name+'"');valid=false;}
    }
    allNominations.push({categoryId:cat.id,categoryName:cat.name,nominations:catNoms});
  });

  const hasAny=allNominations.some(function(c){return c.nominations.some(function(n){return n.nomination;});});
  if(!hasAny){alert('Please enter at least one nomination.');return;}
  if(!valid)return;

  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='Submitting...';

  try{
    const name=document.getElementById('c-name')?document.getElementById('c-name').value.trim():'';
    const email=document.getElementById('c-email')?document.getElementById('c-email').value.trim():'';

    // Build score updates
    const updates={responseCount:increment(1),updatedAt:serverTimestamp()};
    allNominations.forEach(function(cat){
      cat.nominations.forEach(function(n){
        if(n.nomination){
          const key='scores.'+cat.categoryId+'.'+n.nomination;
          updates[key]=increment(n.points);
        }
      });
    });

    await updateDoc(doc(db,'awards',AID),updates);
    const ownerId=formData.userId;
    if(ownerId){const rl=await checkResponseLimit(db,ownerId);if(!rl.allowed){showResponseLimitError(rl.count,rl.limit);return;}}
    await addDoc(collection(db,'awards',AID,'responses'),{
      formId:AID,formTitle:aData.title,
      name,email,categories:allNominations,
      submittedAt:serverTimestamp()
    });

    document.getElementById('award-body').style.display='none';
    document.getElementById('thankyou').style.display='block';
    renderLeaderboard(aData.scores||{},'ty-lb-wrap');
  }catch(e){
    console.error(e);btn.disabled=false;btn.textContent='Submit All Nominations 🏆';
    alert('Error: '+e.message);
  }
};

function showError(msg){document.getElementById('loading-screen').innerHTML='<div style="text-align:center;padding:40px;"><div style="font-size:48px;margin-bottom:16px;">😕</div><div style="font-size:18px;font-weight:700;margin-bottom:8px;">Oops!</div><div style="font-size:14px;color:#7a7a8c;">'+msg+'</div><a href="/dashboard/" style="display:inline-block;margin-top:20px;padding:10px 20px;background:#f59e0b;color:#fff;border-radius:8px;text-decoration:none;font-size:13px;">Go to Dashboard</a></div>';}
init();

async function checkResponseLimit(db, ownerId){
  try{
    const {collection,query,where,getDocs,Timestamp}=await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    // Get start of current month
    const now=new Date();
    const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
    const monthTs={seconds:Math.floor(monthStart.getTime()/1000),nanoseconds:0};
    // Get owner's plan
    const {doc,getDoc}=await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    const userSnap=await getDoc(doc(db,'users',ownerId));
    const userData=userSnap.exists()?userSnap.data():{plan:'free'};
    const plan=userData.plan||'free';
    const LIMITS={free:100,starter:1000,pro:-1,business:-1,student:-1,educator:-1,ngo:-1};
    const limit=LIMITS[plan]??100;
    if(limit===-1)return{allowed:true,count:0,limit:-1};
    // Count responses this month across all response collections
    const RESP_COLS=['surveyResponses','pollResponses','votingResponses','pledgeResponses','riddleResponses'];
    let total=0;
    for(const col of RESP_COLS){
      try{
        const snap=await getDocs(query(collection(db,col),where('ownerId','==',ownerId)));
        // Filter by this month client-side (simpler than composite index)
        snap.forEach(function(d){
          const ts=d.data().createdAt?.seconds||0;
          if(ts>=monthTs.seconds)total++;
        });
      }catch(e){}
    }
    // Also check subcollection responses (assessment, feedback, lead, registration, employee, product, award, jobapp)
    const SUB_COLS=['assessments','feedbacks','leads','registrations','employees','products','awards','jobapps'];
    for(const col of SUB_COLS){
      try{
        const formsSnap=await getDocs(query(collection(db,col),where('userId','==',ownerId)));
        for(const formDoc of formsSnap.docs){
          const rSnap=await getDocs(collection(db,col,formDoc.id,'responses'));
          rSnap.forEach(function(d){
            const ts=d.data().createdAt?.seconds||0;
            if(ts>=monthTs.seconds)total++;
          });
        }
      }catch(e){}
    }
    return{allowed:total<limit,count:total,limit};
  }catch(e){return{allowed:true,count:0,limit:-1};}
}

function showResponseLimitError(count, limit){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;font-family:Sora,sans-serif;';
  overlay.innerHTML=`<div style="background:#fff;border-radius:20px;padding:32px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);">
    <div style="font-size:48px;margin-bottom:16px;">📊</div>
    <div style="font-size:20px;font-weight:800;color:#0f0e1a;margin-bottom:8px;">Form temporarily unavailable</div>
    <div style="font-size:14px;color:#64748b;margin-bottom:20px;line-height:1.6;">This form has reached its monthly response limit. The owner needs to upgrade their plan to continue collecting responses.</div>
    <div style="background:#f5f0e8;border-radius:10px;padding:14px;margin-bottom:20px;">
      <div style="font-size:13px;color:#64748b;">Monthly responses used</div>
      <div style="font-size:22px;font-weight:800;color:#e5484d;margin-top:4px;">${count} / ${limit}</div>
    </div>
    <a href="/" style="display:block;padding:12px;border-radius:10px;background:linear-gradient(135deg,#2d1b69,#7c3aed);color:#fff;font-size:14px;font-weight:700;text-decoration:none;">← Back to SwoopForm</a>
  </div>`;
  document.body.appendChild(overlay);
}
</script>
</body>
</html>
