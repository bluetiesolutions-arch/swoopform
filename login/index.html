<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwoopForm — Sign in</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#F5F0E8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(15,14,26,0.08);border:1.5px solid #E2DAD0}
    .logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center;text-decoration:none}
    .logo-mark{width:36px;height:36px;background:linear-gradient(135deg,#2D1B69,#D97706);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.95rem;color:#fff}
    .logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:#0F0E1A}
    .title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;letter-spacing:-0.02em;color:#0F0E1A;margin-bottom:6px;text-align:center}
    .subtitle{font-size:0.85rem;color:#64748B;text-align:center;margin-bottom:28px}
    .btn-google{width:100%;padding:12px 16px;border-radius:10px;border:1.5px solid #E2DAD0;background:#fff;color:#0F0E1A;font-size:0.9rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;margin-bottom:20px}
    .btn-google:hover{border-color:#2D1B69;background:#F5F0E8}
    .btn-google:disabled{opacity:0.6;cursor:not-allowed}
    .google-icon{width:20px;height:20px;flex-shrink:0}
    .divider{display:flex;align-items:center;gap:12px;margin-bottom:20px}
    .divider-line{flex:1;height:1px;background:#E2DAD0}
    .divider-text{font-size:0.75rem;color:#94A3B8;font-weight:600;white-space:nowrap}
    .field{margin-bottom:14px}
    .field-label{display:block;font-size:0.75rem;font-weight:700;color:#64748B;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:5px}
    .field-input{width:100%;padding:11px 14px;border-radius:9px;border:1.5px solid #E2DAD0;background:#fff;color:#0F0E1A;font-size:0.9rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s}
    .field-input:focus{border-color:#2D1B69}
    .field-input.error{border-color:#DC2626;background:#FFF5F5}
    .field-error{font-size:0.72rem;color:#DC2626;margin-top:4px;display:none}
    .field-error.show{display:block}
    .field-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
    .forgot-link{font-size:0.75rem;color:#2D1B69;font-weight:600;text-decoration:none;cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif}
    .forgot-link:hover{text-decoration:underline}
    .remember-row{display:flex;align-items:center;gap:8px;margin-bottom:18px}
    .remember-cb{width:16px;height:16px;border-radius:4px;border:1.5px solid #E2DAD0;cursor:pointer;accent-color:#2D1B69}
    .remember-label{font-size:0.82rem;color:#64748B;cursor:pointer}
    .btn-submit{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,#2D1B69,#D97706);color:#fff;font-size:0.95rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity 0.2s;margin-bottom:16px}
    .btn-submit:hover{opacity:0.9}
    .btn-submit:disabled{opacity:0.5;cursor:not-allowed}
    .toggle-row{text-align:center;font-size:0.85rem;color:#64748B}
    .toggle-btn{color:#2D1B69;font-weight:700;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.85rem}
    .toggle-btn:hover{text-decoration:underline}
    .error-banner{background:#FEE2E2;border:1.5px solid #FCA5A5;border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:0.82rem;color:#DC2626;display:none;line-height:1.5}
    .error-banner.show{display:block}
    .success-banner{background:#DCFCE7;border:1.5px solid #86EFAC;border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:0.82rem;color:#166534;display:none;line-height:1.5}
    .success-banner.show{display:block}
    .loading-spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;margin-right:8px;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    .back-home{display:block;text-align:center;margin-top:20px;font-size:0.78rem;color:#94A3B8;text-decoration:none}
    .back-home:hover{color:#2D1B69}
    @media(max-width:480px){
      .card{padding:28px 20px}
      .title{font-size:1.2rem}
    }
  </style>
</head>
<body>
<div class="card">
  <a href="/" class="logo-wrap">
    <div class="logo-mark">S</div>
    <div class="logo-name">SwoopForm</div>
  </a>

  <div class="title" id="card-title">Welcome back</div>
  <div class="subtitle" id="card-subtitle">Sign in to your account to continue</div>

  <div class="error-banner" id="error-banner"></div>
  <div class="success-banner" id="success-banner"></div>

  <!-- GOOGLE -->
  <button class="btn-google" id="btn-google" onclick="signInGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">or continue with email</div>
    <div class="divider-line"></div>
  </div>

  <!-- SIGNUP FIELDS (hidden by default) -->
  <div id="name-field" style="display:none">
    <div class="field">
      <label class="field-label">Full name</label>
      <input class="field-input" id="inp-name" type="text" placeholder="Your full name" autocomplete="name">
      <div class="field-error" id="err-name">Please enter your name</div>
    </div>
  </div>

  <!-- EMAIL -->
  <div class="field">
    <label class="field-label">Email address</label>
    <input class="field-input" id="inp-email" type="email" placeholder="you@example.com" autocomplete="email">
    <div class="field-error" id="err-email">Please enter a valid email</div>
  </div>

  <!-- PASSWORD -->
  <div class="field">
    <div class="field-row">
      <label class="field-label" style="margin:0">Password</label>
      <button class="forgot-link" id="forgot-btn" onclick="showForgot()" type="button">Forgot password?</button>
    </div>
    <input class="field-input" id="inp-password" type="password" placeholder="••••••••" autocomplete="current-password">
    <div class="field-error" id="err-password">Password must be at least 6 characters</div>
  </div>

  <!-- CONFIRM PASSWORD (signup only) -->
  <div id="confirm-field" style="display:none">
    <div class="field">
      <label class="field-label">Confirm password</label>
      <input class="field-input" id="inp-confirm" type="password" placeholder="••••••••">
      <div class="field-error" id="err-confirm">Passwords do not match</div>
    </div>
  </div>

  <!-- REMEMBER ME (login only) -->
  <div class="remember-row" id="remember-row">
    <input class="remember-cb" type="checkbox" id="remember-me">
    <label class="remember-label" for="remember-me">Remember me on this device</label>
  </div>

  <button class="btn-submit" id="btn-submit" onclick="handleSubmit()">Sign in</button>

  <div class="toggle-row" id="toggle-row">
    Don't have an account?
    <button class="toggle-btn" onclick="toggleMode()">Create one free</button>
  </div>
</div>

<a href="/" class="back-home">← Back to swoopform.com</a>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,signInWithPopup,GoogleAuthProvider,sendPasswordResetEmail,updateProfile,setPersistence,browserLocalPersistence,browserSessionPersistence,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import{getFirestore,doc,setDoc,getDoc,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);
const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();

let isSignUp=false;

// If already logged in go to dashboard
onAuthStateChanged(auth,u=>{if(u)window.location.href='/dashboard'});

// ERROR MESSAGES — human friendly
function friendlyError(code){
  const map={
    'auth/user-not-found':'No account found with this email. Want to create one?',
    'auth/wrong-password':'Incorrect password. Please try again or reset your password.',
    'auth/invalid-email':'Please enter a valid email address.',
    'auth/email-already-in-use':'An account with this email already exists. Try signing in instead.',
    'auth/weak-password':'Password is too weak. Use at least 6 characters.',
    'auth/too-many-requests':'Too many attempts. Please wait a moment and try again.',
    'auth/network-request-failed':'Connection error. Please check your internet and try again.',
    'auth/popup-closed-by-user':'Google sign in was cancelled. Please try again.',
    'auth/invalid-credential':'Incorrect email or password. Please try again.',
  };
  return map[code]||'Something went wrong. Please try again.';
}

function showError(msg){
  const el=document.getElementById('error-banner');
  el.textContent=msg;el.classList.add('show');
  document.getElementById('success-banner').classList.remove('show');
}
function showSuccess(msg){
  const el=document.getElementById('success-banner');
  el.textContent=msg;el.classList.add('show');
  document.getElementById('error-banner').classList.remove('show');
}
function clearMessages(){
  document.getElementById('error-banner').classList.remove('show');
  document.getElementById('success-banner').classList.remove('show');
}
function setLoading(loading){
  const btn=document.getElementById('btn-submit');
  const gBtn=document.getElementById('btn-google');
  if(loading){
    btn.disabled=true;
    btn.innerHTML='<span class="loading-spinner"></span>'+(isSignUp?'Creating account...':'Signing in...');
    gBtn.disabled=true;
  } else {
    btn.disabled=false;
    btn.textContent=isSignUp?'Create account':'Sign in';
    gBtn.disabled=false;
  }
}

function validate(){
  let valid=true;
  clearMessages();
  // Name (signup only)
  if(isSignUp){
    const name=document.getElementById('inp-name').value.trim();
    const nameErr=document.getElementById('err-name');
    const nameInp=document.getElementById('inp-name');
    if(!name){nameInp.classList.add('error');nameErr.classList.add('show');valid=false}
    else{nameInp.classList.remove('error');nameErr.classList.remove('show')}
  }
  // Email
  const email=document.getElementById('inp-email').value.trim();
  const emailErr=document.getElementById('err-email');
  const emailInp=document.getElementById('inp-email');
  if(!email||!email.includes('@')){emailInp.classList.add('error');emailErr.classList.add('show');valid=false}
  else{emailInp.classList.remove('error');emailErr.classList.remove('show')}
  // Password
  const pass=document.getElementById('inp-password').value;
  const passErr=document.getElementById('err-password');
  const passInp=document.getElementById('inp-password');
  if(!pass||pass.length<6){passInp.classList.add('error');passErr.classList.add('show');valid=false}
  else{passInp.classList.remove('error');passErr.classList.remove('show')}
  // Confirm (signup only)
  if(isSignUp){
    const confirm=document.getElementById('inp-confirm').value;
    const confirmErr=document.getElementById('err-confirm');
    const confirmInp=document.getElementById('inp-confirm');
    if(confirm!==pass){confirmInp.classList.add('error');confirmErr.classList.add('show');valid=false}
    else{confirmInp.classList.remove('error');confirmErr.classList.remove('show')}
  }
  return valid;
}

window.handleSubmit=async function(){
  if(!validate())return;
  setLoading(true);
  const email=document.getElementById('inp-email').value.trim();
  const pass=document.getElementById('inp-password').value;
  const remember=document.getElementById('remember-me').checked;
  try{
    // Set persistence based on remember me
    await setPersistence(auth,remember?browserLocalPersistence:browserSessionPersistence);
    if(isSignUp){
      const name=document.getElementById('inp-name').value.trim();
      const cred=await createUserWithEmailAndPassword(auth,email,pass);
      await updateProfile(cred.user,{displayName:name});
      await setDoc(doc(db,'users',cred.user.uid),{name,email,plan:'free',role:'user',createdAt:serverTimestamp(),notificationPref:'instant'});
      window.location.href='/dashboard';
    } else {
      await signInWithEmailAndPassword(auth,email,pass);
      window.location.href='/dashboard';
    }
  }catch(e){
    setLoading(false);
    showError(friendlyError(e.code));
  }
}

window.signInGoogle=async function(){
  clearMessages();
  document.getElementById('btn-google').disabled=true;
  document.getElementById('btn-google').innerHTML='<span class="loading-spinner" style="border-color:rgba(0,0,0,0.2);border-top-color:#2D1B69"></span>Connecting...';
  try{
    const remember=document.getElementById('remember-me').checked;
    await setPersistence(auth,remember?browserLocalPersistence:browserSessionPersistence);
    const result=await signInWithPopup(auth,provider);
    const user=result.user;
    // Create user doc if first time
    const snap=await getDoc(doc(db,'users',user.uid));
    if(!snap.exists()){
      await setDoc(doc(db,'users',user.uid),{
        name:user.displayName||'',
        email:user.email||'',
        photoURL:user.photoURL||'',
        plan:'free',role:'user',
        createdAt:serverTimestamp(),
        notificationPref:'instant'
      });
    }
    window.location.href='/dashboard';
  }catch(e){
    document.getElementById('btn-google').disabled=false;
    document.getElementById('btn-google').innerHTML='<svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Continue with Google';
    if(e.code!=='auth/popup-closed-by-user')showError(friendlyError(e.code));
  }
}

window.showForgot=async function(){
  const email=document.getElementById('inp-email').value.trim();
  if(!email||!email.includes('@')){
    document.getElementById('inp-email').focus();
    document.getElementById('inp-email').classList.add('error');
    showError('Please enter your email address first, then click Forgot password.');
    return;
  }
  try{
    await sendPasswordResetEmail(auth,email,{url:window.location.origin+'/login'});
    showSuccess('✅ Password reset email sent to '+email+'. Check your inbox (and spam folder).');
  }catch(e){showError(friendlyError(e.code))}
}

window.toggleMode=function(){
  isSignUp=!isSignUp;
  clearMessages();
  document.getElementById('card-title').textContent=isSignUp?'Create your account':'Welcome back';
  document.getElementById('card-subtitle').textContent=isSignUp?'Free forever. No credit card needed.':'Sign in to your account to continue';
  document.getElementById('btn-submit').textContent=isSignUp?'Create account':'Sign in';
  document.getElementById('name-field').style.display=isSignUp?'block':'none';
  document.getElementById('confirm-field').style.display=isSignUp?'block':'none';
  document.getElementById('remember-row').style.display=isSignUp?'none':'flex';
  document.getElementById('forgot-btn').style.display=isSignUp?'none':'block';
  document.getElementById('toggle-row').innerHTML=isSignUp?'Already have an account? <button class="toggle-btn" onclick="toggleMode()">Sign in</button>':'Don\'t have an account? <button class="toggle-btn" onclick="toggleMode()">Create one free</button>';
  // Clear all inputs
  ['inp-name','inp-email','inp-password','inp-confirm'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';el&&el.classList.remove('error');
  });
}

// Enter key submit
document.addEventListener('keydown',e=>{if(e.key==='Enter')window.handleSubmit()});
</script>
</body>
</html>
