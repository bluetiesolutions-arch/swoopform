<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwoopForm — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'DM Sans',sans-serif;
      background:#0F0E1A;
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .card{
      background:#1A1828;
      border:1.5px solid rgba(255,255,255,0.08);
      border-radius:20px;
      padding:40px;
      width:100%;
      max-width:420px;
    }
    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:32px;
      text-decoration:none;
    }
    .logo-mark{
      width:36px;
      height:36px;
      background:linear-gradient(135deg,#2D1B69,#D97706);
      border-radius:9px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Syne',sans-serif;
      font-weight:800;
      font-size:1rem;
    }
    .logo-name{
      font-family:'Syne',sans-serif;
      font-weight:800;
      font-size:1.1rem;
      color:#fff;
    }
    h1{
      font-family:'Syne',sans-serif;
      font-weight:800;
      font-size:1.6rem;
      letter-spacing:-0.03em;
      margin-bottom:6px;
    }
    .subtitle{
      color:rgba(255,255,255,0.5);
      font-size:0.9rem;
      margin-bottom:28px;
    }
    .field{
      margin-bottom:16px;
    }
    label{
      display:block;
      font-size:0.82rem;
      font-weight:600;
      color:rgba(255,255,255,0.6);
      margin-bottom:6px;
      letter-spacing:0.04em;
      text-transform:uppercase;
    }
    input{
      width:100%;
      padding:13px 16px;
      border-radius:10px;
      border:1.5px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.05);
      color:#fff;
      font-size:0.95rem;
      font-family:'DM Sans',sans-serif;
      transition:border-color 0.2s;
    }
    input:focus{
      outline:none;
      border-color:#D97706;
    }
    input::placeholder{color:rgba(255,255,255,0.25)}
    .btn-primary{
      width:100%;
      padding:14px;
      border-radius:10px;
      border:none;
      background:linear-gradient(135deg,#2D1B69,#D97706);
      color:#fff;
      font-size:1rem;
      font-weight:600;
      font-family:'DM Sans',sans-serif;
      cursor:pointer;
      margin-top:8px;
      transition:opacity 0.2s;
    }
    .btn-primary:hover{opacity:0.9}
    .divider{
      display:flex;
      align-items:center;
      gap:12px;
      margin:20px 0;
      color:rgba(255,255,255,0.2);
      font-size:0.82rem;
    }
    .divider::before,.divider::after{
      content:'';
      flex:1;
      height:1px;
      background:rgba(255,255,255,0.08);
    }
    .btn-google{
      width:100%;
      padding:13px;
      border-radius:10px;
      border:1.5px solid rgba(255,255,255,0.1);
      background:transparent;
      color:#fff;
      font-size:0.95rem;
      font-weight:500;
      font-family:'DM Sans',sans-serif;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      transition:border-color 0.2s,background 0.2s;
    }
    .btn-google:hover{
      border-color:rgba(255,255,255,0.25);
      background:rgba(255,255,255,0.05);
    }
    .google-icon{
      width:18px;
      height:18px;
    }
    .footer-text{
      text-align:center;
      margin-top:24px;
      font-size:0.87rem;
      color:rgba(255,255,255,0.4);
    }
    .footer-text a{
      color:#D97706;
      text-decoration:none;
      font-weight:600;
    }
    .error{
      background:rgba(239,68,68,0.1);
      border:1px solid rgba(239,68,68,0.3);
      color:#FCA5A5;
      padding:10px 14px;
      border-radius:8px;
      font-size:0.85rem;
      margin-bottom:16px;
      display:none;
    }
    .tabs{
      display:flex;
      background:rgba(255,255,255,0.05);
      border-radius:10px;
      padding:4px;
      margin-bottom:28px;
    }
    .tab{
      flex:1;
      padding:8px;
      text-align:center;
      border-radius:7px;
      font-size:0.88rem;
      font-weight:600;
      cursor:pointer;
      color:rgba(255,255,255,0.4);
      transition:all 0.2s;
      border:none;
      background:transparent;
      font-family:'DM Sans',sans-serif;
    }
    .tab.active{
      background:rgba(255,255,255,0.1);
      color:#fff;
    }
  </style>
</head>
<body>
  <div class="card">

    <a href="/" class="logo">
      <div class="logo-mark">S</div>
      <div class="logo-name">SwoopForm</div>
    </a>

    <div class="tabs">
      <button class="tab active" onclick="showTab('login')">Log in</button>
      <button class="tab" onclick="showTab('signup')">Sign up</button>
    </div>

    <div id="error" class="error"></div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <h1>Welcome back</h1>
      <p class="subtitle">Log in to your SwoopForm account</p>

      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Your password">
      </div>
      <button class="btn-primary" onclick="handleLogin()">Log in →</button>

      <div class="divider">or</div>

      <button class="btn-google" onclick="handleGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signup-form" style="display:none">
      <h1>Create account</h1>
      <p class="subtitle">Start building surveys for free</p>

      <div class="field">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="Your name">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min 8 characters">
      </div>
      <button class="btn-primary" onclick="handleSignup()">Create account →</button>

      <div class="divider">or</div>

      <button class="btn-google" onclick="handleGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <p class="footer-text">
      By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
    </p>

  </div>

  <script>
    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
      document.getElementById('error').style.display = 'none';
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function handleLogin() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      if (!email || !password) {
        showError('Please fill in all fields');
        return;
      }
      // Firebase auth will go here
      alert('Firebase login coming next step!');
    }

    function handleSignup() {
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      if (!name || !email || !password) {
        showError('Please fill in all fields');
        return;
      }
      if (password.length < 8) {
        showError('Password must be at least 8 characters');
        return;
      }
      // Firebase auth will go here
      alert('Firebase signup coming next step!');
    }

    function handleGoogle() {
      // Firebase Google auth will go here
      alert('Firebase Google login coming next step!');
    }
  </script>
</body>
</html>
