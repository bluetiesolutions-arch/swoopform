<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — SwoopForm</title>
<meta name="description" content="Tips, guides and insights on forms, surveys, live quizzes and audience engagement.">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f0e8;--surface:#fff;--border:#e2dad0;--accent:#2d1b69;--accent2:#7c3aed;--text:#0f0e1a;--muted:#64748b;--muted2:#94a3b8;--font:'Sora',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(245,240,232,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-nm{font-weight:800;font-size:18px;color:var(--text);}
.nav-link{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;transition:all .15s;}
.nav-link:hover{color:var(--text);}
.btn-primary{padding:9px 20px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;text-decoration:none;}

/* HERO */
.hero{padding:64px 40px 48px;text-align:center;max-width:700px;margin:0 auto;}
.hero-badge{display:inline-block;padding:4px 14px;border-radius:100px;background:rgba(45,27,105,.06);border:1px solid rgba(45,27,105,.12);color:var(--accent);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px;}
.hero-title{font-size:clamp(2rem,5vw,3.2rem);font-weight:800;letter-spacing:-.04em;margin-bottom:12px;line-height:1.15;}
.hero-sub{font-size:16px;color:var(--muted);line-height:1.7;}

/* FEATURED */
.featured{max-width:1100px;margin:0 auto;padding:0 40px 48px;}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.featured-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;transition:all .2s;text-decoration:none;color:var(--text);}
.featured-card:hover{box-shadow:0 8px 32px rgba(45,27,105,.1);transform:translateY(-2px);border-color:#c4b5fd;}
.featured-img{background:linear-gradient(135deg,#2d1b69,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:5rem;min-height:240px;}
.featured-body{padding:32px;}
.post-cat{display:inline-block;padding:4px 12px;border-radius:100px;font-size:11px;font-weight:700;background:rgba(45,27,105,.08);color:var(--accent);margin-bottom:14px;}
.featured-title{font-size:22px;font-weight:800;letter-spacing:-.03em;line-height:1.3;margin-bottom:10px;}
.featured-excerpt{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:20px;}
.post-meta{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--muted2);}
.read-more{font-size:13px;font-weight:700;color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-top:16px;}

/* GRID */
.posts-section{max-width:1100px;margin:0 auto;padding:0 40px 80px;}
.posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.post-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;transition:all .2s;text-decoration:none;color:var(--text);display:flex;flex-direction:column;}
.post-card:hover{box-shadow:0 6px 24px rgba(45,27,105,.1);transform:translateY(-3px);border-color:#c4b5fd;}
.post-cover{height:140px;display:flex;align-items:center;justify-content:center;font-size:3rem;}
.post-body{padding:18px;flex:1;display:flex;flex-direction:column;}
.post-title{font-size:15px;font-weight:700;letter-spacing:-.02em;line-height:1.35;margin-bottom:8px;flex:1;}
.post-excerpt{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:14px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.post-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--bg);}
.post-author{font-size:11px;color:var(--muted2);}
.post-time{font-size:11px;color:var(--muted2);}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.4;}
.spinner{width:28px;height:28px;border:3px solid rgba(45,27,105,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:60px auto;display:block;}
@keyframes spin{to{transform:rotate(360deg)}}

footer{background:var(--text);color:#fff;padding:32px 40px;text-align:center;font-size:13px;color:rgba(255,255,255,.3);}
footer a{color:rgba(255,255,255,.5);text-decoration:none;margin:0 12px;}
footer a:hover{color:#fff;}

@media(max-width:768px){nav{padding:0 20px;}.hero{padding:48px 20px 32px;}.featured{padding:0 20px 32px;}.featured-card{grid-template-columns:1fr;}.featured-img{min-height:140px;font-size:3rem;}.posts-section{padding:0 20px 48px;}.posts-grid{grid-template-columns:1fr;}}
@media(max-width:1024px){.posts-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <svg width="30" height="30" viewBox="0 0 40 40" fill="none"><defs><linearGradient id="sg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#2d1b69"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#sg)"/><rect x="10" y="9" width="20" height="6" rx="3" fill="white"/><rect x="10" y="17" width="20" height="6" rx="3" fill="rgba(255,255,255,0.9)"/><rect x="10" y="25" width="20" height="6" rx="3" fill="white"/><circle cx="31" cy="12" r="3" fill="#d97706"/></svg>
    <span class="logo-nm">SwoopForm</span>
  </a>
  <div style="display:flex;align-items:center;gap:4px;">
    <a href="/" class="nav-link">Home</a>
    <a href="/discover/" class="nav-link">Discover</a>
    <a href="/pricing/" class="nav-link">Pricing</a>
  </div>
  <a href="/login/" class="btn-primary">Get started →</a>
</nav>

<div class="hero">
  <div class="hero-badge">Blog</div>
  <h1 class="hero-title">Tips, guides &amp; insights</h1>
  <p class="hero-sub">Everything you need to build better forms, run great live sessions and collect responses that matter.</p>
</div>

<div class="featured" id="featured-wrap">
  <div class="spinner"></div>
</div>

<div class="posts-section">
  <div class="section-label">All Posts</div>
  <div class="posts-grid" id="posts-grid">
    <div class="spinner" style="grid-column:1/-1;"></div>
  </div>
</div>

<footer>
  <div style="margin-bottom:12px;">
    <a href="/">Home</a><a href="/discover/">Discover</a><a href="/pricing/">Pricing</a><a href="/contact/">Contact</a>
  </div>
  © 2026 SwoopForm. All rights reserved.
</footer>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,collection,query,where,getDocs,orderBy}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);
const db=getFirestore(app);

async function load(){
  try{
    const snap=await getDocs(query(collection(db,'blogPosts'),where('status','==','published'),orderBy('publishedAt','desc')));
    const posts=snap.docs.map(function(d){return{id:d.id,...d.data()};});
    if(!posts.length){
      document.getElementById('featured-wrap').innerHTML='';
      document.getElementById('posts-grid').innerHTML='<div class="empty" style="grid-column:1/-1;"><div class="empty-icon">✍️</div><div style="font-size:16px;font-weight:700;margin-bottom:8px;">No posts yet</div><div style="font-size:13px;color:var(--muted);">Check back soon for tips and guides.</div></div>';
      return;
    }
    const featured=posts.filter(function(p){return p.featured;});
    const rest=posts.filter(function(p){return !p.featured;});
    // Featured post
    if(featured.length){
      const f=featured[0];
      document.getElementById('featured-wrap').innerHTML=
        '<div class="section-label">✨ Featured</div>'
        +'<a href="/blog/post/?id='+f.id+'" class="featured-card">'
        +'<div class="featured-img" style="background:linear-gradient(135deg,#2d1b69,#7c3aed);">'+( f.emoji||'📝')+'</div>'
        +'<div class="featured-body">'
        +(f.tags?.length?'<span class="post-cat">'+f.tags[0]+'</span>':'')
        +'<div class="featured-title">'+eh(f.title)+'</div>'
        +'<div class="featured-excerpt">'+eh(f.excerpt||'')+'</div>'
        +'<div class="post-meta"><span>✍️ '+eh(f.author||'SwoopForm')+'</span><span>⏱ '+( f.readTime||3)+' min read</span><span>'+fmtDate(f.publishedAt)+'</span></div>'
        +'<span class="read-more">Read article →</span>'
        +'</div></a>';
    }else{
      document.getElementById('featured-wrap').innerHTML='';
    }
    // All posts grid
    const allPosts=featured.slice(1).concat(rest);
    if(!allPosts.length){document.getElementById('posts-grid').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);font-size:13px;">More posts coming soon!</div>';return;}
    document.getElementById('posts-grid').innerHTML=allPosts.map(function(p){
      const grad=gradForTag(p.tags?.[0]);
      return'<a href="/blog/post/?id='+p.id+'" class="post-card">'
        +'<div class="post-cover" style="background:'+grad+';">'+( p.emoji||'📝')+'</div>'
        +'<div class="post-body">'
        +(p.tags?.length?'<span class="post-cat" style="font-size:10px;margin-bottom:8px;">'+p.tags[0]+'</span>':'')
        +'<div class="post-title">'+eh(p.title)+'</div>'
        +'<div class="post-excerpt">'+eh(p.excerpt||'')+'</div>'
        +'<div class="post-footer">'
        +'<span class="post-author">'+eh(p.author||'SwoopForm')+'</span>'
        +'<span class="post-time">'+( p.readTime||3)+' min</span>'
        +'</div>'
        +'</div></a>';
    }).join('');
  }catch(e){
    console.error(e);
    document.getElementById('featured-wrap').innerHTML='';
    document.getElementById('posts-grid').innerHTML='<div class="empty" style="grid-column:1/-1;"><div class="empty-icon">😕</div><div>Error loading posts</div></div>';
  }
}

function gradForTag(tag){
  const grads=['linear-gradient(135deg,#2d1b69,#7c3aed)','linear-gradient(135deg,#0ea5e9,#06b6d4)','linear-gradient(135deg,#10b981,#059669)','linear-gradient(135deg,#f59e0b,#d97706)','linear-gradient(135deg,#ec4899,#db2777)'];
  if(!tag)return grads[0];
  return grads[tag.length%grads.length];
}
function fmtDate(ts){if(!ts?.seconds)return'';return new Date(ts.seconds*1000).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
load();
</script>
</body>
</html>
