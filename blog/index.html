<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — SwoopForm</title>
  <meta name="description" content="Tips, guides and insights on surveys, engagement and data collection from SwoopForm.">
  <link rel="canonical" href="https://swoopform.com/blog">
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"Blog","name":"SwoopForm Blog","url":"https://swoopform.com/blog","publisher":{"@type":"Organization","name":"SwoopForm","url":"https://swoopform.com"}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#F5F0E8;color:#0F0E1A;min-height:100vh}
    nav{background:#fff;border-bottom:1.5px solid #E2DAD0;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
    .logo-mk{width:30px;height:30px;background:linear-gradient(135deg,#2D1B69,#D97706);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.85rem;color:#fff}
    .logo-nm{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:#0F0E1A}
    .nav-right{display:flex;gap:8px;align-items:center}
    .nav-btn{padding:7px 14px;border-radius:8px;border:1.5px solid #E2DAD0;background:transparent;color:#64748B;font-size:0.82rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .nav-btn:hover{border-color:#2D1B69;color:#2D1B69}
    .nav-btn.primary{background:linear-gradient(135deg,#2D1B69,#D97706);color:#fff;border:none}
    .hero{padding:60px 20px 40px;text-align:center}
    .hero-label{font-size:0.72rem;font-weight:700;color:#D97706;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px}
    .hero-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.8rem,4vw,2.8rem);letter-spacing:-0.04em;margin-bottom:12px}
    .hero-sub{font-size:0.95rem;color:#64748B;max-width:480px;margin:0 auto}
    .main{max-width:1000px;margin:0 auto;padding:32px 20px}
    .tags-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
    .tag-btn{padding:5px 14px;border-radius:100px;border:1.5px solid #E2DAD0;background:#fff;font-size:0.75rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;color:#64748B;transition:all 0.2s}
    .tag-btn:hover{border-color:#2D1B69;color:#2D1B69}
    .tag-btn.active{background:#2D1B69;border-color:#2D1B69;color:#fff}
    .featured-post{background:#fff;border-radius:20px;border:1.5px solid #E2DAD0;overflow:hidden;margin-bottom:32px;display:grid;grid-template-columns:1fr 1fr;cursor:pointer;text-decoration:none;color:#0F0E1A;transition:all 0.2s}
    .featured-post:hover{box-shadow:0 8px 32px rgba(15,14,26,0.1);transform:translateY(-2px)}
    .featured-img{background:linear-gradient(135deg,#2D1B69,#D97706);min-height:240px;display:flex;align-items:center;justify-content:center;font-size:4rem;position:relative;overflow:hidden}
    .featured-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
    .featured-body{padding:32px}
    .post-tag{display:inline-block;padding:3px 10px;border-radius:100px;background:#EDE9FF;color:#2D1B69;font-size:0.68rem;font-weight:700;margin-bottom:12px}
    .featured-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;letter-spacing:-0.03em;margin-bottom:10px;line-height:1.2}
    .featured-excerpt{font-size:0.88rem;color:#64748B;line-height:1.7;margin-bottom:16px}
    .post-meta{display:flex;align-items:center;gap:10px;font-size:0.75rem;color:#94A3B8}
    .post-author{font-weight:600;color:#64748B}
    .posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
    .post-card{background:#fff;border-radius:16px;border:1.5px solid #E2DAD0;overflow:hidden;cursor:pointer;text-decoration:none;color:#0F0E1A;transition:all 0.2s;display:block}
    .post-card:hover{box-shadow:0 6px 24px rgba(15,14,26,0.09);transform:translateY(-2px)}
    .post-card-img{height:160px;background:linear-gradient(135deg,#2D1B69,#D97706);display:flex;align-items:center;justify-content:center;font-size:2.5rem;position:relative;overflow:hidden}
    .post-card-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
    .post-card-body{padding:18px}
    .post-card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;margin-bottom:6px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    .post-card-excerpt{font-size:0.8rem;color:#64748B;line-height:1.5;margin-bottom:12px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    .post-card-footer{display:flex;align-items:center;justify-content:space-between;font-size:0.72rem;color:#94A3B8}
    .read-btn{padding:5px 12px;border-radius:7px;background:#EDE9FF;color:#2D1B69;font-size:0.72rem;font-weight:700;font-family:'DM Sans',sans-serif;border:none;cursor:pointer}
    .empty-state{text-align:center;padding:60px 20px;grid-column:1/-1}
    .empty-icon{font-size:3rem;margin-bottom:12px}
    .empty-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;margin-bottom:6px}
    .empty-sub{font-size:0.85rem;color:#64748B}
    .spinner{width:28px;height:28px;border:3px solid rgba(45,27,105,0.15);border-top-color:#2D1B69;border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    footer{background:#0F0E1A;padding:32px 20px;text-align:center;margin-top:60px}
    .footer-links{display:flex;gap:20px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
    .footer-link{font-size:0.78rem;color:rgba(255,255,255,0.35);text-decoration:none}
    .footer-link:hover{color:#fff}
    .footer-copy{font-size:0.72rem;color:rgba(255,255,255,0.2)}
    @media(max-width:700px){.featured-post{grid-template-columns:1fr}.featured-img{min-height:160px}nav{padding:0 14px}.logo-nm{display:none}.main{padding:20px 14px}}
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo"><div class="logo-mk">S</div><div class="logo-nm">SwoopForm</div></a>
  <div class="nav-right">
    <a href="/discover" class="nav-btn">Discover</a>
    <a href="/login" class="nav-btn primary">Get started →</a>
  </div>
</nav>
<div class="hero">
  <div class="hero-label">Blog</div>
  <h1 class="hero-title">Insights & guides</h1>
  <p class="hero-sub">Tips on surveys, engagement, and getting better responses from your audience.</p>
</div>
<div class="main">
  <div class="tags-row" id="tags-row"><button class="tag-btn active" onclick="setTag('',this)">All posts</button></div>
  <div id="featured-wrap"></div>
  <div class="posts-grid" id="posts-grid"><div class="spinner"></div></div>
</div>
<footer>
  <div class="footer-links">
    <a href="/" class="footer-link">Home</a><a href="/about" class="footer-link">About</a>
    <a href="/pricing" class="footer-link">Pricing</a><a href="/contact" class="footer-link">Contact</a>
    <a href="/privacy" class="footer-link">Privacy</a><a href="/terms" class="footer-link">Terms</a>
  </div>
  <div class="footer-copy">© 2024 SwoopForm. All rights reserved.</div>
</footer>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,collection,query,where,getDocs,orderBy}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);const db=getFirestore(app);
let posts=[],activeTag='';
async function init(){
  try{
    const snap=await getDocs(query(collection(db,'blogPosts'),where('status','==','published'),orderBy('publishedAt','desc')));
    posts=snap.docs.map(d=>({id:d.id,...d.data()}));
    buildTags();renderPosts();
  }catch(e){document.getElementById('posts-grid').innerHTML='<div class="empty-state"><div class="empty-icon">✍️</div><div class="empty-title">No posts yet</div><div class="empty-sub">Check back soon!</div></div>'}
}
function buildTags(){
  const tags=new Set();posts.forEach(p=>(p.tags||[]).forEach(t=>tags.add(t)));
  const row=document.getElementById('tags-row');
  tags.forEach(t=>row.innerHTML+=`<button class="tag-btn" onclick="setTag('${t}',this)">${t}</button>`);
}
window.setTag=function(tag,el){activeTag=tag;document.querySelectorAll('.tag-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderPosts()}
function renderPosts(){
  const filtered=activeTag?posts.filter(p=>(p.tags||[]).includes(activeTag)):posts;
  const featured=filtered.filter(p=>p.featured);
  const regular=filtered.filter(p=>!p.featured);
  const fw=document.getElementById('featured-wrap');
  fw.innerHTML=featured.length&&!activeTag?`<a class="featured-post" href="/blog/post/?id=${featured[0].id}"><div class="featured-img">${featured[0].coverImage?`<img src="${featured[0].coverImage}" alt="${eh(featured[0].title)}" loading="lazy">`:featured[0].emoji||'📝'}</div><div class="featured-body"><span class="post-tag">${(featured[0].tags||['General'])[0]}</span><div class="featured-title">${eh(featured[0].title)}</div><div class="featured-excerpt">${eh(featured[0].excerpt||'')}</div><div class="post-meta"><span class="post-author">${eh(featured[0].author||'SwoopForm Team')}</span><span>·</span><span>${formatDate(featured[0].publishedAt)}</span><span>·</span><span>${featured[0].readTime||'3'} min read</span></div></div></a>`:'';
  const toShow=featured.length&&!activeTag?regular:filtered;
  if(!toShow.length&&!featured.length){document.getElementById('posts-grid').innerHTML='<div class="empty-state"><div class="empty-icon">✍️</div><div class="empty-title">No posts yet</div><div class="empty-sub">Check back soon for tips and guides.</div></div>';return}
  document.getElementById('posts-grid').innerHTML=toShow.map(p=>`<a class="post-card" href="/blog/post/?id=${p.id}"><div class="post-card-img">${p.coverImage?`<img src="${p.coverImage}" alt="${eh(p.title)}" loading="lazy">`:p.emoji||'📝'}</div><div class="post-card-body"><div style="margin-bottom:6px"><span class="post-tag">${(p.tags||['General'])[0]}</span></div><div class="post-card-title">${eh(p.title)}</div><div class="post-card-excerpt">${eh(p.excerpt||'')}</div><div class="post-card-footer"><span>${formatDate(p.publishedAt)} · ${p.readTime||'3'} min</span><button class="read-btn">Read →</button></div></div></a>`).join('');
}
function formatDate(ts){if(!ts?.seconds)return'';return new Date(ts.seconds*1000).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}
function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}
init();
</script>
</body>
</html>
