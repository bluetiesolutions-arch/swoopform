<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — SwoopForm</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f0e8;--surface:#fff;--border:#e2dad0;--accent:#2d1b69;--accent2:#7c3aed;--text:#0f0e1a;--muted:#64748b;--muted2:#94a3b8;--font:'Sora',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:rgba(245,240,232,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-nm{font-weight:800;font-size:18px;color:var(--text);}
.nav-link{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;}
.nav-link:hover{color:var(--text);}
.btn-primary{padding:9px 20px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;text-decoration:none;}

/* COVER */
.cover{height:340px;background:linear-gradient(135deg,#2d1b69,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:6rem;position:relative;overflow:hidden;}
.cover::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(245,240,232,.6));}

/* ARTICLE */
.article-wrap{max-width:720px;margin:0 auto;padding:48px 24px 80px;}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;margin-bottom:28px;transition:color .15s;}
.back-link:hover{color:var(--accent);}
.post-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.post-tag{padding:4px 12px;border-radius:100px;font-size:11px;font-weight:700;background:rgba(45,27,105,.08);color:var(--accent);}
.post-title{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:800;letter-spacing:-.04em;line-height:1.15;margin-bottom:16px;}
.post-meta{display:flex;align-items:center;gap:16px;font-size:13px;color:var(--muted2);margin-bottom:32px;padding-bottom:24px;border-bottom:1.5px solid var(--border);flex-wrap:wrap;}
.post-meta-item{display:flex;align-items:center;gap:5px;}

/* MARKDOWN CONTENT */
.post-content{font-size:16px;line-height:1.8;color:#1e293b;}
.post-content h1,.post-content h2,.post-content h3{font-weight:800;letter-spacing:-.03em;margin:36px 0 14px;color:var(--text);}
.post-content h1{font-size:1.8rem;}
.post-content h2{font-size:1.4rem;}
.post-content h3{font-size:1.15rem;}
.post-content p{margin-bottom:18px;}
.post-content ul,.post-content ol{margin:0 0 18px 24px;}
.post-content li{margin-bottom:6px;}
.post-content strong{font-weight:700;color:var(--text);}
.post-content em{font-style:italic;}
.post-content a{color:var(--accent);text-decoration:underline;}
.post-content code{background:#ede9ff;color:var(--accent);padding:2px 6px;border-radius:4px;font-family:monospace;font-size:14px;}
.post-content pre{background:#1e1b2e;color:#e2e8f0;padding:20px;border-radius:12px;overflow-x:auto;margin-bottom:20px;font-family:monospace;font-size:13px;line-height:1.6;}
.post-content blockquote{border-left:4px solid var(--accent2);padding:12px 20px;background:rgba(124,58,237,.04);border-radius:0 8px 8px 0;margin-bottom:20px;color:var(--muted);font-style:italic;}
.post-content hr{border:none;border-top:1.5px solid var(--border);margin:32px 0;}
.post-content img{max-width:100%;border-radius:12px;margin-bottom:20px;}
.post-content table{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:14px;}
.post-content th{padding:10px 14px;background:var(--bg);font-weight:700;text-align:left;border-bottom:2px solid var(--border);}
.post-content td{padding:10px 14px;border-bottom:1px solid var(--border);}

/* CTA BOX */
.cta-box{background:linear-gradient(135deg,#2d1b69,#7c3aed);border-radius:16px;padding:32px;text-align:center;margin-top:48px;}
.cta-title{font-size:20px;font-weight:800;color:#fff;margin-bottom:8px;}
.cta-sub{font-size:14px;color:rgba(255,255,255,.6);margin-bottom:20px;line-height:1.6;}
.cta-btn{display:inline-block;padding:12px 28px;border-radius:10px;background:#fff;color:var(--accent);font-size:14px;font-weight:700;text-decoration:none;font-family:var(--font);}

/* RELATED */
.related{max-width:720px;margin:0 auto;padding:0 24px 80px;}
.related-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:20px;}
.related-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:16px;text-decoration:none;color:var(--text);transition:all .2s;}
.related-card:hover{border-color:#c4b5fd;box-shadow:0 4px 16px rgba(45,27,105,.08);}
.related-card-title{font-size:14px;font-weight:700;line-height:1.4;margin-bottom:6px;}
.related-card-meta{font-size:11px;color:var(--muted2);}

.spinner{width:28px;height:28px;border:3px solid rgba(45,27,105,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:60px auto;display:block;}
@keyframes spin{to{transform:rotate(360deg)}}

footer{background:var(--text);color:rgba(255,255,255,.3);padding:24px 40px;text-align:center;font-size:13px;}
footer a{color:rgba(255,255,255,.4);text-decoration:none;margin:0 10px;}
footer a:hover{color:#fff;}

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,doc,getDoc,collection,query,where,getDocs,limit}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);
const db=getFirestore(app);

const params=new URLSearchParams(window.location.search);
const POST_ID=params.get('id');

async function load(){
  if(!POST_ID){window.location.href='/blog/';return;}
  try{
    const snap=await getDoc(doc(db,'blogPosts',POST_ID));
    if(!snap.exists()||snap.data().status!=='published'){window.location.href='/blog/';return;}
    const p=snap.data();
    document.title=(p.title||'Blog')+'  — SwoopForm';
    // Cover
    const cover=document.getElementById('cover');
    if(p.coverImage){
      cover.style.background='url('+p.coverImage+') center/cover no-repeat';
      cover.style.backgroundSize='cover';
      cover.style.backgroundPosition='center';
      cover.innerHTML='';
    }else{
      cover.style.background='linear-gradient(135deg,#2d1b69,#7c3aed)';
      cover.textContent=p.emoji||'📝';
    }
    // Article
    document.getElementById('article-wrap').innerHTML=
      '<a href="/blog/" class="back-link">← Back to Blog</a>'
      +(p.tags?.length?'<div class="post-tags">'+p.tags.map(function(t){return'<span class="post-tag">'+eh(t)+'</span>';}).join('')+'</div>':'')
      +'<h1 class="post-title">'+eh(p.title||'')+'</h1>'
      +'<div class="post-meta">'
      +'<div class="post-meta-item">✍️ '+eh(p.author||'SwoopForm Team')+'</div>'
      +'<div class="post-meta-item">⏱ '+(p.readTime||3)+' min read</div>'
      +'<div class="post-meta-item">📅 '+fmtDate(p.publishedAt)+'</div>'
      +'</div>'
      +'<div class="post-content" id="post-content"></div>'
      +'<div class="cta-box">'
      +'<div class="cta-title">Ready to build better forms?</div>'
      +'<div class="cta-sub">Start free today — no credit card needed. Students and educators get free access.</div>'
      +'<a href="/login/" class="cta-btn">🚀 Get started free</a>'
      +'</div>';
    // Render markdown
    document.getElementById('post-content').innerHTML=parseMarkdown(p.content||'');
    // Related posts
    loadRelated(p.tags||[]);
  }catch(e){
    console.error(e);
    document.getElementById('article-wrap').innerHTML='<div style="text-align:center;padding:60px;"><div style="font-size:3rem;margin-bottom:16px;">😕</div><div style="font-size:18px;font-weight:700;">Post not found</div><a href="/blog/" style="color:var(--accent);text-decoration:none;font-weight:600;display:block;margin-top:16px;">← Back to Blog</a></div>';
  }
}

async function loadRelated(tags){
  try{
    const snap=await getDocs(query(collection(db,'blogPosts'),where('status','==','published'),limit(4)));
    const posts=snap.docs.map(function(d){return{id:d.id,...d.data()};}).filter(function(p){return p.id!==POST_ID;}).slice(0,2);
    if(!posts.length)return;
    document.getElementById('related-wrap').innerHTML=
      '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);margin-bottom:20px;display:flex;align-items:center;gap:10px;">More from SwoopForm<span style="flex:1;height:1px;background:var(--border);display:block;"></span></div>'
      +'<div class="related-grid">'+posts.map(function(p){
        return'<a href="/blog/post/?id='+p.id+'" class="related-card">'
          +'<div style="font-size:24px;margin-bottom:10px;">'+(p.emoji||'📝')+'</div>'
          +'<div class="related-card-title">'+eh(p.title||'')+'</div>'
          +'<div class="related-card-meta">'+(p.readTime||3)+' min · '+eh(p.author||'SwoopForm')+'</div>'
          +'</a>';
      }).join('')+'</div>';
  }catch(e){}
}

function parseMarkdown(md){
  return md
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2">$1</a>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s,function(m){return'<ul>'+m+'</ul>';})
    .replace(/\n\n/g,'</p><p>')
    .replace(/^(?!<[h|u|o|b|l|p|h])(.+)$/gm,'<p>$1</p>')
    .replace(/<p><\/p>/g,'');
}

function fmtDate(ts){if(!ts?.seconds)return'';return new Date(ts.seconds*1000).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
load();
</script>
