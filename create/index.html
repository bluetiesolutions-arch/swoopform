<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwoopForm — Create Survey</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'DM Sans',sans-serif;
      background:#F5F0E8;
      color:#0F0E1A;
      min-height:100vh;
    }
    nav{
      background:#fff;
      border-bottom:1.5px solid #E2DAD0;
      padding:0 24px;height:60px;
      display:flex;align-items:center;
      justify-content:space-between;
      position:sticky;top:0;z-index:100;
    }
    .nav-logo{
      display:flex;align-items:center;gap:10px;
      text-decoration:none;
    }
    .logo-mark{
      width:32px;height:32px;
      background:linear-gradient(135deg,#2D1B69,#D97706);
      border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      font-family:'Syne',sans-serif;font-weight:800;
      font-size:0.9rem;color:#fff;
    }
    .logo-name{
      font-family:'Syne',sans-serif;font-weight:800;
      font-size:1rem;color:#0F0E1A;
    }
    .nav-actions{display:flex;gap:10px;align-items:center}
    .btn-ghost{
      padding:8px 18px;border-radius:8px;
      border:1.5px solid #E2DAD0;
      background:transparent;color:#64748B;
      font-size:0.85rem;font-weight:600;
      font-family:'DM Sans',sans-serif;
      cursor:pointer;transition:all 0.2s;
      text-decoration:none;
    }
    .btn-ghost:hover{border-color:#0F0E1A;color:#0F0E1A}
    .btn-primary{
      padding:8px 18px;border-radius:8px;border:none;
      background:linear-gradient(135deg,#2D1B69,#D97706);
      color:#fff;font-size:0.85rem;font-weight:600;
      font-family:'DM Sans',sans-serif;cursor:pointer;
      transition:opacity 0.2s;
    }
    .btn-primary:hover{opacity:0.9}
    .btn-primary:disabled{opacity:0.5;cursor:not-allowed}

    .main{
      max-width:760px;margin:0 auto;
      padding:32px 20px;
    }

    /* SURVEY TITLE */
    .title-section{
      background:#fff;border-radius:16px;
      border:1.5px solid #E2DAD0;
      padding:28px;margin-bottom:16px;
    }
    .title-input{
      width:100%;border:none;outline:none;
      font-family:'Syne',sans-serif;font-weight:800;
      font-size:1.8rem;letter-spacing:-0.03em;
      color:#0F0E1A;background:transparent;
      placeholder-color:#C4B9AA;
    }
    .title-input::placeholder{color:#C4B9AA}
    .desc-input{
      width:100%;border:none;outline:none;
      font-family:'DM Sans',sans-serif;
      font-size:0.95rem;color:#64748B;
      background:transparent;margin-top:8px;
      resize:none;
    }
    .desc-input::placeholder{color:#C4B9AA}

    /* QUESTIONS */
    .questions-list{margin-bottom:16px}
    .question-card{
      background:#fff;border-radius:14px;
      border:1.5px solid #E2DAD0;
      padding:22px;margin-bottom:12px;
      transition:border-color 0.2s;
      position:relative;
    }
    .question-card:hover{border-color:rgba(45,27,105,0.3)}
    .question-card.focused{border-color:#2D1B69}
    .q-header{
      display:flex;align-items:center;
      gap:12px;margin-bottom:14px;
    }
    .q-number{
      width:26px;height:26px;border-radius:50%;
      background:#EDE9FF;color:#2D1B69;
      font-size:0.75rem;font-weight:700;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
    }
    .q-type-select{
      padding:5px 10px;border-radius:7px;
      border:1.5px solid #E2DAD0;
      background:#fff;color:#0F0E1A;
      font-size:0.8rem;font-weight:600;
      font-family:'DM Sans',sans-serif;
      cursor:pointer;outline:none;
    }
    .q-type-select:focus{border-color:#2D1B69}
    .q-delete{
      margin-left:auto;width:28px;height:28px;
      border-radius:7px;border:none;
      background:transparent;cursor:pointer;
      color:#64748B;font-size:1rem;
      display:flex;align-items:center;justify-content:center;
      transition:all 0.2s;
    }
    .q-delete:hover{background:#FEE2E2;color:#DC2626}
    .q-input{
      width:100%;border:none;border-bottom:1.5px solid #E2DAD0;
      outline:none;padding:8px 0;
      font-family:'DM Sans',sans-serif;
      font-size:0.95rem;font-weight:600;
      color:#0F0E1A;background:transparent;
      margin-bottom:14px;
    }
    .q-input::placeholder{color:#C4B9AA}
    .q-input:focus{border-bottom-color:#2D1B69}

    /* OPTIONS */
    .options-list{margin-bottom:10px}
    .option-row{
      display:flex;align-items:center;gap:8px;
      margin-bottom:8px;
    }
    .option-bullet{
      width:16px;height:16px;border-radius:50%;
      border:2px solid #E2DAD0;flex-shrink:0;
    }
    .option-input{
      flex:1;border:none;border-bottom:1px solid #E2DAD0;
      outline:none;padding:5px 0;
      font-family:'DM Sans',sans-serif;font-size:0.88rem;
      color:#0F0E1A;background:transparent;
    }
    .option-input::placeholder{color:#C4B9AA}
    .option-input:focus{border-bottom-color:#2D1B69}
    .option-remove{
      background:none;border:none;cursor:pointer;
      color:#C4B9AA;font-size:1rem;
      transition:color 0.2s;padding:2px;
    }
    .option-remove:hover{color:#DC2626}
    .add-option-btn{
      background:none;border:none;cursor:pointer;
      color:#2D1B69;font-size:0.82rem;font-weight:600;
      font-family:'DM Sans',sans-serif;padding:4px 0;
    }

    /* RATING */
    .rating-preview{
      display:flex;gap:8px;flex-wrap:wrap;
    }
    .rating-dot{
      width:36px;height:36px;border-radius:8px;
      border:1.5px solid #E2DAD0;
      display:flex;align-items:center;justify-content:center;
      font-size:0.85rem;font-weight:600;color:#64748B;
    }

    /* REQUIRED TOGGLE */
    .q-footer{
      display:flex;align-items:center;
      gap:8px;margin-top:12px;
      padding-top:12px;
      border-top:1px solid #E2DAD0;
    }
    .toggle{
      width:36px;height:20px;border-radius:100px;
      background:#E2DAD0;cursor:pointer;
      position:relative;transition:background 0.2s;
      border:none;flex-shrink:0;
    }
    .toggle.on{background:#2D1B69}
    .toggle::after{
      content:'';position:absolute;
      width:14px;height:14px;border-radius:50%;
      background:#fff;top:3px;left:3px;
      transition:transform 0.2s;
    }
    .toggle.on::after{transform:translateX(16px)}
    .toggle-label{
      font-size:0.8rem;color:#64748B;font-weight:500;
    }

    /* ADD QUESTION */
    .add-question-section{
      background:#fff;border-radius:14px;
      border:1.5px dashed #E2DAD0;
      padding:20px;text-align:center;
      margin-bottom:24px;
    }
    .add-question-title{
      font-size:0.85rem;font-weight:600;
      color:#64748B;margin-bottom:14px;
    }
    .question-types{
      display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
    }
    .type-btn{
      padding:8px 14px;border-radius:8px;
      border:1.5px solid #E2DAD0;
      background:#fff;color:#0F0E1A;
      font-size:0.8rem;font-weight:600;
      font-family:'DM Sans',sans-serif;
      cursor:pointer;transition:all 0.2s;
      display:flex;align-items:center;gap:6px;
    }
    .type-btn:hover{
      border-color:#2D1B69;
      background:#EDE9FF;color:#2D1B69;
    }

    /* SETTINGS */
    .settings-section{
      background:#fff;border-radius:14px;
      border:1.5px solid #E2DAD0;
      padding:22px;margin-bottom:24px;
    }
    .settings-title{
      font-family:'Syne',sans-serif;font-weight:700;
      font-size:0.95rem;margin-bottom:16px;
    }
    .setting-row{
      display:flex;align-items:center;
      justify-content:space-between;
      padding:10px 0;
      border-bottom:1px solid #E2DAD0;
    }
    .setting-row:last-child{border-bottom:none}
    .setting-info .setting-name{
      font-size:0.88rem;font-weight:600;
    }
    .setting-info .setting-desc{
      font-size:0.78rem;color:#64748B;margin-top:2px;
    }

    /* TOAST */
    .toast{
      position:fixed;bottom:24px;left:50%;
      transform:translateX(-50%);
      background:#0F0E1A;color:#fff;
      padding:12px 24px;border-radius:10px;
      font-size:0.88rem;font-weight:600;
      display:none;z-index:999;
      box-shadow:0 4px 20px rgba(0,0,0,0.3);
    }

    /* LOADING */
    .loading-screen{
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;background:#0F0E1A;
    }
    .spinner{
      width:32px;height:32px;
      border:3px solid rgba(217,119,6,0.2);
      border-top-color:#D97706;border-radius:50%;
      animation:spin 0.8s linear infinite;
      margin:0 auto;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div id="loading-screen" class="loading-screen">
  <div class="spinner"></div>
</div>

<div id="app" style="display:none">
  <nav>
    <a href="/dashboard" class="nav-logo">
      <div class="logo-mark">S</div>
      <div class="logo-name">SwoopForm</div>
    </a>
    <div class="nav-actions">
      <a href="/dashboard" class="btn-ghost">← Back</a>
      <button class="btn-ghost" onclick="saveDraft()">Save draft</button>
      <button class="btn-primary" id="publish-btn" onclick="publishSurvey()">Publish →</button>
    </div>
  </nav>

  <div class="main">

    <!-- TITLE -->
    <div class="title-section">
      <input class="title-input" id="survey-title"
        placeholder="Your survey title..." maxlength="100">
      <textarea class="desc-input" id="survey-desc"
        placeholder="Add a description (optional)" rows="2"></textarea>
    </div>

    <!-- QUESTIONS -->
    <div class="questions-list" id="questions-list"></div>

    <!-- ADD QUESTION -->
    <div class="add-question-section">
      <div class="add-question-title">Add a question</div>
      <div class="question-types">
        <button class="type-btn" onclick="addQuestion('multiple')">
          ◉ Multiple choice
        </button>
        <button class="type-btn" onclick="addQuestion('text')">
          ✏️ Short text
        </button>
        <button class="type-btn" onclick="addQuestion('textarea')">
          📝 Long text
        </button>
        <button class="type-btn" onclick="addQuestion('rating')">
          ⭐ Rating
        </button>
        <button class="type-btn" onclick="addQuestion('yesno')">
          ✓ Yes / No
        </button>
      </div>
    </div>

    <!-- SETTINGS -->
    <div class="settings-section">
      <div class="settings-title">Survey settings</div>
      <div class="setting-row">
        <div class="setting-info">
          <div class="setting-name">Public survey</div>
          <div class="setting-desc">Show in SwoopForm discovery directory</div>
        </div>
        <button class="toggle" id="toggle-public" onclick="toggleSetting('public')"></button>
      </div>
      <div class="setting-row">
        <div class="setting-info">
          <div class="setting-name">Collect email addresses</div>
          <div class="setting-desc">Ask respondents for their email</div>
        </div>
        <button class="toggle" id="toggle-email" onclick="toggleSetting('email')"></button>
      </div>
      <div class="setting-row">
        <div class="setting-info">
          <div class="setting-name">One response per person</div>
          <div class="setting-desc">Prevent duplicate submissions</div>
        </div>
        <button class="toggle" id="toggle-once" onclick="toggleSetting('once')"></button>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
  import { getFirestore, collection, addDoc, doc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",
    authDomain: "swoopform.firebaseapp.com",
    projectId: "swoopform",
    storageBucket: "swoopform.firebasestorage.app",
    messagingSenderId: "378850092986",
    appId: "1:378850092986:web:4fed92128136e048fa5f83"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let questions = [];
  let settings = { public: false, email: false, once: false };
  let savedSurveyId = null;

  onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = '/login'; return; }
    currentUser = user;
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    addQuestion('multiple');
  });

  function showToast(msg, duration=2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', duration);
  }

  window.toggleSetting = function(key) {
    settings[key] = !settings[key];
    const btn = document.getElementById('toggle-' + key);
    btn.classList.toggle('on', settings[key]);
  }

  window.addQuestion = function(type) {
    getQuestionData();
    const id = Date.now();
    questions.push({ id, type, text: '', options: ['', ''], required: false });
    renderQuestions();
    setTimeout(() => {
      const input = document.getElementById('q-text-' + id);
      if (input) input.focus();
    }, 50);
  }
window.deleteQuestion = function(id) {
    if (questions.length === 1) { showToast('Survey needs at least 1 question'); return; }
    getQuestionData();
    questions = questions.filter(q => q.id !== id);
    renderQuestions();
  }

 window.changeType = function(id, type) {
    getQuestionData();
    const q = questions.find(q => q.id === id);
    if (q) { q.type = type; renderQuestions();  }
  }

  window.toggleRequired = function(id) {
    const q = questions.find(q => q.id === id);
    if (q) {
      q.required = !q.required;
      document.getElementById('req-toggle-' + id).classList.toggle('on', q.required);
    }
  }
window.addOption = function(qId) {
    getQuestionData();
    const q = questions.find(q => q.id === qId);
    if (q) {
      q.options.push('');
      renderQuestions();
      setTimeout(() => {
        const inputs = document.querySelectorAll('[data-q="' + qId + '"]');
        if (inputs.length) inputs[inputs.length-1].focus();
      }, 50);
    }
  }

  window.removeOption = function(qId, idx) {
    const q = questions.find(q => q.id === qId);
    if (q && q.options.length > 2) {
      q.options.splice(idx, 1);
      renderQuestions();
    } else {
      showToast('Need at least 2 options');
    }
  }

  function getQuestionData() {
    questions.forEach(q => {
      const textEl = document.getElementById('q-text-' + q.id);
      if (textEl) q.text = textEl.value;
      if (q.type === 'multiple' || q.type === 'yesno') {
        const optEls = document.querySelectorAll('[data-q="' + q.id + '"]');
        q.options = Array.from(optEls).map(el => el.value).filter(v => v.trim());
      }
    });
  }

  function renderQuestions() {
    const list = document.getElementById('questions-list');
    list.innerHTML = questions.map((q, i) => `
      <div class="question-card" id="qcard-${q.id}">
        <div class="q-header">
          <div class="q-number">${i+1}</div>
          <select class="q-type-select" onchange="changeType(${q.id}, this.value)">
            <option value="multiple" ${q.type==='multiple'?'selected':''}>Multiple choice</option>
            <option value="text" ${q.type==='text'?'selected':''}>Short text</option>
            <option value="textarea" ${q.type==='textarea'?'selected':''}>Long text</option>
            <option value="rating" ${q.type==='rating'?'selected':''}>Rating (1-5)</option>
            <option value="yesno" ${q.type==='yesno'?'selected':''}>Yes / No</option>
          </select>
          <button class="q-delete" onclick="deleteQuestion(${q.id})">✕</button>
        </div>

        <input class="q-input" id="q-text-${q.id}"
          placeholder="Type your question here..."
          value="${q.text || ''}"
          oninput="questions.find(x=>x.id===${q.id}).text=this.value">

        ${q.type === 'multiple' ? `
          <div class="options-list">
            ${q.options.map((opt, oi) => `
              <div class="option-row">
                <div class="option-bullet"></div>
                <input class="option-input" data-q="${q.id}"
                  value="${opt}"
                  placeholder=""
                  oninput="questions.find(x=>x.id===${q.id}).options[${oi}]=this.value">
                <button class="option-remove" onclick="removeOption(${q.id},${oi})">✕</button>
              </div>
            `).join('')}
          </div>
          <button class="add-option-btn" onclick="addOption(${q.id})">+ Add option</button>
        ` : ''}

        ${q.type === 'yesno' ? `
          <div class="options-list">
            <div class="option-row">
              <div class="option-bullet"></div>
              <span style="font-size:0.88rem;color:#0F0E1A;font-weight:600">Yes</span>
            </div>
            <div class="option-row">
              <div class="option-bullet"></div>
              <span style="font-size:0.88rem;color:#0F0E1A;font-weight:600">No</span>
            </div>
          </div>
        ` : ''}

        ${q.type === 'rating' ? `
          <div class="rating-preview">
            ${[1,2,3,4,5].map(n => `<div class="rating-dot">${n}</div>`).join('')}
          </div>
          <div style="font-size:0.75rem;color:#64748B;margin-top:8px">
            Respondents pick a number from 1 to 5
          </div>
        ` : ''}

        ${q.type === 'text' ? `
          <div style="background:#F5F0E8;border-radius:8px;padding:12px;
            font-size:0.85rem;color:#C4B9AA;">
            Respondents type a short answer here...
          </div>
        ` : ''}

        ${q.type === 'textarea' ? `
          <div style="background:#F5F0E8;border-radius:8px;padding:12px;
            font-size:0.85rem;color:#C4B9AA;min-height:60px;">
            Respondents type a detailed answer here...
          </div>
        ` : ''}

        <div class="q-footer">
          <button class="toggle ${q.required?'on':''}"
            id="req-toggle-${q.id}"
            onclick="toggleRequired(${q.id})">
          </button>
          <span class="toggle-label">Required question</span>
        </div>
      </div>
    `).join('');
  }

  async function saveSurvey(status) {
    const title = document.getElementById('survey-title').value.trim();
    if (!title) { showToast('Please add a survey title'); return null; }
    if (questions.length === 0) { showToast('Add at least one question'); return null; }

    getQuestionData();

    const validQuestions = questions.filter(q => q.text.trim());
    if (validQuestions.length === 0) { showToast('Please fill in your question text'); return null; }

    const surveyData = {
      title,
      description: document.getElementById('survey-desc').value.trim(),
      questions: validQuestions,
      settings,
      status,
      userId: currentUser.uid,
      responseCount: 0,
      questionCount: validQuestions.length,
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    };

    try {
      if (savedSurveyId) {
        await updateDoc(doc(db, 'surveys', savedSurveyId), {
          ...surveyData,
          createdAt: undefined,
          updatedAt: serverTimestamp()
        });
        return savedSurveyId;
      } else {
        const ref = await addDoc(collection(db, 'surveys'), surveyData);
        savedSurveyId = ref.id;
        return ref.id;
      }
    } catch(e) {
      console.error(e);
      showToast('Error saving. Please try again');
      return null;
    }
  }

  window.saveDraft = async function() {
    const id = await saveSurvey('draft');
    if (id) showToast('✓ Draft saved!');
  }

  window.publishSurvey = async function() {
    const btn = document.getElementById('publish-btn');
    btn.disabled = true;
    btn.textContent = 'Publishing...';

    const id = await saveSurvey('active');
    if (id) {
      showToast('🎉 Survey published!', 1500);
      setTimeout(() => {
        window.location.href = '/dashboard';
      }, 1800);
    } else {
      btn.disabled = false;
      btn.textContent = 'Publish →';
    }
  }
</script>
</body>
</html>
