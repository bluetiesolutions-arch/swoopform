<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | SwoopForm</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#0F0E1A;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;overflow:hidden;position:relative}
    .bg-glow{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(45,27,105,0.15) 0%,transparent 70%);pointer-events:none}
    .error-num{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(6rem,20vw,10rem);letter-spacing:-0.05em;background:linear-gradient(135deg,#2D1B69,#D97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:8px;animation:slideDown 0.6s ease both}
    @keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
    .error-emoji{font-size:3rem;margin-bottom:16px;animation:bounce 1s ease infinite}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    .error-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.4rem,3vw,2rem);letter-spacing:-0.03em;margin-bottom:12px;animation:slideUp 0.6s ease 0.1s both}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .error-sub{font-size:1rem;color:rgba(255,255,255,0.45);max-width:440px;line-height:1.7;margin-bottom:36px;animation:slideUp 0.6s ease 0.2s both}
    .error-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;animation:slideUp 0.6s ease 0.3s both}
    .btn-home{padding:13px 28px;border-radius:12px;border:none;background:linear-gradient(135deg,#2D1B69,#D97706);color:#fff;font-size:0.95rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .btn-home:hover{opacity:0.9;transform:translateY(-1px)}
    .btn-back{padding:12px 24px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.7);font-size:0.92rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .btn-back:hover{border-color:rgba(255,255,255,0.4);color:#fff}
    .quick-links{margin-top:48px;animation:slideUp 0.6s ease 0.4s both}
    .quick-links-title{font-size:0.75rem;font-weight:700;color:rgba(255,255,255,0.25);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:14px}
    .quick-links-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
    .quick-link{padding:7px 16px;border-radius:100px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.45);font-size:0.78rem;font-weight:600;text-decoration:none;transition:all 0.2s;font-family:'DM Sans',sans-serif}
    .quick-link:hover{border-color:rgba(255,255,255,0.2);color:#fff;background:rgba(255,255,255,0.08)}
    .sf-brand{position:fixed;bottom:20px;display:flex;align-items:center;gap:6px;opacity:0.3}
    .sf-brand-logo{width:20px;height:20px;border-radius:5px;background:linear-gradient(135deg,#2D1B69,#D97706);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.6rem;color:#fff}
    .sf-brand-text{font-size:0.72rem;color:rgba(255,255,255,0.5)}
  </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="error-num">404</div>
<div class="error-emoji">🔍</div>
<h1 class="error-title">Page not found</h1>
<p class="error-sub">The page you're looking for doesn't exist, has been moved, or the link may be broken.</p>
<div class="error-actions">
  <a href="/" class="btn-home">← Go home</a>
  <button class="btn-back" onclick="window.history.back()">Go back</button>
</div>
<div class="quick-links">
  <div class="quick-links-title">Quick links</div>
  <div class="quick-links-row">
    <a href="/dashboard" class="quick-link">📊 Dashboard</a>
    <a href="/discover" class="quick-link">🔍 Discover</a>
    <a href="/create/" class="quick-link">📋 Create survey</a>
    <a href="/blog" class="quick-link">✍️ Blog</a>
    <a href="/contact" class="quick-link">💬 Contact</a>
  </div>
</div>
<div class="sf-brand"><div class="sf-brand-logo">S</div><div class="sf-brand-text">SwoopForm</div></div>
</body>
</html>
