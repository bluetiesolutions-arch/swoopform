<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | SwoopForm</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:#f5f0e8;color:#0f0e1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;}
.num{font-size:clamp(7rem,22vw,12rem);font-weight:800;letter-spacing:-.06em;background:linear-gradient(135deg,#2d1b69,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:8px;animation:down .6s ease both;}
@keyframes down{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.emoji{font-size:3rem;margin-bottom:16px;animation:bounce 1.2s ease infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.title{font-size:clamp(1.4rem,3vw,2rem);font-weight:800;letter-spacing:-.03em;margin-bottom:12px;animation:up .6s ease .1s both;}
.sub{font-size:15px;color:#64748b;max-width:420px;line-height:1.7;margin-bottom:36px;animation:up .6s ease .2s both;}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;animation:up .6s ease .3s both;}
.btn-p{padding:13px 28px;border-radius:12px;border:none;background:linear-gradient(135deg,#2d1b69,#7c3aed);color:#fff;font-size:14px;font-weight:700;font-family:'Sora',sans-serif;cursor:pointer;text-decoration:none;transition:all .2s;}
.btn-p:hover{opacity:.9;transform:translateY(-1px);}
.btn-g{padding:12px 24px;border-radius:12px;border:1.5px solid #e2dad0;background:#fff;color:#64748b;font-size:14px;font-weight:600;font-family:'Sora',sans-serif;cursor:pointer;text-decoration:none;transition:all .2s;}
.btn-g:hover{border-color:#2d1b69;color:#2d1b69;}
.links{margin-top:48px;animation:up .6s ease .4s both;}
.links-label{font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;}
.links-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.quick-link{padding:7px 16px;border-radius:100px;border:1.5px solid #e2dad0;background:#fff;color:#64748b;font-size:12px;font-weight:600;text-decoration:none;transition:all .2s;}
.quick-link:hover{border-color:#2d1b69;color:#2d1b69;}
</style>
<link rel="stylesheet" href="/mobile.css">
</head>
<body>
<div class="num">404</div>
<div class="emoji">😕</div>
<h1 class="title">Page not found</h1>
<p class="sub">The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
<div class="btns">
  <a href="/" class="btn-p">🏠 Go to Homepage</a>
  <a href="javascript:history.back()" class="btn-g">← Go back</a>
</div>
<div class="links">
  <div class="links-label">Quick links</div>
  <div class="links-row">
    <a href="/dashboard/" class="quick-link">Dashboard</a>
    <a href="/discover/" class="quick-link">Discover</a>
    <a href="/pricing/" class="quick-link">Pricing</a>
    <a href="/blog/" class="quick-link">Blog</a>
    <a href="/contact/" class="quick-link">Contact</a>
  </div>
</div>
</body>
</html>
