<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voting Results — SwoopForm</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0eeea;--border:#e2ddd6;--accent:#d97706;--green:#12a872;--red:#e5484d;--text:#1c1c2e;--muted:#7a7a8c;--muted2:#c5c0b8;--font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
nav{height:54px;background:rgba(245,244,240,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:100;gap:16px;}
.brand{font-size:15px;font-weight:700;color:var(--accent);}
.nav-sep{width:1px;height:18px;background:var(--border);}
.nav-crumb{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;}
.nav-crumb a{color:var(--accent);text-decoration:none;}
.nav-right{margin-left:auto;display:flex;gap:10px;}
.btn{padding:7px 14px;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:none;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--muted2);color:var(--text);}
.btn-accent{background:var(--accent);color:#fff;font-weight:600;}
.main{max-width:720px;margin:0 auto;padding:32px 20px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.stat-val{font-size:24px;font-weight:800;font-family:var(--mono);margin-bottom:4px;}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;}
.results-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;}
.live-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;background:rgba(18,168,114,0.1);color:var(--green);font-size:12px;font-weight:600;margin-bottom:16px;}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.results-title{font-size:20px;font-weight:700;margin-bottom:20px;}
.candidate-result{display:flex;align-items:center;gap:16px;padding:16px;background:var(--bg);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;transition:all .2s;}
.candidate-result.winner{border-color:var(--accent);background:rgba(217,119,6,0.05);}
.cand-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#dc2626);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.cand-info{flex:1;}
.cand-name{font-size:15px;font-weight:700;}
.cand-subtitle{font-size:12px;color:var(--muted);margin-top:2px;}
.cand-bar-wrap{flex:2;}
.cand-bar-bg{height:10px;background:var(--surface2);border-radius:5px;overflow:hidden;margin-bottom:4px;}
.cand-bar-fill{height:100%;border-radius:5px;background:var(--accent);transition:width .6s;}
.cand-bar-fill.winner{background:linear-gradient(90deg,#d97706,#dc2626);}
.cand-stats{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);}
.cand-pct{font-size:18px;font-weight:800;font-family:var(--mono);color:var(--accent);min-width:50px;text-align:right;}
.rank-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.actions-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;display:flex;gap:12px;flex-wrap:wrap;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:24px;background:var(--text);color:#fff;padding:10px 16px;border-radius:9px;font-size:12px;z-index:400;display:none;}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted);">Loading results...</div>
</div>

<div id="main-wrap" style="display:none;">
<nav>
  <div class="brand">SwoopForm</div>
  <div class="nav-sep"></div>
  <div class="nav-crumb">
    <a href="/dashboard/">Dashboard</a> ›
    <span id="nav-title">Voting Results</span>
  </div>
  <div class="nav-right">
    <button class="btn btn-ghost" onclick="toggleAccepting()">Toggle Voting</button>
    <button class="btn btn-accent" onclick="window.open('/voting/?id='+VID,'_blank')">🔗 View Voting</button>
  </div>
</nav>

<div class="main">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="stat-votes" style="color:var(--accent);">0</div><div class="stat-label">Total Votes</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-cands" style="color:var(--muted);">0</div><div class="stat-label">Candidates</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-leader" style="color:var(--green);font-size:14px;">—</div><div class="stat-label">Leading</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-status" style="color:var(--green);">●</div><div class="stat-label">Status</div></div>
  </div>

  <div class="results-card">
    <div class="live-badge"><span class="live-dot"></span>Live Results</div>
    <div class="results-title" id="vote-title">Loading...</div>
    <div id="results-wrap"></div>
  </div>

  <div class="actions-card">
    <button class="btn btn-ghost" onclick="window.location.href='/voting/create/?id='+VID">✏️ Edit</button>
    <button class="btn btn-ghost" onclick="copyLink()">🔗 Copy Link</button>
    <button class="btn btn-ghost" onclick="exportCSV()">⬇ Export CSV</button>
    <button class="btn btn-ghost" onclick="toggleAccepting()" id="toggle-btn">⏸ Pause</button>
    <button class="btn btn-ghost" onclick="window.location.href='/dashboard/'">🏠 Dashboard</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getAuth,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import{getFirestore,doc,getDoc,updateDoc,onSnapshot,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);
const auth=getAuth(app);
const db=getFirestore(app);

const params=new URLSearchParams(window.location.search);
window.VID=params.get('id');
let vData=null;

onAuthStateChanged(auth,async function(u){
  if(!u){window.location.href='/login/';return;}
  if(!VID){showFatal('No voting ID.');return;}
  try{
    const snap=await getDoc(doc(db,'votings',VID));
    if(!snap.exists()){showFatal('Voting not found.');return;}
    vData=snap.data();
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('main-wrap').style.display='block';
    renderAll(vData);
    onSnapshot(doc(db,'votings',VID),function(snap){
      if(snap.exists()){vData=snap.data();renderAll(vData);}
    });
  }catch(e){console.error(e);showFatal('Failed to load.');}
});

function renderAll(d){
  document.getElementById('nav-title').textContent=d.title||'Voting Results';
  document.getElementById('vote-title').textContent=d.title||'';
  document.title=(d.title||'Voting')+' — Results';

  const candidates=d.candidates||[];
  const votes=d.votes||{};
  const total=Object.values(votes).reduce(function(s,v){return s+(v||0);},0);
  const maxVotes=Math.max(...Object.values(votes),1);

  document.getElementById('stat-votes').textContent=total;
  document.getElementById('stat-cands').textContent=candidates.length;

  const sorted=[...candidates].map(function(c,i){return{...c,idx:i,v:votes['c_'+i]||0};}).sort(function(a,b){return b.v-a.v;});
  document.getElementById('stat-leader').textContent=sorted[0]?(sorted[0].name||'—').substring(0,10):'—';

  const acc=d.accepting!==false;
  document.getElementById('stat-status').textContent=acc?'● Live':'● Closed';
  document.getElementById('stat-status').style.color=acc?'var(--green)':'var(--red)';
  document.getElementById('toggle-btn').textContent=acc?'⏸ Pause':'▶ Resume';

  const rankColors=['#d97706','#9ca3af','#b45309'];
  const rankEmojis=['🥇','🥈','🥉'];

  document.getElementById('results-wrap').innerHTML=sorted.map(function(c,rank){
    const pct=total?Math.round(c.v/total*100):0;
    const barW=total?Math.round(c.v/maxVotes*100):0;
    const isWinner=rank===0&&total>0;
    return '<div class="candidate-result'+(isWinner?' winner':'')+'">'
      +'<div class="rank-badge" style="background:'+(rankColors[rank]||'var(--surface2)')+';color:'+(rank<3?'#fff':'var(--muted)')+';">'+(rankEmojis[rank]||rank+1)+'</div>'
      +'<div class="cand-avatar">'+(c.emoji||'🏆')+'</div>'
      +'<div class="cand-info"><div class="cand-name">'+c.name+'</div><div class="cand-subtitle">'+(c.subtitle||'')+'</div></div>'
      +'<div class="cand-bar-wrap"><div class="cand-bar-bg"><div class="cand-bar-fill'+(isWinner?' winner':'')+'" style="width:'+barW+'%"></div></div><div class="cand-stats"><span>'+c.v+' vote'+(c.v!==1?'s':'')+'</span></div></div>'
      +'<div class="cand-pct">'+pct+'%</div>'
      +'</div>';
  }).join('');
}

window.toggleAccepting=async function(){
  const current=vData.accepting!==false;
  try{
    await updateDoc(doc(db,'votings',VID),{accepting:!current,updatedAt:serverTimestamp()});
    toast(current?'Voting paused':'Voting resumed');
  }catch(e){toast('Error');}
};

window.copyLink=function(){navigator.clipboard.writeText('https://swoopform.com/voting/?id='+VID).then(function(){toast('Copied!');});};

window.exportCSV=function(){
  if(!vData)return;
  const candidates=vData.candidates||[];
  const votes=vData.votes||{};
  const total=Object.values(votes).reduce(function(s,v){return s+(v||0);},0);
  const rows=[['Rank','Name','Subtitle','Votes','Percentage']];
  [...candidates].map(function(c,i){return{...c,v:votes['c_'+i]||0};})
    .sort(function(a,b){return b.v-a.v;})
    .forEach(function(c,rank){
      rows.push([rank+1,c.name||'',c.subtitle||'',c.v,total?Math.round(c.v/total*100)+'%':'0%']);
    });
  const csv=rows.map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='voting-results.csv';a.click();
  toast('CSV downloaded!');
};

function showFatal(msg){document.getElementById('loading-screen').innerHTML='<div style="text-align:center;padding:40px;"><div style="font-size:48px;margin-bottom:16px;">😕</div><div style="font-size:16px;font-weight:700;margin-bottom:8px;">'+msg+'</div><a href="/dashboard/" style="display:inline-block;margin-top:16px;padding:10px 20px;background:var(--accent);color:#fff;border-radius:8px;text-decoration:none;font-size:13px;">Go to Dashboard</a></div>';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(function(){t.style.display='none';},2500);}
</script>
</body>
</html>
