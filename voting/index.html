<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vote — SwoopForm</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--white:#fff;--border:#e2ddd6;--accent:#d97706;--accent-light:#fffbeb;--success:#12a872;--danger:#e5484d;--text:#1c1c2e;--muted:#7a7a8c;--muted2:#c5c0b8;--font:'Sora',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
header{height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50;}
.brand{font-size:15px;font-weight:700;color:var(--accent);}
.main{max-width:600px;margin:0 auto;padding:40px 20px;}
.vote-card{background:var(--white);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.vote-hero{padding:32px;background:linear-gradient(135deg,#d97706,#dc2626);color:#fff;text-align:center;}
.vote-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;opacity:0.8;margin-bottom:10px;}
.vote-title{font-size:24px;font-weight:700;margin-bottom:8px;line-height:1.3;}
.vote-desc{font-size:14px;opacity:0.85;line-height:1.6;margin-bottom:12px;}
.vote-meta{display:flex;justify-content:center;gap:20px;font-size:12px;opacity:0.8;}
.vote-body{padding:28px;}
.voted-msg{display:flex;align-items:center;gap:8px;padding:12px 16px;background:rgba(18,168,114,0.1);border:1px solid rgba(18,168,114,0.2);border-radius:10px;font-size:13px;color:var(--success);font-weight:600;margin-bottom:20px;}
.candidates{display:flex;flex-direction:column;gap:12px;margin-bottom:24px;}
.candidate-btn{position:relative;display:flex;align-items:center;gap:16px;padding:16px 18px;border:2px solid var(--border);border-radius:14px;cursor:pointer;transition:all .2s;background:var(--white);font-family:var(--font);text-align:left;width:100%;overflow:hidden;}
.candidate-btn:hover:not(:disabled){border-color:var(--accent);background:var(--accent-light);}
.candidate-btn.selected{border-color:var(--accent);background:var(--accent-light);}
.candidate-btn.voted{cursor:default;}
.candidate-btn.voted.winner{border-color:var(--accent);box-shadow:0 2px 12px rgba(217,119,6,0.2);}
.vote-bar{position:absolute;left:0;top:0;height:100%;background:rgba(217,119,6,0.08);border-radius:12px;transition:width .6s ease;z-index:0;}
.candidate-btn.winner .vote-bar{background:rgba(217,119,6,0.12);}
.candidate-content{position:relative;z-index:1;display:flex;align-items:center;gap:14px;width:100%;}
.candidate-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#dc2626);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;color:#fff;font-weight:700;}
.candidate-info{flex:1;}
.candidate-name{font-size:15px;font-weight:700;margin-bottom:2px;}
.candidate-subtitle{font-size:12px;color:var(--muted);}
.candidate-stats{text-align:right;flex-shrink:0;}
.candidate-pct{font-size:18px;font-weight:800;color:var(--accent);}
.candidate-count{font-size:11px;color:var(--muted);}
.candidate-radio{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:12px;}
.candidate-btn.selected .candidate-radio{border-color:var(--accent);background:var(--accent);color:#fff;}
.winner-badge{position:absolute;top:10px;right:10px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;}
.vote-btn{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,#d97706,#dc2626);color:#fff;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;}
.vote-btn:hover{opacity:0.9;transform:translateY(-1px);}
.vote-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.total-row{text-align:center;font-size:13px;color:var(--muted);margin-top:14px;}
.share-row{display:flex;gap:8px;margin-top:16px;}
.share-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--white);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.share-btn:hover{border-color:var(--accent);color:var(--accent);}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.vote-hero,.vote-body{padding:20px;}.main{padding:20px 16px;}}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted);">Loading vote...</div>
</div>

<div id="app" style="display:none;">
  <header>
    <div class="brand">SwoopForm</div>
    <span style="font-size:12px;color:var(--muted);">Live Voting</span>
  </header>
  <div class="main">
    <div class="vote-card">
      <div class="vote-hero">
        <div class="vote-tag" id="v-tag">Voting</div>
        <div class="vote-title" id="v-title">Loading...</div>
        <div class="vote-desc" id="v-desc"></div>
        <div class="vote-meta">
          <span id="v-total">0 votes</span>
          <span id="v-deadline"></span>
        </div>
      </div>
      <div class="vote-body">
        <div class="voted-msg" id="voted-msg" style="display:none;">✅ Your vote has been recorded! Results update live.</div>
        <div class="candidates" id="candidates-wrap"></div>
        <button class="vote-btn" id="vote-btn" onclick="submitVote()" disabled>Cast My Vote →</button>
        <div class="total-row" id="total-row"></div>
        <div class="share-row">
          <button class="share-btn" onclick="copyLink()">🔗 Copy Link</button>
          <button class="share-btn" onclick="shareNative()">📤 Share</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,doc,getDoc,addDoc,updateDoc,collection,increment,onSnapshot,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);
const db=getFirestore(app);

const params=new URLSearchParams(window.location.search);
const VID=params.get('id');
let vData=null;
let selectedIdx=null;
let hasVoted=false;

async function init(){
  if(!VID){showError('No voting ID in URL.');return;}
  try{
    const snap=await getDoc(doc(db,'votings',VID));
    if(!snap.exists()){showError('Voting not found.');return;}
    vData=snap.data();
    if(vData.status==='closed'||vData.accepting===false){showError('This voting is closed.');return;}
    hasVoted=localStorage.getItem('voted_voting_'+VID)==='1';
    render();
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('app').style.display='block';
    onSnapshot(doc(db,'votings',VID),function(snap){
      if(snap.exists()){vData=snap.data();renderCandidates();}
    });
  }catch(e){console.error(e);showError('Failed to load.');}
}

function render(){
  document.title=(vData.title||'Vote')+' — SwoopForm';
  document.getElementById('v-tag').textContent=vData.category||'Voting';
  document.getElementById('v-title').textContent=vData.title||'Cast Your Vote';
  document.getElementById('v-desc').textContent=vData.description||'';
  if(vData.deadline)document.getElementById('v-deadline').textContent='Closes '+vData.deadline;
  if(hasVoted){
    document.getElementById('voted-msg').style.display='flex';
    document.getElementById('vote-btn').style.display='none';
  }
  renderCandidates();
}

function renderCandidates(){
  const candidates=vData.candidates||[];
  const votes=vData.votes||{};
  const total=Object.values(votes).reduce(function(s,v){return s+(v||0);},0);
  const maxVotes=Math.max(...Object.values(votes),1);
  document.getElementById('v-total').textContent=total+' vote'+(total!==1?'s':'');
  document.getElementById('total-row').textContent=total+' total votes'+(hasVoted?' · Results update live':'');

  document.getElementById('candidates-wrap').innerHTML=candidates.map(function(c,i){
    const v=votes['c_'+i]||0;
    const pct=total?Math.round(v/total*100):0;
    const barW=total?Math.round(v/maxVotes*100):0;
    const isSel=selectedIdx===i;
    const isWinner=hasVoted&&v===maxVotes&&total>0;
    const initials=(c.name||'?').split(' ').map(function(n){return n[0];}).join('').substring(0,2).toUpperCase();
    return '<button class="candidate-btn'+(isSel?' selected':'')+(hasVoted?' voted':'')+(isWinner?' winner':'')+'" onclick="selectCandidate('+i+')" '+(hasVoted?'disabled':'')+' id="cand_'+i+'">'
      +(hasVoted?'<div class="vote-bar" style="width:'+barW+'%"></div>':'')
      +(isWinner?'<div class="winner-badge">🏆 Leading</div>':'')
      +'<div class="candidate-content">'
      +'<div class="candidate-avatar">'+(c.emoji||initials)+'</div>'
      +'<div class="candidate-info"><div class="candidate-name">'+(c.name||'Candidate')+'</div><div class="candidate-subtitle">'+(c.subtitle||'')+'</div></div>'
      +(hasVoted?'<div class="candidate-stats"><div class="candidate-pct">'+pct+'%</div><div class="candidate-count">'+v+' vote'+(v!==1?'s':'')+'</div></div>':'')
      +'<div class="candidate-radio">'+(isSel?'●':'')+'</div>'
      +'</div></button>';
  }).join('');
}

window.selectCandidate=function(idx){
  if(hasVoted)return;
  selectedIdx=idx;
  renderCandidates();
  document.getElementById('vote-btn').disabled=false;
};

window.submitVote=async function(){
  if(selectedIdx===null)return;
  if(hasVoted)return;
  const btn=document.getElementById('vote-btn');
  btn.disabled=true;btn.textContent='Submitting...';
  try{
    const updates={['votes.c_'+selectedIdx]:increment(1),totalVotes:increment(1),updatedAt:serverTimestamp()};
    await updateDoc(doc(db,'votings',VID),updates);
    await addDoc(collection(db,'votingResponses'),{
      votingId:VID,votingTitle:vData.title,
      selectedIdx,selectedName:(vData.candidates||[])[selectedIdx]?.name||'',
      submittedAt:serverTimestamp()
    });
    hasVoted=true;
    localStorage.setItem('voted_voting_'+VID,'1');
    document.getElementById('voted-msg').style.display='flex';
    document.getElementById('vote-btn').style.display='none';
    renderCandidates();
  }catch(e){
    console.error(e);btn.disabled=false;btn.textContent='Cast My Vote →';
    alert('Error: '+e.message);
  }
};

window.copyLink=function(){navigator.clipboard.writeText(window.location.href).then(function(){alert('Link copied!');});};
window.shareNative=function(){if(navigator.share)navigator.share({title:vData.title,url:window.location.href});else window.copyLink();};
function showError(msg){document.getElementById('loading-screen').innerHTML='<div style="text-align:center;padding:40px;"><div style="font-size:48px;margin-bottom:16px;">😕</div><div style="font-size:18px;font-weight:700;margin-bottom:8px;">Oops!</div><div style="font-size:14px;color:#7a7a8c;">'+msg+'</div><a href="/dashboard/" style="display:inline-block;margin-top:20px;padding:10px 20px;background:#d97706;color:#fff;border-radius:8px;text-decoration:none;font-size:13px;">Go to Dashboard</a></div>';}
init();
</script>
</body>
</html>
