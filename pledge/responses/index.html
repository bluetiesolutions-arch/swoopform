<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pledge Responses — SwoopForm</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#0D1F16;color:#fff;min-height:100vh}
    nav{background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.07);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
    .logo-mk{width:28px;height:28px;background:linear-gradient(135deg,#2D1B69,#D97706);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.8rem;color:#fff}
    .logo-nm{font-family:'Syne',sans-serif;font-weight:800;font-size:0.95rem}
    .nav-btn{padding:7px 14px;border-radius:8px;border:1.5px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.5);font-size:0.82rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .nav-btn:hover{border-color:#10B981;color:#10B981}
    .main{max-width:800px;margin:0 auto;padding:32px 20px}
    .page-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;letter-spacing:-0.03em;margin-bottom:4px}
    .page-sub{font-size:0.85rem;color:rgba(255,255,255,0.4);margin-bottom:28px}
    .card{background:rgba(255,255,255,0.04);border-radius:14px;border:1px solid rgba(255,255,255,0.08);padding:24px;margin-bottom:16px}
    .card-t{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
    .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
    .stat-box{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:12px;padding:16px;text-align:center}
    .stat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;color:#10B981;margin-bottom:2px}
    .stat-lbl{font-size:0.72rem;color:rgba(255,255,255,0.35);font-weight:600}
    .pledger-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
    .pledger-row:last-child{border-bottom:none}
    .pledger-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#10B981,#059669);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;flex-shrink:0}
    .pledger-name{font-weight:600;font-size:0.88rem}
    .pledger-email{font-size:0.75rem;color:rgba(255,255,255,0.35)}
    .pledger-date{font-size:0.72rem;color:rgba(255,255,255,0.25);margin-left:auto}
    .pledger-msg{font-size:0.78rem;color:rgba(255,255,255,0.4);margin-top:3px;font-style:italic}
    .export-btn{padding:7px 14px;border-radius:8px;border:1.5px solid rgba(16,185,129,0.3);background:transparent;color:#10B981;font-size:0.78rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s}
    .export-btn:hover{background:rgba(16,185,129,0.1)}
    .spinner{width:28px;height:28px;border:3px solid rgba(16,185,129,0.15);border-top-color:#10B981;border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto;display:block}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:600px){.stat-row{grid-template-columns:repeat(2,1fr)}nav{padding:0 14px}.logo-nm{display:none}}
  </style>
</head>
<body>
<nav>
  <a href="/dashboard" class="nav-logo"><div class="logo-mk">S</div><div class="logo-nm">SwoopForm</div></a>
  <a href="/dashboard" class="nav-btn">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">🤝 Pledge Responses</div>
  <div class="page-sub" id="pledge-sub">Loading...</div>
  <div id="content"><div class="spinner"></div></div>
</div>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getAuth,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import{getFirestore,doc,getDoc,collection,query,where,getDocs,orderBy}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
const FB={apiKey:"AIzaSyADVtdlHM72xbfOGaTlqohusO3cS8bbeS4",authDomain:"swoopform.firebaseapp.com",projectId:"swoopform",storageBucket:"swoopform.firebasestorage.app",messagingSenderId:"378850092986",appId:"1:378850092986:web:4fed92128136e048fa5f83"};
const app=initializeApp(FB);const auth=getAuth(app);const db=getFirestore(app);
const id=new URLSearchParams(window.location.search).get('id');
let pledgers=[];
onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='/login';return}
  const snap=await getDoc(doc(db,'pledges',id));
  if(!snap.exists()||snap.data().userId!==u.uid){document.getElementById('content').innerHTML='<p style="color:rgba(255,255,255,0.4)">Not found or access denied.</p>';return}
  const pledge={id:snap.id,...snap.data()};
  document.getElementById('pledge-sub').textContent=pledge.title;
  const rSnap=await getDocs(query(collection(db,'pledgeResponses'),where('pledgeId','==',id),orderBy('submittedAt','desc')));
  pledgers=rSnap.docs.map(d=>d.data());
  const total=pledge.totalPledges||pledgers.length;
  document.getElementById('content').innerHTML=`
    <div class="stat-row">
      <div class="stat-box"><div class="stat-val">${total}</div><div class="stat-lbl">Total pledges</div></div>
      <div class="stat-box"><div class="stat-val">${pledge.goal?Math.min(Math.round((total/pledge.goal)*100),100)+'%':'—'}</div><div class="stat-lbl">Goal progress</div></div>
      <div class="stat-box"><div class="stat-val">${pledge.status||'active'}</div><div class="stat-lbl">Status</div></div>
    </div>
    <div class="card">
      <div class="card-t"><span>Pledgers (${pledgers.length})</span><button class="export-btn" onclick="exportCSV()">Export CSV</button></div>
      ${pledgers.length?pledgers.map(p=>`<div class="pledger-row"><div class="pledger-avatar">${(p.name||'?')[0].toUpperCase()}</div><div style="flex:1;min-width:0"><div class="pledger-name">${eh(p.name||'Anonymous')}</div><div class="pledger-email">${eh(p.email||'')}</div>${p.message?`<div class="pledger-msg">"${eh(p.message)}"</div>`:''}</div><div class="pledger-date">${fmtDate(p.submittedAt)}</div></div>`).join(''):'<div style="color:rgba(255,255,255,0.3);text-align:center;padding:20px">No pledges yet</div>'}
    </div>`;
});
window.exportCSV=function(){
  const rows=[['Name','Email','Message','Date'],...pledgers.map(p=>[p.name||'Anonymous',p.email||'',p.message||'',fmtDate(p.submittedAt)])];
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='pledge-responses.csv';a.click();
}
function fmtDate(ts){if(!ts?.seconds)return'';return new Date(ts.seconds*1000).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}
function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}
</script>
</body>
</html>
